<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JuugTAPS</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --b: #000; --w: #fff; --g: #111; --sg: #222; --accent: rgba(255,255,255,0.8); --red: #ff4444; --green: #00ff88; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--b); color: var(--w); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.5s ease; }
        .loader-logo { width: 150px; height: 150px; margin-bottom: 30px; object-fit: contain; }
        .loader-bar { width: 180px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; position: relative; }
        .loader-progress { width: 60%; height: 100%; background: #fff; box-shadow: 0 0 15px #fff; position: absolute; animation: loadAnim 1.5s infinite ease-in-out; }
        @keyframes loadAnim { 0% { left: -100%; } 100% { left: 100%; } }

        #maint-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        
        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; position: relative; height: 100%; z-index: 1; overflow: hidden; }

        /* Новое окно победителей (Popup) */
        #winners-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0a0a0a; color: #fff; padding: 25px; border-radius: 28px; z-index: 15000; width: 85%; max-height: 60vh; display: none; flex-direction: column; text-align: center; border: 1px solid #333; box-shadow: 0 0 50px rgba(0,0,0,1); backdrop-filter: blur(10px); }
        .winners-list { overflow-y: auto; margin: 15px 0; }
        .winner-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 5px; border-bottom: 1px solid #1a1a1a; }
        .winner-info { display: flex; flex-direction: column; text-align: left; }
        .rank-tag { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px; padding-bottom: 140px; opacity: 0; pointer-events: none; transform: translateY(15px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .screen.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .hidden { display: none !important; }

        .header { width: 100%; display: flex; justify-content: space-between; font-weight: 700; font-size: 14px; margin-bottom: 20px; color: #555; }
        #score { font-size: 72px; font-weight: 900; margin-top: 5px; }
        
        .tap-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; min-height: 300px; }
        .main-circle { width: 240px; height: 240px; border: 4px solid var(--w); border-radius: 50%; transition: transform 0.05s ease-out; background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 70%); box-shadow: 0 0 20px rgba(255,255,255,0.05); cursor: pointer; }
        .main-circle.is-active { transform: scale(0.92); background: rgba(255,255,255,0.15); }

        .energy-box { width: 100%; text-align: center; margin-bottom: 20px; }
        .bar-bg { height: 24px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; margin: 15px 0; overflow: hidden; position: relative; }
        #e-fill { height: 100%; width: 100%; background: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.2); transition: width 0.3s ease; }

        .card { width: 100%; background: var(--g); border: 1px solid var(--sg); padding: 18px; border-radius: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .card.special { border: 1px solid rgba(255,255,255,0.3); background: linear-gradient(145deg, #111, #050505); }
        .buy-btn { background: var(--w); color: var(--b); border: none; padding: 10px 18px; border-radius: 8px; font-weight: 900; }

        nav { position: absolute; bottom: 0; width: 100%; display: flex; background: rgba(0,0,0,0.9); border-top: 1px solid var(--sg); padding: 15px 0 35px; z-index: 100; }
        .nav-item { flex: 1; text-align: center; color: #444; font-size: 10px; font-weight: 800; cursor: pointer; }
        .nav-item.active { color: var(--w); }
        .nav-item span { display: block; font-size: 24px; margin-bottom: 4px; filter: grayscale(1) brightness(2); }

        #admin-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .admin-content { background: #111; width: 100%; max-width: 400px; border-radius: 20px; padding: 20px; border: 1px solid #333; }
        .admin-btn { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: none; font-weight: 800; color: #fff; cursor: pointer; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="loader-logo" style="width:80px; height:80px; background:#fff; border-radius:50%; box-shadow: 0 0 30px #fff;"></div>
    <div class="loader-bar"><div class="loader-progress"></div></div>
</div>

<div id="winners-popup">
    <h2 id="t-winners-title" style="letter-spacing: 2px; font-size: 18px; font-weight: 900;">LAST WINNERS</h2>
    <div class="winners-list" id="winners-list-content"></div>
    <button onclick="document.getElementById('winners-popup').style.display='none'" style="background:none; border:none; color:#444; font-weight:700; cursor:pointer; margin-top:10px;">CLOSE</button>
</div>

<div id="app">
    <section id="s-game" class="screen active">
        <div class="header"><span id="p-name">@loading</span><span id="sync-text">LIVE</span></div>
        <div id="score">0</div>
        <div id="passive-display" style="color:#666; font-size:11px; font-weight:800; margin-top:5px;">Passive: 0/sec</div>
        <div class="tap-area"><div class="main-circle" id="tapBtn"></div></div>
        <div class="energy-box">
            <div class="bar-bg"><div id="e-fill"></div></div>
            <span id="e-text" style="font-size:12px; font-weight:800;">150 / 150</span>
        </div>
    </section>

    <section id="s-top" class="screen">
        <h2 id="t-top-title" style="align-self:flex-start; margin-bottom:20px; font-weight:900;">TOP 5 JUUG'ERS</h2>
        <div id="leaderboard-list" style="width:100%;"></div>
    </section>

    <section id="s-shop" class="screen">
        <h2 id="t-shop-title" style="align-self:flex-start; margin-bottom:20px; font-weight:900;">SHOP</h2>
        <div id="shop-main" style="width:100%;">
            <div class="card special" id="case-card" onclick="openDailyCase()">
                <div><b id="t-case-name">DAILY CASE</b><br><span id="case-status" style="font-size:11px; color:rgba(255,255,255,0.5)">Ready!</span></div>
                <button class="buy-btn" id="case-btn">OPEN</button>
            </div>
            <div class="card" onclick="openUpgrade('click')">
                <div style="flex:1"><b id="t-click-up">CLICK UPGRADES</b><br><span id="t-click-desc" style="font-size:11px; color:#666">Increase tap power</span></div>
                <span>➔</span>
            </div>
            <div class="card" onclick="openUpgrade('passive')">
                <div style="flex:1"><b id="t-pass-up">PASSIVE INCOME</b><br><span id="t-pass-desc" style="font-size:11px; color:#666">Automatic income</span></div>
                <span>➔</span>
            </div>
        </div>
        <div id="shop-detail" class="hidden" style="width:100%;">
            <button id="t-back" onclick="backToShop()" style="background:none; border:none; color:#fff; font-weight:800; margin-bottom:15px;">← BACK</button>
            <div id="upgrade-items"></div>
        </div>
    </section>

    <section id="s-gear" class="screen">
        <h2 id="t-gear-title" style="align-self:flex-start; margin-bottom:20px; font-weight:900;">GEAR</h2>
        <div class="card" onclick="toggleLang()"><span id="t-lang-label">Language</span><b id="cur-lang">EN</b></div>
        <div class="card" onclick="toggleSound()"><span id="t-sound-label">Sound</span><b id="cur-sound">ON</b></div>
        <div id="admin-container"></div>
    </section>

    <nav>
        <div class="nav-item" onclick="show('s-top')"><span>🏆</span><p id="t-nav-top">TOP</p></div>
        <div class="nav-item active" onclick="show('s-game')"><span>💎</span><p id="t-nav-game">GAME</p></div>
        <div class="nav-item" onclick="show('s-shop')"><span>🛒</span><p id="t-nav-shop">SHOP</p></div>
        <div class="nav-item" onclick="show('s-gear')"><span>⚙️</span><p id="t-nav-gear">GEAR</p></div>
    </nav>
</div>

<div id="admin-modal">
    <div class="admin-content">
        <h3 style="margin-bottom:20px; text-align:center;">ADMIN PANEL</h3>
        <button id="adm-ev-btn" class="admin-btn" style="background:var(--green); color:#000;" onclick="toggleEvent()">START EVENT</button>
        <button class="admin-btn" style="background:#333;" onclick="rushEvent()">END IN 10 SEC</button>
        <button class="admin-btn" style="background:var(--red);" onclick="resetAll()">RESET ALL PLAYERS</button>
        <button class="admin-btn" style="background:#222;" onclick="document.getElementById('admin-modal').style.display='none'">CLOSE</button>
    </div>
</div>

<canvas id="particleCanvas"></canvas>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDcUMfQAd9QnoPUVxfM9SWp_lHBc2CaRKY", authDomain: "juugtaaap.firebaseapp.com", databaseURL: "https://juugtaaap-default-rtdb.europe-west1.firebasedatabase.app", projectId: "juugtaaap" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    const MY_ID = 5291965471;
    const user = tg.initDataUnsafe?.user || { id: 0, username: "Guest" };
    
    let isLoaded = false;
    let autoShown = false;
    let state = { score: 0, energy: 150, tapLvl: 1, passiveLvl: 0, lastUpdate: Date.now(), lastCaseTime: 0, username: "Guest", lang: 'en', sound: true };
    let globalData = { eventEnd: 0, winners: null };
    const RANKS = ["Noob", "Juug'er", "Hustler", "Mover", "Tycoon"];

    const langData = {
        en: { sync: "LIVE", topT: "TOP 5 JUUG'ERS", shopT: "SHOP", clUp: "CLICK UPGRADES", clDe: "Increase tap power", psUp: "PASSIVE INCOME", psDe: "Automatic income", back: "BACK", gearT: "GEAR", langL: "Language", soundL: "Sound", navTop: "TOP", navGame: "GAME", navShop: "SHOP", navGear: "GEAR", caseName: "DAILY CASE", winTitle: "LAST WINNERS", closed: "EVENT CLOSED" },
        ru: { sync: "В СЕТИ", topT: "ТОП 5 ДЖУГЕРОВ", shopT: "МАГАЗИН", clUp: "ПРОКАЧКА КЛИКА", clDe: "Сила нажатия", psUp: "ПАССИВНЫЙ ДОХОД", psDe: "Авто-заработок", back: "НАЗАД", gearT: "МЕНЮ", langL: "Язык", soundL: "Звук", navTop: "ТОП", navGame: "ИГРА", navShop: "МАГАЗИН", navGear: "МЕНЮ", caseName: "ДНЕВНОЙ КЕЙС", winTitle: "ПОБЕДИТЕЛИ", closed: "ИВЕНТ ОКОНЧЕН" }
    };

    // Таймер ивента и Авто-показ
    function updateEventTimer() {
        const sync = document.getElementById('sync-text');
        const now = Date.now();
        if (globalData.eventEnd > now) {
            const d = globalData.eventEnd - now;
            const h = Math.floor(d/3600000); const m = Math.floor((d%3600000)/60000); const s = Math.floor((d%60000)/1000);
            sync.innerText = `${h}:${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
            sync.style.color = "#555";
        } else {
            sync.innerText = langData[state.lang].closed;
            if (globalData.winners && !autoShown && isLoaded) {
                showWinnersPopup();
                autoShown = true;
            }
        }
    }
    setInterval(updateEventTimer, 1000);

    function showWinnersPopup() {
        const list = document.getElementById('winners-list-content');
        list.innerHTML = "";
        globalData.winners.slice(0,3).forEach((p, i) => {
            const medal = ["🥇","🥈","🥉"][i];
            list.innerHTML += `<div class="winner-row">
                <div class="winner-info"><b>${medal} @${p.username}</b><span class="rank-tag">${RANKS[4]}</span></div>
                <b>${format(p.score)}</b>
            </div>`;
        });
        document.getElementById('winners-popup').style.display = 'flex';
    }

    // Админка
    function toggleEvent() {
        const end = globalData.eventEnd > Date.now() ? 0 : Date.now() + 86400000;
        db.ref('global').update({ eventEnd: end });
    }
    function rushEvent() {
        db.ref('users').once('value', snap => {
            const players = Object.values(snap.val() || {}).sort((a,b) => b.score - a.score).slice(0,3);
            db.ref('global').update({ eventEnd: Date.now() + 10000, winners: players });
        });
    }
    function resetAll() { if(confirm("RESET ALL?")) db.ref('users').once('value', snap => { for(let id in snap.val()) db.ref(`users/${id}`).update({score:0, tapLvl:1, passiveLvl:0}); }); }

    // Основная логика
    const tapBtn = document.getElementById('tapBtn');
    tapBtn.addEventListener('pointerdown', (e) => {
        if (!isLoaded || state.energy <= 0) return;
        tapBtn.classList.add('is-active');
        state.score += state.tapLvl; state.energy--;
        updateUI();
        if(state.sound) tg.HapticFeedback.impactOccurred('light');
    });
    window.addEventListener('pointerup', () => tapBtn.classList.remove('is-active'));

    function updateUI() {
        document.getElementById('score').innerText = format(state.score);
        document.getElementById('e-text').innerText = `${state.energy} / 150`;
        document.getElementById('e-fill').style.width = (state.energy / 1.5) + '%';
        document.getElementById('passive-display').innerText = `Passive: ${state.passiveLvl}/sec`;
    }

    function format(n) { return n >= 1e6 ? (n/1e6).toFixed(1) + 'M' : n >= 1e3 ? (n/1e3).toFixed(1) + 'K' : Math.floor(n); }

    db.ref(`users/${user.id}`).once('value', snap => {
        const data = snap.val();
        if(data) state = { ...state, ...data };
        state.username = user.username || data?.username || "Guest";
        isLoaded = true;
        document.getElementById('loading-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('loading-screen').style.display='none', 500);
        document.getElementById('p-name').innerText = "@" + state.username;
        if(user.id == MY_ID) document.getElementById('admin-container').innerHTML = `<button class="buy-btn" style="margin-top:10px; width:100%" onclick="document.getElementById('admin-modal').style.display='flex'">ADMIN PANEL</button>`;
        updateUI();
    });

    db.ref('global').on('value', snap => { globalData = snap.val() || { eventEnd: 0, winners: null }; });

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 's-top') loadLeaderboard();
    }

    function loadLeaderboard() {
        const list = document.getElementById('leaderboard-list');
        db.ref('users').once('value', snap => {
            const players = Object.values(snap.val() || {}).sort((a,b) => b.score - a.score).slice(0,5);
            list.innerHTML = "";
            players.forEach((p, i) => {
                list.innerHTML += `<div class="card"><b>${i+1}. @${p.username}</b><b>${format(p.score)}</b></div>`;
            });
        });
    }

    // Магазин
    function openUpgrade(t) { document.getElementById('shop-main').classList.add('hidden'); document.getElementById('shop-detail').classList.remove('hidden'); renderUp(t); }
    function backToShop() { document.getElementById('shop-main').classList.remove('hidden'); document.getElementById('shop-detail').classList.add('hidden'); }
    function renderUp(t) {
        const cont = document.getElementById('upgrade-items');
        const lvl = t === 'click' ? state.tapLvl : state.passiveLvl;
        const price = Math.floor(100 * Math.pow(1.5, lvl));
        cont.innerHTML = `<div class="card"><div><b>LVL ${lvl} ➔ ${lvl+1}</b><br><small>Cost: ${price}</small></div><button class="buy-btn" onclick="buy('${t}',${price})" ${state.score < price ? 'disabled':''}>BUY</button></div>`;
    }
    function buy(t, p) { if(state.score >= p) { state.score -= p; if(t==='click') state.tapLvl++; else state.passiveLvl++; updateUI(); renderUp(t); save(); } }

    function save() { db.ref(`users/${user.id}`).update(state); }
    setInterval(() => { if(isLoaded) { state.score += state.passiveLvl; if(state.energy < 150) state.energy++; updateUI(); save(); } }, 1000);

    // Частицы
    const canvas = document.getElementById('particleCanvas'); const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let parts = [];
    class P { constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.s = Math.random()*1.5; this.vx = Math.random()-0.5; this.vy = Math.random()-0.5; }
    update() { this.x+=this.vx; this.y+=this.vy; if(this.x<0||this.x>canvas.width)this.vx*=-1; if(this.y<0||this.y>canvas.height)this.vy*=-1; }
    draw() { ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,Math.PI*2); ctx.fill(); } }
    for(let i=0; i<40; i++) parts.push(new P());
    function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); parts.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(anim); }
    anim();
</script>
</body>
</html>
