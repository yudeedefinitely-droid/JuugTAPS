<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JuugTAPS</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --b: #000; --w: #fff; --g: #111; --sg: #222; --accent: rgba(255,255,255,0.8); --red: #ff4444; --green: #00ff88; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--b); color: var(--w); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        
        /* СТИЛИ ЗАГРУЗОЧНОГО ЭКРАНА */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.5s ease; }
        .loader-logo { width: 150px; height: 150px; margin-bottom: 30px; object-fit: contain; }
        .loader-bar { width: 180px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; position: relative; }
        .loader-progress { width: 60%; height: 100%; background: #fff; box-shadow: 0 0 15px #fff; position: absolute; animation: loadAnim 1.5s infinite ease-in-out; }
        @keyframes loadAnim { 0% { left: -100%; } 100% { left: 100%; } }

        /* ТЕХ ПЕРЕРЫВ */
        #maint-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
        
        /* НОВОЕ ОКНО ПОБЕДИТЕЛЕЙ (GLASS UI) */
        #winners-popup { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); 
            z-index: 15000; display: none; align-items: center; justify-content: center; padding: 25px;
            animation: fadeIn 0.3s ease;
        }
        .winners-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 35px; padding: 30px; width: 100%; max-width: 350px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .winner-row { 
            display: flex; justify-content: space-between; padding: 12px 15px; 
            background: rgba(255,255,255,0.03); border-radius: 14px; margin-bottom: 8px; font-size: 13px;
        }
        .winner-row.top-1 { border: 1px solid rgba(0,255,136,0.3); background: rgba(0,255,136,0.05); }

        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; position: relative; height: 100%; z-index: 1; overflow: hidden; }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; padding-bottom: 140px; opacity: 0; pointer-events: none; transform: translateY(15px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .screen.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .hidden { display: none !important; }

        /* Элементы интерфейса */
        .header { width: 100%; display: flex; justify-content: space-between; font-weight: 700; font-size: 14px; margin-bottom: 20px; color: #555; }
        #score { font-size: 72px; font-weight: 900; margin-top: 5px; }
        .tap-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; min-height: 300px; }
        .main-circle { width: 240px; height: 240px; border: 4px solid var(--w); border-radius: 50%; transition: transform 0.05s ease-out; background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%); position: relative; z-index: 2; }
        .main-circle.is-active { transform: scale(0.92); }
        
        .energy-box { width: 100%; text-align: center; margin-bottom: 20px; }
        .bar-bg { height: 24px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; margin: 15px 0; overflow: hidden; position: relative; }
        #e-fill { height: 100%; width: 100%; background: #fff; transition: width 0.3s linear; }
        #e-text { position: absolute; width: 100%; left: 0; top: 50%; transform: translateY(-50%); font-size: 10px; font-weight: 900; color: var(--w); mix-blend-mode: difference; }

        .card { width: 100%; background: var(--g); border: 1px solid var(--sg); padding: 18px; border-radius: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .buy-btn { background: var(--w); color: var(--b); border: none; padding: 10px 18px; border-radius: 8px; font-weight: 900; }
        
        nav { position: absolute; bottom: 0; width: 100%; display: flex; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); border-top: 1px solid var(--sg); padding: 15px 0 35px; z-index: 100; }
        .nav-item { flex: 1; text-align: center; color: #444; font-size: 10px; font-weight: 800; }
        .nav-item.active { color: var(--w); }
        .nav-item span { display: block; font-size: 24px; margin-bottom: 4px; }

        #admin-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .admin-content { background: #111; width: 100%; max-width: 400px; border-radius: 20px; padding: 20px; border: 1px solid #333; }
        .admin-btn { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; color: #fff; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="loader-bar"><div class="loader-progress"></div></div>
</div>

<div id="maint-screen">
    <h1 style="font-size: 50px;">🔧</h1>
    <h2 id="t-maint-title">ТЕХ ПЕРЕРЫВ</h2>
</div>

<div id="winners-popup">
    <div class="winners-card">
        <h1 style="font-size: 40px; margin-bottom: 10px;">🏆</h1>
        <h2 style="letter-spacing: 2px; margin-bottom: 5px;">ПОЗДРАВЛЯЕМ!</h2>
        <p style="font-size: 11px; color: #aaa; margin-bottom: 20px; text-transform: uppercase;">Ивент успешно завершен</p>
        <div id="winners-list-box"></div>
        <button class="admin-btn" style="margin-top:20px; background: #fff; color: #000;" onclick="document.getElementById('winners-popup').style.display='none'">ОТЛИЧНО</button>
    </div>
</div>

<div id="admin-modal">
    <div class="admin-content">
        <h3 style="margin-bottom: 20px; text-align: center;">ADMIN PANEL</h3>
        <button class="admin-btn" style="background:var(--green); color:#000" onclick="toggleEvent()">START/STOP EVENT</button>
        <button class="admin-btn" style="background:#222" onclick="rushEvent()">ЗАВЕРШИТЬ (SCORE)</button>
        <button class="admin-btn" style="background:var(--red)" onclick="clearWinners()">ОЧИСТИТЬ ПОБЕДИТЕЛЕЙ</button>
        <button class="admin-btn" style="background:#222" onclick="toggleMaint()">MAINTENANCE</button>
        <button class="admin-btn" style="background:#444; margin-top:10px;" onclick="closeAdmin()">CLOSE</button>
    </div>
</div>

<canvas id="particleCanvas"></canvas>

<div id="app">
    <section id="s-game" class="screen active">
        <div class="header">
            <span id="p-name">@loading</span>
            <span id="sync-text">LIVE</span>
        </div>
        <div id="score">0</div>
        <div class="tap-area"><div class="main-circle" id="tapBtn"></div></div>
        
        <div id="case-area" style="width:100%; margin-bottom:20px;">
            <div class="card" style="background: linear-gradient(90deg, #111, #1a1a1a); border: 1px solid #333;">
                <div style="text-align:left">
                    <b id="t-case-name" style="font-size:14px;">DAILY CASE</b><br>
                    <span id="case-timer" style="font-size:11px; color:var(--green)">READY</span>
                </div>
                <button id="case-btn" class="buy-btn" onclick="openCase()">OPEN</button>
            </div>
        </div>

        <div class="energy-box">
            <div class="bar-bg">
                <div id="e-fill"></div>
                <span id="e-text">150 / 150</span>
            </div>
        </div>
    </section>

    <section id="s-top" class="screen">
        <h2 id="t-top-title" style="align-self:flex-start; margin-bottom:20px; font-weight:900;">TOP 5</h2>
        <button id="winners-access-btn" class="card hidden" onclick="showWinnersPopup()" style="border-color:var(--green); background:rgba(0,255,136,0.05)">
            <b style="color:var(--green)">🏆 ПОБЕДИТЕЛИ ИВЕНТА</b> ➔
        </button>
        <div id="leaderboard-list" style="width:100%;"></div>
    </section>

    <section id="s-shop" class="screen">
        <h2 id="t-shop-title" style="align-self:flex-start; margin-bottom:20px; font-weight:900;">SHOP</h2>
        <div id="shop-main" style="width:100%;">
            <div class="card" onclick="openUpgrade('click')">
                <div style="flex:1">
                    <b id="t-click-up">CLICK UPGRADES</b><br>
                    <span id="t-click-desc" style="font-size:11px; color:#666">Level up your tap power</span>
                </div>
                <span>➔</span>
            </div>
            <div class="card" onclick="openUpgrade('passive')">
                <div style="flex:1">
                    <b id="t-pass-up">PASSIVE INCOME</b><br>
                    <span id="t-pass-desc" style="font-size:11px; color:#666">Earn points while idle</span>
                </div>
                <span>➔</span>
            </div>
        </div>
        <div id="shop-detail" class="hidden" style="width:100%;">
            <button id="t-back" onclick="backToShop()" style="background:none; border:none; color:#fff; font-weight:800; margin-bottom:15px;">← BACK</button>
            <div id="upgrade-items"></div>
        </div>
    </section>

    <section id="s-gear" class="screen">
        <h2 id="t-gear-title" style="align-self:flex-start; margin-bottom:20px; font-weight:900;">GEAR</h2>
        <div class="card" onclick="toggleLang()">
            <span id="t-lang-label">Language</span>
            <b id="cur-lang" style="color:#888">EN</b>
        </div>
        <div class="card" onclick="toggleSound()">
            <span id="t-sound-label">Sound</span>
            <b id="cur-sound" style="color:#888">ON</b>
        </div>
        <div id="admin-container"></div>
    </section>

    <nav>
        <div class="nav-item" onclick="show('s-top')"><span id="t-nav-top-icon">🏆</span><p id="t-nav-top">TOP</p></div>
        <div class="nav-item active" onclick="show('s-game')"><span>💎</span><p id="t-nav-game">GAME</p></div>
        <div class="nav-item" onclick="show('s-shop')"><span>🛒</span><p id="t-nav-shop">SHOP</p></div>
        <div class="nav-item" onclick="show('s-gear')"><span>⚙️</span><p id="t-nav-gear">GEAR</p></div>
    </nav>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDcUMfQAd9QnoPUVxfM9SWp_lHBc2CaRKY", authDomain: "juugtaaap.firebaseapp.com", databaseURL: "https://juugtaaap-default-rtdb.europe-west1.firebasedatabase.app", projectId: "juugtaaap" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    const MY_ID = 5291965471;
    const user = tg.initDataUnsafe?.user || { id: 0, username: "Guest" };
    
    let state = { score: 0, energy: 150, tapLvl: 1, passiveLvl: 0, lastUpdate: Date.now(), lang: 'en', sound: true, lastCase: 0 };
    let globalData = { eventEnd: 0, isMaint: false, winners: null };

    const langData = {
        en: { sync:'LIVE', scoreL:'Score', tapL:'Tap', topT:'TOP 5', shopT:'SHOP', clUp:'CLICK UPGRADES', clDe:'Increase tap power', psUp:'PASSIVE INCOME', psDe:'Automatic earnings', back:'← BACK', gearT:'GEAR', langL:'Language', soundL:'Sound', navTop:'TOP', navGame:'GAME', navShop:'SHOP', navGear:'GEAR', caseName:'DAILY CASE', caseOpen:'OPEN', caseWait:'WAIT' },
        ru: { sync:'В СЕТИ', scoreL:'Счет', tapL:'Тап', topT:'ТОП 5', shopT:'МАГАЗИН', clUp:'ПРОКАЧКА КЛИКА', clDe:'Увеличь силу нажатия', psUp:'ПАССИВНЫЙ ДОХОД', psDe:'Автоматический заработок', back:'← НАЗАД', gearT:'НАСТРОЙКИ', langL:'Язык', soundL:'Звук', navTop:'ТОП', navGame:'ИГРА', navShop:'МАГАЗИН', navGear:'МЕНЮ', caseName:'ЕЖЕДНЕВНЫЙ КЕЙС', caseOpen:'ОТКРЫТЬ', caseWait:'ЖДИ' }
    };

    // --- ADMIN FUNCTIONS ---
    function openAdmin() { document.getElementById('admin-modal').style.display = 'flex'; }
    function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }
    function toggleMaint() { db.ref('global/isMaint').set(!globalData.isMaint); }
    function toggleEvent() {
        const isLive = globalData.eventEnd > Date.now();
        db.ref('global/eventEnd').set(isLive ? 0 : Date.now() + 86400000 * 30);
    }
    function rushEvent() {
        db.ref('users').orderByChild('score').limitToLast(5).once('value', s => {
            let winList = [];
            s.forEach(child => {
                let d = child.val();
                winList.unshift({ name: d.username, score: d.score, tap: d.tapLvl, pass: d.passiveLvl });
            });
            db.ref('global').update({ eventEnd: Date.now() - 1000, winners: winList });
        });
    }
    function clearWinners() { db.ref('global/winners').set(null); }

    // --- CORE LOGIC ---
    db.ref('global').on('value', s => {
        globalData = s.val() || { eventEnd:0, isMaint:false, winners:null };
        document.getElementById('maint-screen').style.display = (globalData.isMaint && user.id !== MY_ID) ? 'flex' : 'none';
        
        if (globalData.winners) {
            renderWinners(globalData.winners);
            document.getElementById('winners-access-btn').classList.remove('hidden');
            if (!sessionStorage.getItem('notified')) {
                showWinnersPopup();
                sessionStorage.setItem('notified', 'true');
            }
        } else {
            document.getElementById('winners-popup').style.display = 'none';
            document.getElementById('winners-access-btn').classList.add('hidden');
        }
    });

    function renderWinners(list) {
        const box = document.getElementById('winners-list-box');
        box.innerHTML = list.map((w, i) => `
            <div class="winner-row ${i===0?'top-1':''}">
                <span style="font-weight:800">#${i+1} @${w.name}</span>
                <span style="color:var(--green)">${Math.floor(w.score)} pts <small>(L:${w.tap}/P:${w.pass})</small></span>
            </div>
        `).join('');
    }

    function showWinnersPopup() { document.getElementById('winners-popup').style.display = 'flex'; }

    function loadData() {
        db.ref(`users/${user.id}`).on('value', s => {
            if(s.exists()) { state = {...state, ...s.val()}; }
            else { db.ref(`users/${user.id}`).set(state); }
            updateUI(); updateLangUI();
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
        });
    }

    function updateUI() {
        document.getElementById('score').innerText = Math.floor(state.score).toLocaleString();
        document.getElementById('p-name').innerText = "@" + user.username;
        document.getElementById('e-fill').style.width = (state.energy/150*100) + "%";
        document.getElementById('e-text').innerText = Math.floor(state.energy) + " / 150";
        if(user.id === MY_ID && !document.getElementById('adm-btn')) {
            const b = document.createElement('button'); b.id='adm-btn'; b.className='admin-btn';
            b.innerText='ADMIN PANEL'; b.onclick=openAdmin; document.getElementById('admin-container').appendChild(b);
        }
    }

    function updateLangUI() {
        const l = langData[state.lang];
        const ids = ['sync-text','t-top-title','t-shop-title','t-click-up','t-click-desc','t-pass-up','t-pass-desc','t-back','t-gear-title','t-lang-label','t-sound-label','t-nav-top','t-nav-game','t-nav-shop','t-nav-gear','t-case-name'];
        ids.forEach(id => { if(document.getElementById(id)) document.getElementById(id).innerText = l[id.replace('t-','').replace('-','').replace('icon','') || id]; });
        document.getElementById('cur-lang').innerText = state.lang.toUpperCase();
        document.getElementById('cur-sound').innerText = state.sound ? "ON" : "OFF";
        updateCaseUI();
    }

    function toggleLang() { state.lang = state.lang === 'en' ? 'ru' : 'en'; updateLangUI(); save(); }
    
    // ИСПРАВЛЕННЫЙ ЗВУК
    function toggleSound() { 
        state.sound = !state.sound; 
        document.getElementById('cur-sound').innerText = state.sound ? "ON" : "OFF";
        save(); 
    }

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.getAttribute('onclick').includes(id)));
    }

    document.getElementById('tapBtn').onclick = (e) => {
        if(state.energy >= 1) {
            state.score += state.tapLvl; state.energy -= 1;
            createEffect(e); updateUI(); save();
            if(state.sound) tg.HapticFeedback.impactOccurred('light');
        }
    };

    function createEffect(e) {
        const el = document.createElement('div'); el.style.cssText = `position:absolute; pointer-events:none; color:#fff; font-weight:900; font-size:24px; left:${e.pageX}px; top:${e.pageY}px; animation: floatUp 0.6s ease-out forwards; z-index:100;`;
        el.innerText = "+" + state.tapLvl; document.body.appendChild(el); setTimeout(() => el.remove(), 600);
    }

    function save() { db.ref(`users/${user.id}`).update(state); }

    // CASE SYSTEM
    function updateCaseUI() {
        const now = Date.now();
        const wait = 86400000 - (now - state.lastCase);
        const btn = document.getElementById('case-btn');
        if(wait > 0) {
            btn.disabled = true; btn.style.opacity = '0.5';
            const h = Math.floor(wait/3600000); const m = Math.floor((wait%3600000)/60000);
            document.getElementById('case-timer').innerText = `${h}h ${m}m`;
        } else {
            btn.disabled = false; btn.style.opacity = '1';
            document.getElementById('case-timer').innerText = 'READY';
        }
    }

    function openCase() {
        const win = Math.floor(Math.random() * (10000 - 100 + 1)) + 100;
        state.score += win; state.lastCase = Date.now();
        alert("You won: " + win + " points!");
        updateCaseUI(); save(); updateUI();
    }

    // SHOP SYSTEM
    function openUpgrade(type) {
        document.getElementById('shop-main').classList.add('hidden');
        document.getElementById('shop-detail').classList.remove('hidden');
        renderItems(type);
    }
    function backToShop() {
        document.getElementById('shop-main').classList.remove('hidden');
        document.getElementById('shop-detail').classList.add('hidden');
    }
    function renderItems(type) {
        const cont = document.getElementById('upgrade-items');
        let lvl = type === 'click' ? state.tapLvl : state.passiveLvl;
        let price = Math.floor(100 * Math.pow(1.5, lvl));
        cont.innerHTML = `
            <div class="card">
                <b>LEVEL ${lvl}</b>
                <button class="buy-btn" onclick="buyUpgrade('${type}', ${price})">${price}</button>
            </div>
        `;
    }
    function buyUpgrade(type, p) {
        if(state.score >= p) {
            state.score -= p;
            if(type === 'click') state.tapLvl++; else state.passiveLvl++;
            save(); updateUI(); renderItems(type);
            if(state.sound) tg.HapticFeedback.notificationOccurred('success');
        }
    }

    // INTERVALS
    setInterval(() => {
        if(state.energy < 150) { state.energy = Math.min(150, state.energy + 1); updateUI(); }
        if(state.passiveLvl > 0) { state.score += state.passiveLvl/10; updateUI(); }
        updateCaseUI();
    }, 1000);

    setInterval(() => {
        db.ref('users').orderByChild('score').limitToLast(5).once('value', s => {
            let html = ""; let arr = [];
            s.forEach(c => arr.unshift(c.val()));
            arr.forEach((u, i) => { html += `<div class="card"><span>#${i+1} @${u.username}</span><b>${Math.floor(u.score)}</b></div>`; });
            document.getElementById('leaderboard-list').innerHTML = html;
        });
    }, 5000);

    // Particles
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let pts = [];
    function init() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        for(let i=0; i<30; i++) pts.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2, v: Math.random()*0.5});
    }
    function anim() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "rgba(255,255,255,0.1)";
        pts.forEach(p => {
            p.y -= p.v; if(p.y < 0) p.y = canvas.height;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(anim);
    }
    init(); anim();

    loadData();
</script>
</body>
</html>
