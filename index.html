<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JuugTAPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <section id="game-screen" class="screen">
            <div class="header">
                <span id="username">@loading...</span>
                <span id="event-timer">EVENT: 03m 00d</span>
            </div>
            
            <div class="main-content">
                <div class="score-container">
                    <p class="label">SCORE</p>
                    <h1 id="score">0</h1>
                </div>

                <div class="tap-zone">
                    <div id="tapBtn" class="circle-btn"></div>
                </div>

                <div class="energy-container">
                    <p class="tap-to-earn">TAP TO EARN</p>
                    <div class="progress-bar"><div id="energy-fill"></div></div>
                    <p id="energy-text">150 / 150</p>
                </div>
            </div>
        </section>

        <section id="shop-screen" class="screen hidden">
            <h2 class="title">SHOP</h2>
            <div id="shop-items" class="scroll-area"></div>
        </section>

        <section id="top-screen" class="screen hidden">
            <h2 class="title">TOP 5</h2>
            <div id="leaderboard" class="scroll-area"></div>
        </section>

        <section id="gear-screen" class="screen hidden">
            <h2 class="title">GEAR</h2>
            <div class="settings-list">
                <button class="menu-btn" onclick="toggleMusic()">MUSIC: <span id="musicStatus">ON</span></button>
                <div id="admin-section" class="hidden">
                    <hr>
                    <button class="menu-btn admin-btn" onclick="startEvent()">START 3 MONTH EVENT</button>
                </div>
            </div>
        </section>

        <nav class="bottom-nav">
            <button onclick="changeScreen('top-screen')">🏆<br>TOP</button>
            <button onclick="changeScreen('game-screen')" id="nav-game" class="active">💎<br>GAME</button>
            <button onclick="changeScreen('shop-screen')">🎁<br>DAILY</button>
            <button onclick="changeScreen('gear-screen')">⚙️<br>GEAR</button>
        </nav>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
