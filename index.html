        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--b); 
            color: var(--w); 
            font-family: 'Inter', -apple-system, sans-serif; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* КРАСИВЫЙ ЗАГРУЗОЧНЫЙ ЭКРАН */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            z-index: 3000; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .loading-logo {
            width: 140px; height: 140px;
            background: var(--logo) no-repeat center;
            background-size: contain;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
            animation: premiumPulse 2.5s infinite ease-in-out;
        }

        .loading-bar-container {
            width: 200px; height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px; margin-top: 40px;
            overflow: hidden; position: relative;
        }

        .loading-bar-fill {
            width: 0%; height: 100%;
            background: var(--w);
            box-shadow: 0 0 10px var(--w);
            animation: fillBar 2s forwards ease-in-out;
        }

        @keyframes premiumPulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(255,255,255,0.1)); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 30px rgba(255,255,255,0.4)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(255,255,255,0.1)); }
        }

        @keyframes fillBar { to { width: 100%; } }

        /* ИГРОВОЙ ИНТЕРФЕЙС */
        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.5; }
        #app { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; z-index: 1; }

        .screen { 
            position: absolute; width: 100%; height: 100%; padding: 25px;
            display: flex; flex-direction: column; align-items: center;
            opacity: 0; pointer-events: none; transform: scale(0.95);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding-bottom: 120px; overflow-y: auto;
        }
        .screen.active { opacity: 1; pointer-events: auto; transform: scale(1); }

        /* КНОПКА ТАПА */
        .tap-area { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        .main-circle { 
            width: 260px; height: 260px; border-radius: 50%; 
            background: var(--logo) no-repeat center; background-size: 85%;
            border: 6px solid rgba(255,255,255,0.05);
            box-shadow: 0 0 40px rgba(255,255,255,0.03), inset 0 0 20px rgba(0,0,0,0.5);
            transition: transform 0.05s; touch-action: manipulation;
        }
        .main-circle:active { transform: scale(0.94) rotate(2deg); }

        /* ЭНЕРГИЯ */
        .energy-container { width: 100%; margin-bottom: 20px; }
        .energy-bar { height: 12px; background: #111; border-radius: 20px; overflow: hidden; border: 1px solid #222; }
        #e-fill { height: 100%; width: 100%; background: var(--w); transition: width 0.3s ease; box-shadow: 0 0 10px var(--w); }

        /* КАРТОЧКИ */
        .card { 
            width: 100%; background: var(--g); border-radius: 16px; padding: 20px; 
            margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid var(--sg); transition: 0.2s;
        }
        .card:active { background: #1a1a1a; transform: translateY(2px); }
        .buy-btn { background: var(--w); color: #000; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 900; }
        .buy-btn:disabled { background: #333; color: #666; }

        /* НАВИГАЦИЯ */
        nav { 
            position: fixed; bottom: 0; width: 100%; display: flex; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            padding: 15px 10px 30px; border-top: 1px solid var(--sg);
        }
        .nav-item { flex: 1; text-align: center; opacity: 0.4; transition: 0.3s; cursor: pointer; }
        .nav-item.active { opacity: 1; transform: translateY(-3px); }
        .nav-item span { display: block; font-size: 24px; }
        .nav-item p { font-size: 10px; font-weight: 800; margin-top: 5px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="loading-logo"></div>
    <div class="loading-bar-container"><div class="loading-bar-fill"></div></div>
    <p style="margin-top:20px; font-size:10px; font-weight:900; letter-spacing:3px; opacity:0.5;">INITIALIZING JUUG</p>
</div>

<canvas id="particleCanvas"></canvas>

<div id="app">
    <section id="s-game" class="screen active">
        <div style="width:100%; display:flex; justify-content:space-between; opacity:0.5; font-size:12px; font-weight:900;">
            <span id="p-name">@USER</span>
            <span id="sync-text">SYNCED</span>
        </div>
        <div id="score" style="font-size: 64px; font-weight: 900; margin: 20px 0;">0</div>
        <div id="passive-display" style="font-size:12px; font-weight:800; color:#555;">Passive: 0/sec</div>
        
        <div class="tap-area">
            <div class="main-circle" id="tapBtn"></div>
        </div>

        <div class="energy-container">
            <div style="display:flex; justify-content:space-between; font-size:10px; font-weight:900; margin-bottom:8px; opacity:0.6;">
                <span>STAMINA</span>
                <span id="e-text">150 / 150</span>
            </div>
            <div class="energy-bar"><div id="e-fill"></div></div>
        </div>
    </section>

    <section id="s-top" class="screen">
        <h2 style="width:100%; font-weight:900; margin-bottom:20px;">LEADERBOARD</h2>
        <div id="leaderboard-list" style="width:100%;"></div>
    </section>

    <section id="s-shop" class="screen">
        <h2 style="width:100%; font-weight:900; margin-bottom:20px;">UPGRADES</h2>
        <div id="shop-main" style="width:100%;">
            <div class="card" onclick="openUpgrade('click')">
                <div><b>TAP POWER</b><br><small style="color:#555">Get more per click</small></div>
                <span>➔</span>
            </div>
            <div class="card" onclick="openUpgrade('passive')">
                <div><b>AUTO JUUG</b><br><small style="color:#555">Earn while sleeping</small></div>
                <span>➔</span>
            </div>
        </div>
        <div id="shop-detail" class="hidden" style="width:100%;">
            <button onclick="backToShop()" style="background:none; border:none; color:#fff; font-weight:900; margin-bottom:20px;">← BACK</button>
            <div id="upgrade-items"></div>
        </div>
    </section>

    <section id="s-gear" class="screen">
        <h2 style="width:100%; font-weight:900; margin-bottom:20px;">SETTINGS</h2>
        <div class="card" onclick="toggleLang()">
            <span>LANGUAGE</span><b id="cur-lang">EN</b>
        </div>
        <div class="card" onclick="toggleSound()">
            <span>HAPTIC FEEDBACK</span><b id="cur-sound">ON</b>
        </div>
    </section>

    <nav>
        <div class="nav-item" id="n-top" onclick="show('s-top')"><span>🏆</span><p>TOP</p></div>
        <div class="nav-item active" id="n-game" onclick="show('s-game')"><span>💎</span><p>GAME</p></div>
        <div class="nav-item" id="n-shop" onclick="show('s-shop')"><span>🛒</span><p>SHOP</p></div>
        <div class="nav-item" id="n-gear" onclick="show('s-gear')"><span>⚙️</span><p>GEAR</p></div>
    </nav>
</div>

<script>
    // --- FIREBASE & CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyDcUMfQAd9QnoPUVxfM9SWp_lHBc2CaRKY",
        authDomain: "juugtaaap.firebaseapp.com",
        databaseURL: "https://juugtaaap-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "juugtaaap",
        storageBucket: "juugtaaap.firebasestorage.app",
        messagingSenderId: "230755213175",
        appId: "1:230755213175:web:60d2bd14da628347284b72"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    tg.expand();

    const user = tg.initDataUnsafe?.user || { id: 5291965471, username: "Player" };
    let state = { score: 0, energy: 150, tapLvl: 1, passiveLvl: 0, lastUpdate: Date.now(), lang: 'en', sound: true };
    let isLoaded = false;

    // --- GAME LOGIC ---
    function updateUI() {
        document.getElementById('score').innerText = Math.floor(state.score).toLocaleString();
        document.getElementById('passive-display').innerText = `Passive: ${state.passiveLvl}/sec`;
        document.getElementById('e-text').innerText = `${state.energy} / 150`;
        document.getElementById('e-fill').style.width = (state.energy / 1.5) + '%';
        document.getElementById('p-name').innerText = "@" + (user.username || "Juuger");
    }

    document.getElementById('tapBtn').addEventListener('pointerdown', (e) => {
        if (!isLoaded || state.energy <= 0) return;
        state.score += state.tapLvl;
        state.energy--;
        updateUI();
        if(state.sound) tg.HapticFeedback.impactOccurred('medium');
        
        // Flying number
        const n = document.createElement('div');
        n.style.position = 'fixed'; n.style.left = e.clientX + 'px'; n.style.top = e.clientY + 'px';
        n.style.color = '#fff'; n.style.fontWeight = '900'; n.style.pointerEvents = 'none';
        n.style.zIndex = '100'; n.innerText = `+${state.tapLvl}`;
        n.animate([{transform:'translateY(0)', opacity:1}, {transform:'translateY(-100px)', opacity:0}], {duration:600});
        document.body.appendChild(n); setTimeout(() => n.remove(), 600);
    });

    // --- SHOP ---
    window.openUpgrade = (type) => {
        document.getElementById('shop-main').classList.add('hidden');
        document.getElementById('shop-detail').classList.remove('hidden');
        renderUpgrades(type);
    };

    window.backToShop = () => {
        document.getElementById('shop-main').classList.remove('hidden');
        document.getElementById('shop-detail').classList.add('hidden');
    };

    function renderUpgrades(type) {
        const cont = document.getElementById('upgrade-items');
        const lvl = type === 'click' ? state.tapLvl : state.passiveLvl;
        const price = Math.floor(100 * Math.pow(1.5, lvl));
        cont.innerHTML = `
            <div class="card">
                <div><b>Level ${lvl}</b><br><small>Next: +1 ${type}</small></div>
                <button class="buy-btn" ${state.score < price ? 'disabled' : ''} onclick="buy('${type}', ${price})">${price}</button>
            </div>
        `;
    }

    window.buy = (type, p) => {
        if (state.score >= p) {
            state.score -= p;
            if (type === 'click') state.tapLvl++; else state.passiveLvl++;
            if(state.sound) tg.HapticFeedback.notificationOccurred('success');
            updateUI(); renderUpgrades(type); save();
        }
    };

    // --- SYSTEM ---
    window.show = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('n-' + id.split('-')[1]).classList.add('active');
    };

    function save() { if(isLoaded) db.ref(`users/${user.id}`).update({...state, lastUpdate: Date.now()}); }

    // Init Data
    db.ref(`users/${user.id}`).once('value', (snap) => {
        const d = snap.val();
        if (d) {
            const now = Date.now();
            const diff = Math.floor((now - (d.lastUpdate || now)) / 1000);
            state = {...state, ...d, score: (d.score || 0) + (diff * (d.passiveLvl || 0)), energy: Math.min(150, (d.energy || 150) + diff)};
        }
        isLoaded = true;
        updateUI();
        setTimeout(() => {
            const ls = document.getElementById('loading-screen');
            ls.style.opacity = '0';
            ls.style.transform = 'scale(1.2)';
            setTimeout(() => ls.remove(), 800);
        }, 2000);
    });

    setInterval(() => {
        if (isLoaded) {
            state.score += (state.passiveLvl || 0);
            if (state.energy < 150) state.energy++;
            updateUI();
        }
    }, 1000);
    setInterval(save, 10000);

    // Canvas BG
    const cvs = document.getElementById('particleCanvas');
    const ctx = cvs.getContext('2d');
    let pts = [];
    function res() { cvs.width = window.innerWidth; cvs.height = window.innerHeight; }
    window.onresize = res; res();
    for(let i=0; i<30; i++) pts.push({x:Math.random()*cvs.width, y:Math.random()*cvs.height, s:Math.random()*2, vx:Math.random()-0.5, vy:Math.random()-0.5});
    function draw() {
        ctx.clearRect(0,0,cvs.width,cvs.height);
        ctx.fillStyle = '#fff';
        pts.forEach(p => {
            p.x+=p.vx; p.y+=p.vy;
            if(p.x<0||p.x>cvs.width) p.vx*=-1; if(p.y<0||p.y>cvs.height) p.vy*=-1;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
