<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JuugTAPS</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --b: #000; --w: #fff; --g: #111; --sg: #222; --accent: rgba(255,255,255,0.8); --red: #ff4444; --green: #00ff88; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--b); color: var(--w); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.5s ease; }
        .loader-logo { width: 150px; height: 150px; margin-bottom: 30px; object-fit: contain; }
        .loader-bar { width: 180px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; position: relative; }
        .loader-progress { width: 60%; height: 100%; background: #fff; box-shadow: 0 0 15px #fff; position: absolute; animation: loadAnim 1.5s infinite ease-in-out; }
        @keyframes loadAnim { 0% { left: -100%; } 100% { left: 100%; } }

        #maint-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        #maint-screen h1 { font-size: 40px; margin-bottom: 20px; font-weight: 900; letter-spacing: -1px; }
        #maint-msg { color: #888; font-size: 14px; font-weight: 700; max-width: 80%; line-height: 1.4; }

        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; position: relative; height: 100%; z-index: 1; overflow: hidden; }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; padding-bottom: 140px; opacity: 0; pointer-events: none; transform: translateY(15px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .screen.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .hidden { display: none !important; }

        .header { width: 100%; display: flex; justify-content: space-between; font-weight: 700; font-size: 14px; margin-bottom: 20px; color: #555; }
        #score { font-size: 72px; font-weight: 900; margin-top: 5px; letter-spacing: -2px; }
        
        .tap-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; min-height: 300px; }
        .main-circle { width: 240px; height: 240px; border: 4px solid var(--w); border-radius: 50%; transition: transform 0.05s ease-out; background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 70%); box-shadow: 0 0 20px rgba(255,255,255,0.05); position: relative; z-index: 2; touch-action: manipulation; }
        .main-circle.is-active { transform: scale(0.92); background: rgba(255,255,255,0.15); }

        .tap-effect { position: absolute; pointer-events: none; color: #fff; font-weight: 900; font-size: 26px; animation: floatUp 0.6s ease-out forwards; z-index: 10; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }

        .energy-box { width: 100%; text-align: center; margin-bottom: 20px; position: relative; }
        .bar-bg { height: 24px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; margin: 15px 0; overflow: hidden; position: relative; backdrop-filter: blur(5px); }
        #e-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #fff 0%, rgba(200,200,200,0.8) 100%); transition: width 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 0 0 15px rgba(255,255,255,0.2); position: relative; }
        #e-text { position: absolute; width: 100%; left: 0; top: 50%; transform: translateY(-50%); font-size: 10px; font-weight: 900; letter-spacing: 1px; color: var(--w); text-shadow: 0 0 5px #000; z-index: 10; mix-blend-mode: difference; }

        .card { width: 100%; background: var(--g); border: 1px solid var(--sg); padding: 18px; border-radius: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; position: relative; overflow: hidden; }
        .card:active { transform: scale(0.98); background: #151515; }
        .card.special { border: 1px solid rgba(255,255,255,0.3); background: linear-gradient(145deg, #111, #050505); }
        .card.disabled { opacity: 0.5; pointer-events: none; filter: grayscale(1); }
        
        .buy-btn { background: var(--w); color: var(--b); border: none; padding: 10px 18px; border-radius: 8px; font-weight: 900; font-size: 14px; min-width: 80px; transition: 0.2s; }
        .buy-btn:disabled { background: #333; color: #555; transform: none !important; }

        nav { position: absolute; bottom: 0; width: 100%; display: flex; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); border-top: 1px solid var(--sg); padding: 15px 0 35px; z-index: 100; }
        .nav-item { flex: 1; text-align: center; color: #444; font-size: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; position: relative; }
        .nav-item.active { color: var(--w); transform: translateY(-2px); }
        .nav-item span { display: block; font-size: 24px; margin-bottom: 4px; filter: grayscale(1) brightness(2); transition: 0.3s; }
        .nav-item.active span { filter: grayscale(0) brightness(1); color: #fff; }

        .top-user { width: 100%; background: var(--g); border: 1px solid var(--sg); padding: 15px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; transition: 0.3s; }
        .top-rank { font-weight: 900; width: 30px; color: #555; font-size: 18px; }
        .top-info { flex: 1; text-align: left; padding-left: 10px; }
        .top-name { font-weight: 800; font-size: 15px; letter-spacing: -0.5px; }
        .top-score { font-size: 14px; font-weight: 900; color: #fff; }

        .settings-btn { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--sg); background: var(--g); color: #fff; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }

        #winners-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 15000; display: none; flex-direction: column; align-items: center; padding: 40px 20px; text-align: center; overflow-y: auto; backdrop-filter: blur(10px); }
        .winner-card { width: 100%; background: var(--g); border: 1px solid var(--sg); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        
        .winners-btn { width: 100%; padding: 18px; border-radius: 14px; background: #fff; color: #000; font-weight: 900; margin-bottom: 15px; border: none; display: none; text-transform: uppercase; letter-spacing: 1px; }

        #admin-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .admin-content { background: #111; width: 100%; max-width: 400px; border-radius: 20px; padding: 20px; border: 1px solid #333; max-height: 80vh; overflow-y: auto; }
        .admin-btn { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: none; font-weight: 800; color: #fff; cursor: pointer; }
        .btn-start { background: var(--green); color: #000; }
        .btn-danger { background: var(--red); }
        .btn-neutral { background: #222; }
    </style>
</head>

            <button class="buy-btn" id="case-btn">OPEN</button>
        </div>

        <div style="width: 100%; margin: 20px 0 10px; font-size: 12px; font-weight: 900; color: #444; letter-spacing: 1px;">UPGRADES</div>
        <div id="up-click-cont" style="width: 100%;"></div>
        <div id="up-pass-cont" style="width: 100%;"></div>
    </div>

    <div id="s-gear" class="screen">
        <h2 id="t-gear-title" style="font-size: 32px; font-weight: 900; margin-bottom: 25px; width: 100%; letter-spacing: -1px;">SETTINGS</h2>
        <div class="settings-btn" onclick="toggleLang()">
            <span id="t-lang-label">LANGUAGE</span>
            <span id="cur-lang" style="color: var(--accent);">EN</span>
        </div>
        <div class="settings-btn" onclick="toggleSound()">
            <span id="t-sound-label">HAPTIC FEEDBACK</span>
            <span id="cur-sound" style="color: var(--accent);">ON</span>
        </div>
        <div style="margin-top: auto; color: #333; font-size: 10px; font-weight: 800; letter-spacing: 2px;">JUUGTAPS V2.0</div>
    </div>

    <nav>
        <div class="nav-item" onclick="show('top')" id="nav-top"><span>🏆</span><p id="t-nav-top">TOP</p></div>
        <div class="nav-item active" onclick="show('game')" id="nav-game"><span>⚡</span><p id="t-nav-game">GAME</p></div>
        <div class="nav-item" onclick="show('shop')" id="nav-shop"><span>💎</span><p id="t-nav-shop">SHOP</p></div>
        <div class="nav-item" onclick="show('gear')" id="nav-gear"><span>⚙️</span><p id="t-nav-gear">GEAR</p></div>
    </nav>
</div>

<div id="winners-popup">
    <h2 id="t-winners-title" style="font-size: 32px; font-weight: 900; margin-bottom: 25px;">WINNERS</h2>
    <div id="winners-list" style="width: 100%; margin-bottom: 20px;"></div>
    <button class="buy-btn" onclick="closeWinners()" style="width: 100%; padding: 18px;">CLOSE</button>
</div>

<div id="admin-modal" onclick="closeAdmin(event)">
    <div class="admin-content">
        <h2 style="margin-bottom: 20px; font-weight: 900; letter-spacing: -1px;">ADMIN PANEL</h2>
        <button class="admin-btn btn-start" onclick="adminStartEvent()">START WINNER EVENT</button>
        <button class="admin-btn btn-danger" onclick="adminStopEvent()">STOP EVENT & RESET ALL</button>
        <button class="admin-btn btn-neutral" onclick="adminToggleMaint()">TOGGLE MAINTENANCE</button>
        <input type="text" id="admin-maint-msg" placeholder="Maint message..." style="width: 100%; padding: 12px; margin-bottom: 15px; background: #222; border: 1px solid #333; color: #fff; border-radius: 8px;">
        
        <div style="border-top: 1px solid #333; margin: 15px 0; padding-top: 15px;">
            <p style="font-size: 12px; font-weight: 800; color: #555; margin-bottom: 10px;">GIVE POINTS TO ID:</p>
            <input type="text" id="admin-user-id" placeholder="User ID" style="width: 100%; padding: 12px; margin-bottom: 10px; background: #222; border: 1px solid #333; color: #fff; border-radius: 8px;">
            <input type="number" id="admin-user-pts" placeholder="Points" style="width: 100%; padding: 12px; margin-bottom: 15px; background: #222; border: 1px solid #333; color: #fff; border-radius: 8px;">
            <button class="admin-btn btn-neutral" onclick="adminGivePoints()">GIVE POINTS</button>
        </div>
        
        <button class="admin-btn btn-neutral" onclick="document.getElementById('admin-modal').style.display='none'" style="margin-top: 10px;">CLOSE</button>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = { databaseURL: "https://juugtaaap-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const tg = window.Telegram.WebApp;
    tg.expand();
    const userId = tg.initDataUnsafe?.user?.id || "local_user";
    const userName = tg.initDataUnsafe?.user?.first_name || "Guest";

    let state = {
        score: 0, tapLvl: 1, passiveLvl: 0, energy: 1000, maxE: 1000,
        lastSave: Date.now(), lastCase: 0, lang: 'en', sound: true
    };

    const langData = {
        en: { scoreL: 'SCORE', tapL: 'TAP POWER', topT: 'LEADERS', shopT: 'SHOP', clUp: 'Click Multiplier', clDe: 'Increase tap power', psUp: 'Passive Income', psDe: 'Earn while away', back: 'BACK', gearT: 'SETTINGS', langL: 'LANGUAGE', soundL: 'HAPTIC FEEDBACK', navTop: 'TOP', navGame: 'GAME', navShop: 'SHOP', navGear: 'GEAR', caseName: 'DAILY CASE', caseOpen: 'OPEN', winTitle: 'WINNERS', showWin: 'SHOW WINNERS' },
        ru: { scoreL: 'СЧЕТ', tapL: 'СИЛА КЛИКА', topT: 'ЛИДЕРЫ', shopT: 'МАГАЗИН', clUp: 'Множитель клика', clDe: 'Увеличить силу клика', psUp: 'Пассивный доход', psDe: 'Доход в секунду', back: 'НАЗАД', gearT: 'НАСТРОЙКИ', langL: 'ЯЗЫК', soundL: 'ВИБРООТКЛИК', navTop: 'ТОП', navGame: 'ИГРА', navShop: 'МАГАЗИН', navGear: 'ОПЦИИ', caseName: 'ЕЖЕДНЕВНЫЙ КЕЙС', caseOpen: 'ОТКРЫТЬ', winTitle: 'ПОБЕДИТЕЛИ', showWin: 'СПИСОК ПОБЕДИТЕЛЕЙ' }
    };

    // ФУНКЦИЯ ДЛЯ ПОЛУЧЕНИЯ НАЗВАНИЯ РАНГА (ИСПРАВЛЕНО)
    function getRankName(level) {
        if(level < 5) return "Noob Juug'er";
        if(level < 15) return "Street Juug'er";
        if(level < 30) return "Hustle Juug'er";
        if(level < 50) return "Trap Lord";
        if(level < 80) return "Juug Master";
        return "Juug Legend";
    }

    // --- ADMIN LOGIC ---
    function adminStartEvent() { db.ref('settings/event').set({ active: true, startTime: Date.now() }); }
    function adminStopEvent() {
        db.ref('users').once('value', s => {
            const users = s.val();
            let arr = [];
            for(let id in users) arr.push({ id, name: users[id].name, score: users[id].score });
            arr.sort((a,b) => b.score - a.score);
            const winners = arr.slice(0, 3);
            db.ref('winners').push({ date: Date.now(), list: winners });
            for(let id in users) db.ref('users/'+id).update({ score: 0, tapLvl: 1, passiveLvl: 0 });
            db.ref('settings/event').set({ active: false });
        });
    }
    function adminToggleMaint() {
        db.ref('settings/maint').once('value', s => {
            const cur = s.val()?.active || false;
            db.ref('settings/maint').set({ active: !cur, msg: document.getElementById('admin-maint-msg').value || "Technical maintenance" });
        });
    }
    function adminGivePoints() {
        const id = document.getElementById('admin-user-id').value;
        const pts = parseInt(document.getElementById('admin-user-pts').value);
        if(id && pts) db.ref('users/'+id+'/score').transaction(c => (c || 0) + pts);
    }
    function closeAdmin(e) { if(e.target.id === 'admin-modal') e.target.style.display = 'none'; }

    let gearTimer;
    document.getElementById('nav-gear').addEventListener('touchstart', () => { gearTimer = setTimeout(() => { document.getElementById('admin-modal').style.display='flex'; }, 3000); });
    document.getElementById('nav-gear').addEventListener('touchend', () => clearTimeout(gearTimer));

    // --- GAME ENGINE ---
    function show(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('s-' + screenId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('nav-' + screenId).classList.add('active');
        if(screenId === 'top') updateTop();
        if(screenId === 'shop') { renderUp('click'); renderUp('pass'); updateCaseUI(); }
    }

    function updateUI() {
        document.getElementById('score').innerText = Math.floor(state.score).toLocaleString();
        document.getElementById('tap-val').innerText = state.tapLvl;
        const p = (state.energy / state.maxE) * 100;
        document.getElementById('e-fill').style.width = p + '%';
        document.getElementById('e-text').innerText = `${Math.floor(state.energy)} / ${state.maxE}`;
    }

    function renderUp(t) {
        const cont = document.getElementById(t === 'click' ? 'up-click-cont' : 'up-pass-cont');
        const lvl = t === 'click' ? state.tapLvl : state.passiveLvl;
        const price = t === 'click' ? Math.floor(10 * Math.pow(1.5, lvl-1)) : Math.floor(50 * Math.pow(1.6, lvl));
        const name = t === 'click' ? langData[state.lang].clUp : langData[state.lang].psUp;
        const desc = t === 'click' ? langData[state.lang].clDe : langData[state.lang].psDe;
        
        cont.innerHTML = `
            <div class="card" onclick="buy('${t}', ${price})">
                <div style="display: flex; align-items: center;">
                    <span style="font-size: 24px; margin-right: 15px;">${t==='click'?'⚡':'💰'}</span>
                    <div>
                        <div style="font-weight: 900; font-size: 15px;">${getRankName(lvl)}</div>
                        <div style="font-size: 11px; color: #555; font-weight: 800; margin-top: 2px;">LVL ${lvl} • ${desc}</div>
                    </div>
                </div>
                <button class="buy-btn" ${state.score < price ? 'disabled' : ''}>${price}</button>
            </div>`;
    }

    function buy(t, p) {
        if(state.score >= p) {
            state.score -= p;
            if(t === 'click') state.tapLvl++;
            else state.passiveLvl++;
            updateUI(); renderUp(t); save();
            if(state.sound) tg.HapticFeedback.notificationOccurred('success');
        }
    }

    function updateTop() {
        db.ref('users').orderByChild('score').limitToLast(20).once('value', s => {
            const list = document.getElementById('top-list');
            list.innerHTML = '';
            let arr = [];
            s.forEach(child => { arr.push(child.val()); });
            arr.reverse();
            arr.forEach((u, i) => {
                list.innerHTML += `
                    <div class="top-user" style="${u.id == userId ? 'border: 1px solid #fff;' : ''}">
                        <div class="top-rank">${i+1}</div>
                        <div class="top-info">
                            <div class="top-name">${u.name} ${u.id == userId ? '(YOU)' : ''}</div>
                            <div style="font-size: 10px; font-weight: 900; color: #555; text-transform: uppercase;">JUUG'ER</div>
                        </div>
                        <div class="top-score">${Math.floor(u.score).toLocaleString()}</div>
                    </div>`;
            });
        });
    }

    // --- CASE LOGIC ---
    function updateCaseUI() {
        const now = Date.now();
        const wait = 24 * 60 * 60 * 1000;
        const diff = now - state.lastCase;
        if(diff < wait) {
            const left = wait - diff;
            const h = Math.floor(left / 3600000);
            const m = Math.floor((left % 3600000) / 60000);
            document.getElementById('case-timer').innerText = `${h}H ${m}M LEFT`;
            document.getElementById('case-timer').style.color = '#555';
            document.getElementById('case-btn').disabled = true;
        } else {
            document.getElementById('case-timer').innerText = 'READY TO OPEN';
            document.getElementById('case-timer').style.color = var(--green);
            document.getElementById('case-btn').disabled = false;
        }
    }

    function openCase() {
        const now = Date.now();
        if(now - state.lastCase >= 24 * 60 * 60 * 1000) {
            const win = Math.floor(Math.random() * (10000 - 100 + 1)) + 100;
            state.score += win;
            state.lastCase = now;
            updateUI(); updateCaseUI(); save();
            alert(`CASE OPENED! YOU GOT ${win} POINTS!`);
        }
    }

    // --- SYSTEM ---
    function save() { db.ref('users/' + userId).set({ id: userId, name: userName, score: state.score, tapLvl: state.tapLvl, passiveLvl: state.passiveLvl, lastCase: state.lastCase }); }
    
    db.ref('users/' + userId).once('value', s => {
        if(s.exists()) {
            const d = s.val();
            state.score = d.score || 0;
            state.tapLvl = d.tapLvl || 1;
            state.passiveLvl = d.passiveLvl || 0;
            state.lastCase = d.lastCase || 0;
        }
        document.getElementById('loading-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
        updateUI(); updateLangUI();
    });

    setInterval(() => {
        state.score += state.passiveLvl / 10;
        if(state.energy < state.maxE) state.energy = Math.min(state.maxE, state.energy + 1);
        updateUI();
    }, 100);

    document.getElementById('circle').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(state.energy >= 1) {
            state.score += state.tapLvl; state.energy -= 1;
            updateUI();
            if(state.sound) tg.HapticFeedback.impactOccurred('medium');
            
            const touch = e.touches[0];
            const effect = document.createElement('div');
            effect.className = 'tap-effect';
            effect.innerText = '+' + state.tapLvl;
            effect.style.left = touch.pageX + 'px';
            effect.style.top = touch.pageY + 'px';
            document.body.appendChild(effect);
            setTimeout(() => effect.remove(), 600);
        }
    });

    function toggleLang() { state.lang = state.lang === 'en' ? 'ru' : 'en'; updateLangUI(); renderUp('click'); renderUp('pass'); }
    function toggleSound() { state.sound = !state.sound; document.getElementById('cur-sound').innerText = state.sound ? "ON" : "OFF"; }

    function updateLangUI() {
        const l = langData[state.lang];
        const ids = { 't-score-label':'scoreL', 't-tap-label':'tapL', 't-top-title':'topT', 't-shop-title':'shopT', 't-gear-title':'gearT', 't-lang-label':'langL', 't-sound-label':'soundL', 't-nav-top':'navTop', 't-nav-game':'navGame', 't-nav-shop':'navShop', 't-nav-gear':'navGear', 't-case-name':'caseName', 'case-btn':'caseOpen', 't-winners-title':'winTitle', 'show-winners-btn':'showWin' };
        for(let id in ids) { const e = document.getElementById(id); if(e) e.innerText = l[ids[id]]; }
        document.getElementById('cur-lang').innerText = state.lang.toUpperCase();
        document.getElementById('cur-sound').innerText = state.sound ? "ON" : "OFF";
    }

    db.ref('settings/event').on('value', s => {
        const ev = s.val();
        document.getElementById('show-winners-btn').style.display = (ev && ev.active) ? 'none' : 'block';
    });
    db.ref('settings/maint').on('value', s => {
        const m = s.val();
        if(m && m.active) {
            document.getElementById('maint-screen').style.display = 'flex';
            document.getElementById('maint-msg').innerText = m.msg;
        } else { document.getElementById('maint-screen').style.display = 'none'; }
    });

    function showWinners() {
        db.ref('winners').limitToLast(5).once('value', s => {
            const list = document.getElementById('winners-list');
            list.innerHTML = '';
            s.forEach(snap => {
                const data = snap.val();
                let inner = `<div style="margin-bottom: 20px;"><p style="font-size: 10px; font-weight: 900; color: #555; margin-bottom: 10px;">EVENT: ${new Date(data.date).toLocaleDateString()}</p>`;
                data.list.forEach((w, i) => {
                    inner += `<div class="winner-card"><span>#${i+1} ${w.name}</span><b>${w.score}</b></div>`;
                });
                inner += `</div>`;
                list.innerHTML = inner + list.innerHTML;
            });
            document.getElementById('winners-popup').style.display = 'flex';
        });
    }
    function closeWinners() { document.getElementById('winners-popup').style.display = 'none'; }

    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let particles = [];
    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 0.1;
            this.speedX = Math.random() * 0.5 - 0.25;
            this.speedY = Math.random() * 0.5 - 0.25;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x > canvas.width) this.x = 0;
            if (this.x < 0) this.x = canvas.width;
            if (this.y > canvas.height) this.y = 0;
            if (this.y < 0) this.y = canvas.height;
        }
        draw() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        }
    }
    for (let i = 0; i < 50; i++) particles.push(new Particle());
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
