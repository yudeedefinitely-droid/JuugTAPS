<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JuugTAPS</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --b: #000; --w: #fff; --g: #111; --sg: #222; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--b); color: var(--w); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        
        /* Холст для частиц */
        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; position: relative; height: 100%; z-index: 1; }
        .screen { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; padding-bottom: 120px; }
        .hidden { display: none !important; }

        .header { width: 100%; display: flex; justify-content: space-between; font-weight: 700; font-size: 14px; margin-bottom: 20px; color: #555; }
        #score { font-size: 72px; font-weight: 900; margin-top: 5px; }
        .tap-area { flex: 1; display: flex; align-items: center; justify-content: center; }
        .main-circle { width: 280px; height: 280px; border: 4px solid var(--w); border-radius: 50%; transition: transform 0.1s; background: rgba(255,255,255,0.05); }
        .main-circle:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }

        .energy-box { width: 100%; text-align: center; margin-bottom: 20px; }
        .bar-bg { height: 10px; background: #1a1a1a; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #e-fill { height: 100%; width: 100%; background: #fff; transition: width 0.2s; }

        .card { width: 100%; background: var(--g); border: 1px solid var(--sg); padding: 18px; border-radius: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .buy-btn { background: var(--w); color: var(--b); border: none; padding: 10px 18px; border-radius: 8px; font-weight: 900; min-width: 80px; }
        .buy-btn:disabled { background: #333; color: #555; }

        nav { position: absolute; bottom: 0; width: 100%; display: flex; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border-top: 1px solid var(--sg); padding: 15px 0 35px; }
        .nav-item { flex: 1; text-align: center; color: #444; font-size: 11px; font-weight: 800; cursor: pointer; }
        .nav-item.active { color: var(--w); }
        .nav-item span { display: block; font-size: 22px; margin-bottom: 4px; }
        
        .settings-btn { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--sg); background: var(--g); color: #fff; font-weight: 800; text-align: left; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<div id="app">
    <section id="s-game" class="screen">
        <div class="header"><span id="p-name">@loading</span><span id="sync-text">SYNCING...</span></div>
        <p id="t-score-label" style="font-size:12px; font-weight:800; letter-spacing:2px;">SCORE</p>
        <div id="score">0</div>
        <div id="passive-display" style="color:#888; font-size:12px; font-weight:800;">Passive: 0/sec</div>
        <div class="tap-area"><div class="main-circle" id="tapBtn"></div></div>
        <div class="energy-box">
            <p id="t-tap-label" style="font-size:12px; font-weight:800;">TAP TO EARN</p>
            <div class="bar-bg"><div id="e-fill"></div></div>
            <b id="e-text">150 / 150</b>
        </div>
    </section>

    <section id="s-top" class="screen hidden">
        <h2 id="t-top-title" style="align-self:flex-start; margin-bottom:20px; font-weight:900;">TOP 5 JUUG'ERS</h2>
        <div id="leaderboard-list" style="width:100%;"></div>
    </section>

    <section id="s-shop" class="screen hidden">
        <h2 id="t-shop-title" style="align-self:flex-start; margin-bottom:20px; font-weight:900;">SHOP</h2>
        <div id="shop-main" style="width:100%;">
            <div class="card" onclick="openUpgrade('click')">
                <div style="flex:1"><b id="t-click-up">CLICK UPGRADES</b><br><span id="t-click-desc" style="font-size:11px; color:#666">Increase tap income</span></div>
                <span>➔</span>
            </div>
            <div class="card" onclick="openUpgrade('passive')">
                <div style="flex:1"><b id="t-pass-up">PASSIVE INCOME</b><br><span id="t-pass-desc" style="font-size:11px; color:#666">Automatic income</span></div>
                <span>➔</span>
            </div>
        </div>
        <div id="shop-detail" class="hidden" style="width:100%;">
            <button id="t-back" onclick="backToShop()" style="background:none; border:none; color:#555; font-weight:800; margin-bottom:15px; cursor:pointer;">← BACK</button>
            <div id="upgrade-items"></div>
        </div>
    </section>

    <section id="s-gear" class="screen hidden">
        <h2 id="t-gear-title" style="align-self:flex-start; margin-bottom:20px; font-weight:900;">GEAR</h2>
        <button class="settings-btn" onclick="toggleLang()">
            <span id="t-lang-label">Language</span>
            <span id="cur-lang" style="color:#888">English</span>
        </button>
        <button class="settings-btn" onclick="toggleSound()">
            <span id="t-sound-label">Sound</span>
            <span id="cur-sound" style="color:#888">ON</span>
        </button>
    </section>

    <nav>
        <div class="nav-item" id="n-top" onclick="show('s-top')"><span>🏆</span><p id="t-nav-top">TOP</p></div>
        <div class="nav-item active" id="n-game" onclick="show('s-game')"><span>💎</span><p id="t-nav-game">GAME</p></div>
        <div class="nav-item" id="n-shop" onclick="show('s-shop')"><span>🎁</span><p id="t-nav-shop">SHOP</p></div>
        <div class="nav-item" id="n-gear" onclick="show('s-gear')"><span>⚙️</span><p id="t-nav-gear">GEAR</p></div>
    </nav>
</div>

<script>
    // --- FIREBASE & TG ---
    const firebaseConfig = {
        apiKey: "AIzaSyDcUMfQAd9QnoPUVxfM9SWp_lHBc2CaRKY",
        authDomain: "juugtaaap.firebaseapp.com",
        databaseURL: "https://juugtaaap-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "juugtaaap",
        storageBucket: "juugtaaap.firebasestorage.app",
        messagingSenderId: "230755213175",
        appId: "1:230755213175:web:60d2bd14da628347284b72"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    tg.expand();

    // --- GAME STATE ---
    let user = { 
        score: 0, 
        energy: 150, 
        maxEnergy: 150, 
        clickPower: 1, 
        passive: 0, 
        lastUpdate: Date.now(),
        upgrades: { click: 0, passive: 0 }
    };
    let userId = tg.initDataUnsafe.user?.id || "test_user";
    document.getElementById('p-name').innerText = "@" + (tg.initDataUnsafe.user?.username || "Player");

    // --- PARTICLES ---
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();
    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 0.5;
            this.speedX = (Math.random() - 0.5) * 0.3;
            this.speedY = (Math.random() - 0.5) * 0.3;
            this.opacity = Math.random() * 0.4 + 0.1;
        }
        update() {
            this.x += this.speedX; this.y += this.speedY;
            if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height) this.reset();
        }
        draw() {
            ctx.fillStyle = `rgba(255,255,255,${this.opacity})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        }
    }
    for(let i=0; i<40; i++) particles.push(new Particle());
    function animate() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();

    // --- CORE LOGIC ---
    function updateUI() {
        document.getElementById('score').innerText = Math.floor(user.score);
        document.getElementById('passive-display').innerText = `Passive: ${user.passive}/sec`;
        document.getElementById('e-text').innerText = `${Math.floor(user.energy)} / ${user.maxEnergy}`;
        document.getElementById('e-fill').style.width = (user.energy / user.maxEnergy * 100) + "%";
    }

    const tapBtn = document.getElementById('tapBtn');
    tapBtn.addEventListener('click', () => {
        if (user.energy >= 1) {
            user.score += user.clickPower;
            user.energy -= 1;
            updateUI();
            saveData();
        }
    });

    // Регенерация энергии и пассивный доход
    setInterval(() => {
        if (user.energy < user.maxEnergy) user.energy = Math.min(user.maxEnergy, user.energy + 1);
        user.score += user.passive;
        updateUI();
    }, 1000);

    // --- NAVIGATION ---
    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('n-' + id.split('-')[1]).classList.add('active');
        if(id === 's-top') loadLeaderboard();
    }

    // --- SHOP LOGIC ---
    const upgradeData = {
        click: [
            { name: "Squeegee", price: 50, power: 1 },
            { name: "High-Rise Kit", price: 500, power: 5 }
        ],
        passive: [
            { name: "Small Team", price: 100, inc: 1 },
            { name: "Juug Drone", price: 1000, inc: 10 }
        ]
    };

    function openUpgrade(type) {
        document.getElementById('shop-main').classList.add('hidden');
        document.getElementById('shop-detail').classList.remove('hidden');
        const container = document.getElementById('upgrade-items');
        container.innerHTML = '';
        
        upgradeData[type].forEach((up, index) => {
            const level = user.upgrades[type];
            const price = Math.floor(up.price * Math.pow(1.5, level));
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div><b>${up.name}</b><br><small>Cost: ${price}</small></div>
                <button class="buy-btn" onclick="buy('${type}', ${index})" ${user.score < price ? 'disabled' : ''}>BUY</button>
            `;
            container.appendChild(card);
        });
    }

    function backToShop() {
        document.getElementById('shop-main').classList.remove('hidden');
        document.getElementById('shop-detail').classList.add('hidden');
    }

    function buy(type, index) {
        const up = upgradeData[type][index];
        const level = user.upgrades[type];
        const price = Math.floor(up.price * Math.pow(1.5, level));

        if (user.score >= price) {
            user.score -= price;
            user.upgrades[type]++;
            if (type === 'click') user.clickPower += up.power;
            if (type === 'passive') user.passive += up.inc;
            updateUI();
            saveData();
            openUpgrade(type);
        }
    }

    // --- DATA SYNC ---
    function saveData() {
        db.ref('users/' + userId).set(user);
    }

    db.ref('users/' + userId).once('value').then(snap => {
        if (snap.exists()) {
            user = snap.val();
            // На случай если структуры не было
            if(!user.upgrades) user.upgrades = {click:0, passive:0};
        }
        updateUI();
        document.getElementById('sync-text').innerText = "SYNCED";
    });

    function loadLeaderboard() {
        db.ref('users').orderByChild('score').limitToLast(5).once('value', snap => {
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = '';
            let items = [];
            snap.forEach(child => { items.push(child.val()); });
            items.reverse().forEach((u, i) => {
                list.innerHTML += `<div class="card"><span>#${i+1} ${u.username || 'User'}</span><b>${Math.floor(u.score)}</b></div>`;
            });
        });
    }

    // --- SETTINGS ---
    function toggleSound() {
        const s = document.getElementById('cur-sound');
        s.innerText = s.innerText === "ON" ? "OFF" : "ON";
    }
    function toggleLang() {
        const l = document.getElementById('cur-lang');
        l.innerText = l.innerText === "English" ? "Russian" : "English";
    }
</script>
</body>
</html>
