<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JuugTAPS</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --b: #000; --w: #fff; --g: #111; --sg: #222; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--b); color: var(--w); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        
        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; position: relative; height: 100%; }
        .screen { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; padding-bottom: 120px; }
        .hidden { display: none !important; }

        /* Header */
        .header { width: 100%; display: flex; justify-content: space-between; font-weight: 700; font-size: 14px; margin-bottom: 20px; }
        #event-timer.active { color: #fff; text-shadow: 0 0 10px #fff; }

        /* Game UI */
        #score { font-size: 64px; font-weight: 900; margin-top: 10px; }
        #passive-display { color: #888; font-size: 14px; margin-bottom: 30px; font-weight: bold; }
        .tap-area { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 300px; }
        .main-circle { 
            width: 280px; height: 280px; border: 4px solid var(--w); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900;
            transition: transform 0.05s; 
        }
        .main-circle:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }

        /* Progress Bar */
        .energy-box { width: 100%; text-align: center; margin-bottom: 20px; }
        .bar-bg { height: 8px; background: #1a1a1a; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        #e-fill { height: 100%; width: 100%; background: #fff; transition: width 0.2s; }

        /* Shop & Leaderboard Cards */
        .shop-tabs { display: flex; width: 100%; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; background: var(--g); border: 1px solid var(--sg); color: #555; font-weight: 900; border-radius: 8px; cursor: pointer; }
        .tab-btn.active { color: var(--w); border-color: var(--w); }

        .card { width: 100%; background: var(--g); border: 1px solid var(--sg); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .up-info b { display: block; font-size: 16px; }
        .up-info span { font-size: 12px; color: #666; font-weight: bold; }
        .buy-btn { background: var(--w); color: var(--b); border: none; padding: 10px 15px; border-radius: 6px; font-weight: 900; }
        .buy-btn:disabled { background: #333; color: #555; }

        /* Leaderboard Specific */
        .leader-rank { font-size: 20px; font-weight: 900; min-width: 35px; }
        .leader-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 900; padding-right: 10px; }

        /* Navigation */
        nav { position: absolute; bottom: 0; width: 100%; display: flex; background: var(--b); border-top: 1px solid var(--sg); padding: 15px 0 35px; }
        .nav-item { flex: 1; text-align: center; color: #444; font-size: 11px; font-weight: 800; cursor: pointer; }
        .nav-item.active { color: var(--w); }
        .nav-item span { display: block; font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="app">
    <section id="s-game" class="screen">
        <div class="header"><span id="p-name">@loading</span><span id="event-timer">ИВЕНТ...</span></div>
        <div id="score">0</div>
        <div id="passive-display">Passive: 0/sec</div>
        <div class="tap-area"><div class="main-circle" id="tapBtn">TAP</div></div>
        <div class="energy-box">
            <div class="bar-bg"><div id="e-fill"></div></div>
            <b id="e-text">150 / 150</b>
        </div>
    </section>

    <section id="s-top" class="screen hidden">
        <h2 style="align-self:flex-start; margin-bottom:20px;">TOP 5 JUUG'ERS</h2>
        <div id="leaderboard-list" style="width:100%;"></div>
    </section>

    <section id="s-shop" class="screen hidden">
        <h2 style="align-self:flex-start; margin-bottom:20px;">SHOP</h2>
        <div class="shop-tabs">
            <button class="tab-btn active" id="btn-click" onclick="toggleShop('click')">CLICK</button>
            <button class="tab-btn" id="btn-passive" onclick="toggleShop('passive')">PASSIVE</button>
        </div>
        <div id="shop-items" style="width:100%;"></div>
    </section>

    <section id="s-gear" class="screen hidden">
        <h2 style="align-self:flex-start; margin-bottom:20px;">GEAR</h2>
        <div class="card"><div class="up-info"><b>ADMIN PANEL</b><span id="adm-status">Access Denied</span></div></div>
        <div id="admin-panel" class="hidden" style="width:100%; border:1px solid #ff4444; padding:15px; border-radius:10px;">
            <button id="eventControl" style="width:100%; padding:10px; font-weight:900;">ЗАПУСТИТЬ ИВЕНТ</button>
        </div>
    </section>

    <nav>
        <div class="nav-item" id="n-top" onclick="show('s-top')"><span>🏆</span>TOP</div>
        <div class="nav-item active" id="n-game" onclick="show('s-game')"><span>💎</span>GAME</div>
        <div class="nav-item" id="n-shop" onclick="show('s-shop')"><span>🎁</span>SHOP</div>
        <div class="nav-item" id="n-gear" onclick="show('s-gear')"><span>⚙️</span>GEAR</div>
    </nav>
</div>

<script>
    // FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyDcUMfQAd9QnoPUVxfM9SWp_lHBc2CaRKY",
        authDomain: "juugtaaap.firebaseapp.com",
        databaseURL: "https://juugtaaap-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "juugtaaap",
        storageBucket: "juugtaaap.firebasestorage.app",
        messagingSenderId: "230755213175",
        appId: "1:230755213175:web:60d2bd14da628347284b72"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    tg.expand();

    const MY_ID = 5291965471;
    const player = tg.initDataUnsafe?.user || { id: 5291965471, username: "malenkiydanik" };
    const names = ["Noob Juug'er", "Default Juug'er", "Pro Juug'er", "Hacker Juug'er", "God Juug'er"];
    
    let state = { score: 0, energy: 150, tapLvl: 1, passiveLvl: 0, lastUpdate: Date.now(), username: player.username || "player" };
    let eventEndTime = 0;
    let shopType = 'click';

    function getPrice(lvl) { return Math.floor(100 * Math.pow(1.3, lvl)); }
    function format(num) {
        if (num >= 1e9) return (num / 1e9).toFixed(1) + 'B';
        if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
        if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
        return Math.floor(num);
    }

    // LOAD DATA
    db.ref(`users/${player.id}`).once('value', (snap) => {
        if (snap.val()) {
            state = { ...state, ...snap.val() };
            const offline = Math.floor((Date.now() - state.lastUpdate) / 1000);
            state.score += Math.max(0, offline * state.passiveLvl);
        }
        document.getElementById('p-name').innerText = "@" + state.username;
        updateUI();
    });

    // EVENT SYNC
    db.ref('event').on('value', (snap) => {
        const data = snap.val();
        eventEndTime = (data && data.active) ? data.endTime : 0;
        document.getElementById('eventControl').innerText = eventEndTime ? "СТОП ИВЕНТ" : "СТАРТ ИВЕНТ";
    });

    if (player.id === MY_ID) {
        document.getElementById('admin-panel').classList.remove('hidden');
        document.getElementById('adm-status').innerText = "Administrator Mode";
    }

    document.getElementById('eventControl').onclick = () => {
        db.ref('event').set(eventEndTime ? { active: false, endTime: 0 } : { active: true, endTime: Date.now() + 7776000000 });
    };

    // LEADERBOARD
    function loadLeaderboard() {
        const list = document.getElementById('leaderboard-list');
        list.innerHTML = "Loading...";
        db.ref('users').orderByChild('score').limitToLast(5).once('value', (snap) => {
            list.innerHTML = "";
            let users = [];
            snap.forEach(s => users.push(s.val()));
            users.reverse().forEach((u, i) => {
                const medals = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣'];
                const rank = names[Math.min(Math.floor((u.tapLvl + u.passiveLvl) / 20), 4)];
                list.innerHTML += `
                    <div class="card">
                        <div class="leader-rank">${medals[i]}</div>
                        <div class="leader-name">@${u.username}<br><span>${rank} (Lvl ${u.tapLvl + u.passiveLvl})</span></div>
                        <div style="font-weight:900;">${format(u.score)}</div>
                    </div>`;
            });
        });
    }

    // SHOP
    function renderShop() {
        const cont = document.getElementById('shop-items');
        cont.innerHTML = "";
        const lvl = shopType === 'click' ? state.tapLvl : state.passiveLvl;
        const price = getPrice(lvl + 1);
        const rank = names[Math.min(Math.floor(lvl / 10), 4)];
        cont.innerHTML = `
            <div class="card">
                <div class="up-info"><b>${rank}</b><span>Level ${lvl}/50 (+1 ${shopType})</span></div>
                <button class="buy-btn" ${state.score < price || lvl >= 50 ? 'disabled' : ''} onclick="buy(${price})">${format(price)}</button>
            </div>`;
    }

    window.buy = (p) => {
        if (state.score >= p) {
            state.score -= p;
            if (shopType === 'click') state.tapLvl++; else state.passiveLvl++;
            save(); updateUI(); renderShop();
            tg.HapticFeedback.notificationOccurred('success');
        }
    };

    // GAME LOOP
    document.getElementById('tapBtn').onclick = () => {
        if (state.energy > 0) {
            state.score += state.tapLvl; state.energy--;
            updateUI(); tg.HapticFeedback.impactOccurred('light');
        }
    };

    setInterval(() => {
        state.score += state.passiveLvl;
        if (state.energy < 150) state.energy++;
        updateUI();
        if (Math.random() > 0.9) save();
    }, 1000);

    function updateUI() {
        document.getElementById('score').innerText = format(state.score);
        document.getElementById('passive-display').innerText = `Passive: ${state.passiveLvl}/sec`;
        document.getElementById('e-text').innerText = `${state.energy} / 150`;
        document.getElementById('e-fill').style.width = (state.energy / 1.5) + '%';
        
        const timerEl = document.getElementById('event-timer');
        if (eventEndTime > Date.now()) {
            const d = Math.floor((eventEndTime - Date.now()) / 86400000);
            timerEl.innerText = `EVENT: ${d}d LEFT`;
            timerEl.classList.add('active');
        } else {
            timerEl.innerText = "NO EVENT";
            timerEl.classList.remove('active');
        }
    }

    function save() {
        state.lastUpdate = Date.now();
        db.ref(`users/${player.id}`).set(state);
    }

    window.toggleShop = (t) => { shopType = t; renderShop(); 
        document.getElementById('btn-click').classList.toggle('active', t==='click');
        document.getElementById('btn-passive').classList.toggle('active', t==='passive');
    };

    window.show = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('n-' + id.split('-')[1]).classList.add('active');
        if (id === 's-top') loadLeaderboard();
        if (id === 's-shop') renderShop();
    };
</script>
</body>
</html>
