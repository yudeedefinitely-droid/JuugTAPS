<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JuugTAPS</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --b: #000; --w: #fff; --g: #111; --sg: #222; --accent: rgba(255,255,255,0.8); --red: #ff4444; --green: #00ff88; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--b); color: var(--w); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.5s ease; }
        .loader-logo { width: 150px; height: 150px; margin-bottom: 30px; object-fit: contain; }
        .loader-bar { width: 180px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; position: relative; }
        .loader-progress { width: 60%; height: 100%; background: #fff; box-shadow: 0 0 15px #fff; position: absolute; animation: loadAnim 1.5s infinite ease-in-out; }
        @keyframes loadAnim { 0% { left: -100%; } 100% { left: 100%; } }

        #maint-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; position: relative; height: 100%; z-index: 1; overflow: hidden; }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; padding-bottom: 140px; opacity: 0; pointer-events: none; transform: translateY(15px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .screen.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .hidden { display: none !important; }

        .header { width: 100%; display: flex; justify-content: space-between; font-weight: 700; font-size: 14px; margin-bottom: 20px; color: #555; }
        #score { font-size: 72px; font-weight: 900; margin-top: 5px; }
        
        .tap-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; min-height: 300px; }
        .main-circle { width: 240px; height: 240px; border: 4px solid var(--w); border-radius: 50%; transition: transform 0.05s ease-out; background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%); box-shadow: 0 0 20px rgba(255,255,255,0.05); position: relative; z-index: 2; touch-action: manipulation; }
        .main-circle.is-active { transform: scale(0.92); background: rgba(255,255,255,0.15); }

        .tap-effect { position: absolute; pointer-events: none; color: #fff; font-weight: 900; font-size: 26px; animation: floatUp 0.6s ease-out forwards; z-index: 10; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }

        .energy-box { width: 100%; text-align: center; margin-bottom: 20px; position: relative; }
        .bar-bg { height: 24px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; margin: 15px 0; overflow: hidden; position: relative; backdrop-filter: blur(5px); }
        #e-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #fff 0%, rgba(200,200,200,0.8) 100%); transition: width 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 0 0 15px rgba(255,255,255,0.2); position: relative; }
        #e-text { position: absolute; width: 100%; left: 0; top: 50%; transform: translateY(-50%); font-size: 10px; font-weight: 900; letter-spacing: 1px; color: var(--w); text-shadow: 0 0 5px #000; z-index: 10; mix-blend-mode: difference; }

        .card { width: 100%; background: var(--g); border: 1px solid var(--sg); padding: 18px; border-radius: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .card:active { transform: scale(0.98); background: #151515; }
        .card.special { border: 1px solid rgba(255,255,255,0.3); background: linear-gradient(145deg, #111, #050505); }
        .case-icon { font-size: 24px; margin-right: 15px; }
        .buy-btn { background: var(--w); color: var(--b); border: none; padding: 10px 18px; border-radius: 8px; font-weight: 900; min-width: 80px; }
        .buy-btn:disabled { background: #333; color: #555; cursor: not-allowed; }

        nav { position: absolute; bottom: 0; width: 100%; display: flex; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); border-top: 1px solid var(--sg); padding: 15px 0 35px; z-index: 100; }
        .nav-item { flex: 1; text-align: center; color: #444; font-size: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--w); transform: translateY(-2px); }
        .nav-item span { display: block; font-size: 24px; margin-bottom: 4px; filter: grayscale(1) brightness(2); transition: 0.3s; }
        .nav-item.active span { filter: grayscale(0) brightness(1); color: #fff; }
        
        .settings-btn { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--sg); background: var(--g); color: #fff; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }

        #admin-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .admin-content { background: #111; width: 100%; max-width: 400px; border-radius: 20px; padding: 20px; border: 1px solid #333; max-height: 80vh; overflow-y: auto; }
        .admin-btn { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; color: #fff; }
        .btn-start { background: var(--green); color: #000; }
        .btn-danger { background: var(--red); }
        .btn-neutral { background: #222; }

        #winners-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; color: #000; padding: 25px; border-radius: 20px; z-index: 15000; width: 85%; display: none; text-align: center; box-shadow: 0 0 30px rgba(255,255,255,0.2); }
        .winner-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 14px; }
    </style>
</head>

            </div>

            <div style="width:100%; display:flex; gap:10px; margin-bottom:15px;">
                <div id="tab-click" onclick="renderShop('click')" style="flex:1; padding:12px; background:var(--sg); border-radius:10px; text-align:center; font-weight:800; font-size:12px;">CLICK</div>
                <div id="tab-pass" onclick="renderShop('pass')" style="flex:1; padding:12px; background:var(--g); border-radius:10px; text-align:center; font-weight:800; font-size:12px; color:#555;">PASSIVE</div>
            </div>
            <div id="upgrades-list" style="width:100%;"></div>
        </div>

        <div id="settings-screen" class="screen">
            <h2 id="t-gear-title" style="margin-bottom:20px;">SETTINGS</h2>
            <div class="settings-btn" onclick="toggleLang()">
                <span id="t-lang-label">LANGUAGE</span>
                <span id="cur-lang" style="color:var(--green);">EN</span>
            </div>
            <div class="settings-btn" onclick="toggleSound()">
                <span id="t-sound-label">SOUND EFFECTS</span>
                <span id="cur-sound" style="color:var(--green);">ON</span>
            </div>
            <div style="margin-top:20px; font-size:10px; color:#333;">JuugTAPS v1.0.4</div>
        </div>

        <nav>
            <div class="nav-item active" onclick="showScreen('game-screen')"><span id="t-nav-game">🎮</span>GAME</div>
            <div class="nav-item" onclick="showScreen('shop-screen')"><span id="t-nav-shop">🛒</span>SHOP</div>
            <div class="nav-item" onclick="showScreen('top-screen')"><span id="t-nav-top">🏆</span>TOP</div>
            <div class="nav-item" onclick="showScreen('settings-screen')"><span id="t-nav-gear">⚙️</span>GEAR</div>
        </nav>
    </div>

    <div id="admin-modal">
        <div class="admin-content">
            <h3 style="margin-bottom:15px; text-align:center;">ADMIN PANEL</h3>
            <button class="admin-btn btn-start" onclick="toggleMaintenance(false)">ЗАПУСТИТЬ ПРОЕКТ</button>
            <button class="admin-btn btn-danger" onclick="toggleMaintenance(true)">ТЕХ. ПЕРЕРЫВ (ВЫКЛ)</button>
            <button class="admin-btn btn-neutral" onclick="closeAdmin()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="winners-popup">
        <h3 id="t-winners-title" style="margin-bottom:15px;">CONGRATULATIONS!</h3>
        <div id="winners-list"></div>
        <button class="admin-btn btn-neutral" style="margin-top:15px; background:#000;" onclick="closeWinners()">OK</button>
    </div>

    <script>
    const firebaseConfig = { databaseURL: "https://juugtaps-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    tg.expand();

    let state = {
        id: tg.initDataUnsafe?.user?.id || "local_user",
        name: tg.initDataUnsafe?.user?.first_name || "Anonymous",
        score: 0,
        tapLvl: 1,
        passiveLvl: 0,
        energy: 1000,
        maxEnergy: 1000,
        lastCase: 0,
        lang: 'en',
        sound: true,
        isAdmin: false
    };

    const langData = {
        en: { scoreL: \"POINTS\", tapL: \"TAP POWER\", topT: \"TOP PLAYERS\", shopT: \"SHOP\", clUp: \"Tap Upgrade\", clDe: \"Increases tap power\", psUp: \"Passive Income\", psDe: \"Income per second\", back: \"BACK\", gearT: \"SETTINGS\", langL: \"LANGUAGE\", soundL: \"SOUNDS\", navTop: \"TOP\", navGame: \"GAME\", navShop: \"SHOP\", navGear: \"GEAR\", caseName: \"DAILY CASE\", caseOpen: \"OPEN\", caseWait: \"WAIT\", winTitle: \"WINNERS\", showWin: \"SHOW WINNERS\" },
        ru: { scoreL: \"ОЧКИ\", tapL: \"СИЛА КЛИКА\", topT: \"ТОП ИГРОКОВ\", shopT: \"МАГАЗИН\", clUp: \"Улучшить клик\", clDe: \"Больше очков за нажатие\", psUp: \"Пассивный доход\", psDe: \"Доход в секунду\", back: \"НАЗАД\", gearT: \"НАСТРОЙКИ\", langL: \"ЯЗЫК\", soundL: \"ЗВУКИ\", navTop: \"ТОП\", navGame: \"ИГРА\", navShop: \"МАГАЗИН\", navGear: \"ОПЦИИ\", caseName: \"ЕЖЕДНЕВНЫЙ КЕЙС\", caseOpen: \"ОТКРЫТЬ\", caseWait: \"ЖДИТЕ\", winTitle: \"ПОБЕДИТЕЛИ\", showWin: \"ПОБЕДИТЕЛИ\" }
    };

    function save() {
        localStorage.setItem('jt_state', JSON.stringify(state));
        db.ref('users/' + state.id).set({ name: state.name, score: Math.floor(state.score) });
    }

    function load() {
        const saved = localStorage.getItem('jt_state');
        if(saved) state = {...state, ...JSON.parse(saved)};
        if(state.id == 123456789) state.isAdmin = true;
        updateLangUI();
        updateUI();
        renderShop('click');
        checkMaintenance();
    }

    function updateUI() {
        document.getElementById('score').innerText = Math.floor(state.score);
        document.getElementById('tap-val').innerText = state.tapLvl;
        document.getElementById('cur-e').innerText = Math.floor(state.energy);
        document.getElementById('max-e').innerText = state.maxEnergy;
        document.getElementById('e-fill').style.width = (state.energy / state.maxEnergy * 100) + \"%\";
        updateCaseUI();
    }

    function getPrice(lvl) { return Math.floor(100 * Math.pow(1.5, lvl)); }

    function renderShop(type) {
        const list = document.getElementById('upgrades-list');
        list.innerHTML = '';
        const isClick = type === 'click';
        document.getElementById('tab-click').style.background = isClick ? 'var(--sg)' : 'var(--g)';
        document.getElementById('tab-click').style.color = isClick ? '#fff' : '#555';
        document.getElementById('tab-pass').style.background = !isClick ? 'var(--sg)' : 'var(--g)';
        document.getElementById('tab-pass').style.color = !isClick ? '#fff' : '#555';
        const curLvl = isClick ? state.tapLvl : state.passiveLvl;
        for(let i = 1; i <= 5; i++) {
            const target = curLvl + i;
            if(target > 100) break;
            const p = getPrice(target);
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div><div style=\"font-weight:900\">Level ${target}</div><div style=\"font-size:11px;color:#555\">${isClick?'Tap power':'Passive income'}</div></div><button class=\"buy-btn\" \${state.score<p?'disabled':''} onclick=\"buy('${type}',\${p})\">\${p}</button>`;
            list.appendChild(card);
        }
    }

    function buy(t, p) {
        if(state.score >= p) {
            state.score -= p;
            if(t === 'click') state.tapLvl++; else state.passiveLvl++;
            save(); updateUI(); renderShop(t);
            if(state.sound) tg.HapticFeedback.notificationOccurred('success');
        }
    }

    function updateCaseUI() {
        const now = Date.now();
        const btn = document.getElementById('case-btn');
        const timer = document.getElementById('case-timer');
        const diff = (state.lastCase + 86400000) - now;
        
        // ВСЕГДА ТЕМНО-СЕРЫЙ ЦВЕТ ТАЙМЕРА (ЗАПРОС ПОЛЬЗОВАТЕЛЯ)
        timer.style.color = \"#555\"; 

        if(diff <= 0) {
            btn.disabled = false;
            btn.innerText = langData[state.lang].caseOpen;
            timer.innerText = \"AVAILABLE NOW\";
        } else {
            btn.disabled = true;
            const h = Math.floor(diff/3600000);
            const m = Math.floor((diff%3600000)/60000);
            btn.innerText = langData[state.lang].caseWait;
            timer.innerText = h + \"h \" + m + \"m LEFT\";
        }
    }

    function openDailyCase() {
        if(Date.now() - state.lastCase < 86400000) return;
        const win = Math.floor(Math.random() * (10000 - 100 + 1)) + 100;
        state.score += win;
        state.lastCase = Date.now();
        tg.showAlert(\"You won \" + win + \" points!\");
        updateUI(); save();
    }

    document.getElementById('main-circle').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(state.energy >= 1) {
            state.score += state.tapLvl; state.energy -= 1;
            createTapEffect(e.touches[0].clientX, e.touches[0].clientY);
            document.getElementById('main-circle').classList.add('is-active');
            if(state.sound) tg.HapticFeedback.impactOccurred('medium');
            updateUI(); save();
        }
    });

    document.getElementById('main-circle').addEventListener('touchend', () => {
        document.getElementById('main-circle').classList.remove('is-active');
    });

    function createTapEffect(x, y) {
        const el = document.createElement('div');
        el.className = 'tap-effect'; el.innerText = '+' + state.tapLvl;
        el.style.left = x + 'px'; el.style.top = y + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 600);
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        const idx = { 'game-screen':0, 'shop-screen':1, 'top-screen':2, 'settings-screen':3 }[id];
        document.querySelectorAll('.nav-item')[idx].classList.add('active');
        if(id === 'top-screen') updateTop();
    }

    function updateTop() {
        db.ref('users').orderByChild('score').limitToLast(15).once('value', (snap) => {
            const list = document.getElementById('top-list');
            list.innerHTML = '';
            let users = [];
            snap.forEach(s => users.push(s.val()));
            users.reverse().forEach((u, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<span>#\${i+1} \${u.name}</span><b>\${Math.floor(u.score)}</b>`;
                list.appendChild(card);
            });
        });
    }

    function toggleLang() { state.lang = state.lang === 'en' ? 'ru' : 'en'; updateLangUI(); updateUI(); save(); }
    function toggleSound() { state.sound = !state.sound; document.getElementById('cur-sound').innerText = state.sound ? \"ON\" : \"OFF\"; save(); }

    function updateLangUI() {
        const l = langData[state.lang];
        const map = { 't-score-label':'scoreL', 't-tap-label':'tapL', 't-top-title':'topT', 't-shop-title':'shopT', 't-gear-title':'gearT', 't-lang-label':'langL', 't-sound-label':'soundL', 't-nav-top':'navTop', 't-nav-game':'navGame', 't-nav-shop':'navShop', 't-nav-gear':'navGear', 't-case-name':'caseName', 'case-btn':'caseOpen' };
        for(let id in map) { const el = document.getElementById(id); if(el) el.innerText = l[map[id]]; }
        document.getElementById('cur-lang').innerText = state.lang === 'en' ? \"EN\" : \"RU\";
        document.getElementById('cur-sound').innerText = state.sound ? \"ON\" : \"OFF\";
        updateCaseUI();
    }

    function checkMaintenance() {
        db.ref('maintenance').on('value', (s) => {
            document.getElementById('maint-screen').style.display = s.val() ? 'flex' : 'none';
        });
    }

    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let pts = [];
    function initParticles() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        for(let i=0; i<30; i++) pts.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*1+0.5, o: Math.random()});
    }
    function drawParticles() {
        ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = '#fff';
        pts.forEach(p => {
            ctx.globalAlpha = p.o; ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
            p.y -= 0.2; if(p.y < 0) p.y = canvas.height;
        });
        requestAnimationFrame(drawParticles);
    }

    setInterval(() => {
        if(state.energy < state.maxEnergy) state.energy = Math.min(state.maxEnergy, state.energy + 1.5);
        if(state.passiveLvl > 0) state.score += (state.passiveLvl * 0.1);
        updateUI();
    }, 1000);

    window.onload = () => {
        load(); initParticles(); drawParticles();
        setTimeout(() => {
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-screen').remove(), 500);
        }, 1500);
    };
    </script>
</body>
</html>
