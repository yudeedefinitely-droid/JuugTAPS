<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JuugTAPS Fixed</title>
    <style>
        :root { --accent: #00f2ff; --bg: #000; --nav: #111; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body, html { height: 100%; background: var(--bg); color: #fff; overflow: hidden; }

        #app { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            width: 100vw; 
        }

        .screen { 
            display: none; 
            flex-direction: column; 
            height: calc(100vh - 80px); 
            width: 100%;
            padding: 20px; 
            text-align: center;
        }

        .active { display: flex; }

        /* Центрирование игрового экрана */
        #game-screen { justify-content: space-between; align-items: center; }

        .score-box { margin-top: 20px; }
        #balance { font-size: 3.5rem; font-weight: bold; color: var(--accent); text-shadow: 0 0 15px var(--accent); }
        .score-label { letter-spacing: 3px; font-size: 0.8rem; opacity: 0.6; }

        /* Кнопка тапа */
        .tap-zone {
            display: flex; align-items: center; justify-content: center;
            flex: 1; width: 100%;
        }

        .main-btn {
            width: 250px; height: 250px; border-radius: 50%;
            border: 4px solid var(--accent); box-shadow: 0 0 25px var(--accent);
            background: radial-gradient(circle, rgba(0,242,255,0.1) 0%, transparent 75%);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; transition: transform 0.05s;
            cursor: pointer;
        }
        .main-btn:active { transform: scale(0.95); }
        #char-img { width: 130%; pointer-events: none; }

        /* Футер игры */
        .game-footer { width: 100%; margin-bottom: 20px; }
        .energy-bar { width: 80%; height: 10px; background: #222; margin: 10px auto; border-radius: 5px; overflow: hidden; }
        #energy-fill { height: 100%; background: var(--accent); width: 100%; transition: width 0.2s; }

        /* Лидерборд */
        .list-container { width: 100%; margin-top: 20px; overflow-y: auto; }
        .user-row { display: flex; justify-content: space-between; padding: 15px; background: #111; margin-bottom: 5px; border-radius: 10px; border: 1px solid #222; }

        /* Меню (НАВИГАЦИЯ) */
        .bottom-nav {
            height: 80px; background: #080808; border-top: 1px solid #222;
            display: flex; width: 100%; padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item {
            flex: 1; background: none; border: none; color: #555;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: bold; text-transform: uppercase;
        }
        .nav-item.active-nav { color: var(--accent); border-top: 2px solid var(--accent); }

        /* Админка */
        .admin-panel { border: 2px dashed red; padding: 15px; margin-top: 20px; border-radius: 10px; }
        .reward-btn { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>
    <div id="app">
        <section id="game-screen" class="screen active">
            <div class="score-box">
                <p class="score-label">SCORE</p>
                <div id="balance">0</div>
            </div>

            <div class="tap-zone">
                <div id="character" class="main-btn" onclick="handleTap(event)">
                    <img src="image_2.png" alt="Juug" id="char-img">
                </div>
            </div>

            <div class="game-footer">
                <p style="font-size: 0.8rem; opacity: 0.6;">TAP TO EARN</p>
                <div class="energy-bar"><div id="energy-fill"></div></div>
                <div id="energy-text">150 / 150</div>
            </div>
        </section>

        <section id="leaderboard-screen" class="screen">
            <h2 style="color: var(--accent); margin-bottom: 15px;">TOP JUUGERS</h2>
            <div id="leader-list" class="list-container"></div>
        </section>

        <section id="daily-screen" class="screen">
            <h2 style="color: var(--accent);">BONUS</h2>
            <div style="margin-top: 50px; padding: 30px; background: #111; border-radius: 20px;">
                <p style="font-size: 3rem;">🎁</p>
                <p style="margin: 15px 0;">Get 100 PTS every 10 hours</p>
                <button class="reward-btn" onclick="claimDailyReward()">COLLECT 100</button>
            </div>
        </section>

        <section id="settings-screen" class="screen">
            <h2>SETTINGS</h2>
            <div id="admin-panel" class="admin-panel" style="display:none;">
                <p style="color:red">ADMIN ACCESS</p>
                <button class="reward-btn" style="background:red; color:white;" onclick="startTimer()">START 3-MONTH TIMER</button>
            </div>
        </section>

        <nav class="bottom-nav">
            <button class="nav-item" onclick="switchTab('leaderboard-screen')">🏆<br>TOP</button>
            <button class="nav-item active-nav" onclick="switchTab('game-screen')">💎<br>GAME</button>
            <button class="nav-item" onclick="switchTab('daily-screen')">🎁<br>DAILY</button>
            <button class="nav-item" onclick="switchTab('settings-screen')">⚙️<br>GEAR</button>
        </nav>
    </div>

    <script type="module">
        // --- FIREBASE (ВСТАВЬ СВОЙ КОНФИГ НИЖЕ) ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDcUMfQAd9QnoPUVxfM9SWp_lHBc2CaRKY",
            authDomain: "juugtaaap.firebaseapp.com",
            databaseURL: "https://juugtaaap-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "juugtaaap",
            storageBucket: "juugtaaap.firebasestorage.app",
            messagingSenderId: "230755213175",
            appId: "1:230755213175:web:60d2bd14da628347284b72"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- ЛОГИКА ---
        const tg = window.Telegram.WebApp;
        tg.expand();
        const username = tg.initDataUnsafe?.user?.username || "Guest";

        let state = {
            balance: 0,
            energy: 150,
            lastDaily: 0
        };

        // Загрузка
        const saved = localStorage.getItem('juug_save_v1');
        if (saved) state = JSON.parse(saved);

        // Админка
        if (username === "malenkiydanik") {
            document.getElementById('admin-panel').style.display = 'block';
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.balance).toLocaleString();
            document.getElementById('energy-text').innerText = `${Math.floor(state.energy)} / 150`;
            document.getElementById('energy-fill').style.width = (state.energy / 150 * 100) + "%";
        }

        // Тап
        window.handleTap = (e) => {
            if (state.energy >= 1) {
                state.balance += 1;
                state.energy -= 1;
                tg.HapticFeedback.impactOccurred('light');
                updateUI();
                save();
            }
        };

        // Вкладки
        window.switchTab = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active-nav'));
            event.currentTarget.classList.add('active-nav');

            if (id === 'leaderboard-screen') loadLeaders();
        };

        // Награда
        window.claimDailyReward = () => {
            const now = Date.now();
            if (now - state.lastDaily >= 10 * 60 * 60 * 1000) {
                state.balance += 100;
                state.lastDaily = now;
                save();
                updateUI();
                alert("Success! +100 PTS");
            } else {
                alert("Wait until 10 hours pass!");
            }
        };

        function save() {
            localStorage.setItem('juug_save_v1', JSON.stringify(state));
            set(ref(db, 'players/' + username), { username: username, score: state.balance });
        }

        function loadLeaders() {
            const q = query(ref(db, 'players'), orderByChild('score'), limitToLast(10));
            onValue(q, (snap) => {
                const list = [];
                snap.forEach(c => list.push(c.val()));
                list.reverse();
                const container = document.getElementById('leader-list');
                const medals = ["🥇", "🥈", "🥉", "🏅", "🏅"];
                container.innerHTML = list.map((p, i) => `
                    <div class="user-row">
                        <span>${medals[i] || (i+1)+'.'} ${p.username}</span>
                        <b>${p.score.toLocaleString()}</b>
                    </div>
                `).join('');
            });
        }

        // Реген энергии
        setInterval(() => {
            if (state.energy < 150) {
                state.energy += 0.5;
                updateUI();
            }
        }, 1000);

        updateUI();
    </script>
</body>
</html>
