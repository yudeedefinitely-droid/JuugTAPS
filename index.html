<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JuugTAPS</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <section id="game-screen" class="screen active">
            <div class="top-section">
                <div class="score-label">SCORE</div>
                <div id="balance">0</div>
            </div>

            <div class="mid-section">
                <div id="character" class="tap-circle">
                    <img src="image_2.png" alt="Juug" id="char-img">
                </div>
            </div>

            <div class="bot-section">
                <div class="tap-hint">TAP TO EARN</div>
                <div class="energy-container">
                    <div class="energy-bar"><div id="energy-fill"></div></div>
                    <div class="energy-stats"><span id="energy-current">150</span> / 150</div>
                </div>
            </div>
        </section>

        <section id="leaderboard-screen" class="screen">
            <h2 class="screen-title">TOP JUUGERS</h2>
            <div id="leader-list" class="scrollable"></div>
        </section>

        <section id="daily-screen" class="screen">
            <h2 class="screen-title">DAILY BONUS</h2>
            <div class="reward-box">
                <div class="reward-icon">🎁</div>
                <div class="reward-val">+100 PTS</div>
                <button class="claim-btn" onclick="claimDailyReward()">COLLECT</button>
                <p id="reward-timer"></p>
            </div>
        </section>

        <section id="settings-screen" class="screen">
            <h2 class="screen-title">GEAR</h2>
            <div id="admin-panel" class="admin-ui" style="display:none;">
                <p>DEV MODE ACTIVE</p>
                <button onclick="startGlobalTimer()">START 90-DAY TIMER</button>
            </div>
        </section>

        <nav class="main-nav">
            <button class="nav-btn" onclick="showScreen('leaderboard-screen')">🏆<br>LEADERS</button>
            <button class="nav-btn active" onclick="showScreen('game-screen')">💎<br>GAME</button>
            <button class="nav-btn" onclick="showScreen('daily-screen')">🎁<br>DAILY</button>
            <button class="nav-btn" onclick="showScreen('settings-screen')">⚙️<br>GEAR</button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDcUMfQAd9QnoPUVxfM9SWp_lHBc2CaRKY",
            authDomain: "juugtaaap.firebaseapp.com",
            databaseURL: "https://juugtaaap-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "juugtaaap",
            storageBucket: "juugtaaap.firebasestorage.app",
            messagingSenderId: "230755213175",
            appId: "1:230755213175:web:60d2bd14da628347284b72"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Обновление лидеров (вызывается каждую секунду в script.js)
        window.refreshLeaders = () => {
            const topQuery = query(ref(db, 'players'), orderByChild('score'), limitToLast(10));
            onValue(topQuery, (snap) => {
                const data = [];
                snap.forEach(c => { data.push(c.val()); });
                data.reverse();
                const container = document.getElementById('leader-list');
                const icons = ["🥇", "🥈", "🥉", "🏅", "🏅"];
                container.innerHTML = data.map((p, i) => `
                    <div class="leader-item">
                        <span>${icons[i] || (i+1 + '.')} ${p.username}</span>
                        <b>${p.score.toLocaleString()} PTS</b>
                    </div>
                `).join('');
            });
        };
    </script>
    <script src="script.js"></script>
</body>
</html>
