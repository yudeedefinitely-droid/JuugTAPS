<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JuugTAPS Ultra</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <section id="game-screen" class="screen active main-menu-bg">
            <div class="header-glass">
                <span class="label">JUUG BALANCE</span>
                <div id="balance">0</div>
            </div>

            <div class="main-click-area">
                <div id="character" class="circle-tap-area">
                    <img id="char-img" src="image_2.png" alt="Juug">
                </div>
            </div>

            <div class="stats-footer">
                <div class="energy-info">
                    <span>⚡ <span id="energy-current">150</span> / 150</span>
                </div>
                <div class="energy-bar"><div id="energy-fill"></div></div>
            </div>
        </section>

        <section id="leaderboard-screen" class="screen generic-bg">
            <h2 class="cry-text">TOP JUUGERS</h2>
            <div class="airdrop-card">Airdrop in: <span id="airdrop-timer">--</span></div>
            <div id="leader-list" class="scroll-area"></div>
        </section>

        <section id="shop-screen" class="screen generic-bg">
            <h2 class="cry-text">BLACK MARKET</h2>
            <div id="shop-list" class="scroll-area"></div>
        </section>

        <section id="settings-screen" class="screen generic-bg">
            <h2 class="cry-text">GEAR</h2>
            <div class="settings-grid">
                <button class="action-btn" onclick="claimDailyReward()">🎁 DAILY REWARD</button>
                <button class="action-btn" onclick="toggleMusic()">🎵 AUDIO</button>
            </div>
            
            <div id="admin-panel" class="admin-block" style="display:none;">
                <div class="admin-tag">DEVELOPER MODE</div>
                <button class="admin-btn" onclick="startGlobalTimer()">▶ START 90-DAY TIMER</button>
                <button class="admin-btn" onclick="addAdminBalance()">💰 ADD 1M CASH</button>
            </div>
        </section>

        <nav class="bottom-nav">
            <button class="nav-item" onclick="showScreen('leaderboard-screen')">🏆</button>
            <button class="nav-item active-nav" onclick="showScreen('game-screen')">💎</button>
            <button class="nav-item" onclick="showScreen('shop-screen')">🛒</button>
            <button class="nav-item" onclick="showScreen('settings-screen')">⚙️</button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
