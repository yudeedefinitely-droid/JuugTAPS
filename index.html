<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JuugTAPS</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <div class="stat-box">
                <span id="balance">0</span> <small>JUUG</small>
            </div>
            <div class="energy-container">
                <div id="energy-bar"></div>
                <span id="energy-text">1000 / 1000</span>
            </div>
        </header>

        <main>
            <section id="game-screen" class="screen active">
                <div class="click-area" id="click-obj">
                    <img src="placeholder-coin.png" alt="Juug Tap" id="tap-img">
                </div>
                <div class="passive-info">Доход в сек: <span id="pps-val">0</span></div>
            </section>

            <section id="shop-screen" class="screen">
                <div class="shop-tabs">
                    <button onclick="switchShop('tap')">Tap Power</button>
                    <button onclick="switchShop('passive')">Passive</button>
                </div>
                <div id="shop-list" class="scroll-area"></div>
            </section>

            <section id="leaderboard-screen" class="screen">
                <h3>Season Ends In: <span id="season-timer">--:--:--</span></h3>
                <div id="leaderboard-list"></div>
                <div id="winner-announcement" class="hidden"></div>
            </section>

            <section id="settings-screen" class="screen">
                <h2>Settings</h2>
                <div class="setting-item">
                    <span>Sound Effects</span>
                    <input type="checkbox" id="sound-toggle" checked>
                </div>
            </section>
        </main>

        <nav>
            <button onclick="showScreen('game-screen')">Game</button>
            <button onclick="showScreen('shop-screen')">Shop</button>
            <button onclick="showScreen('leaderboard-screen')">Top</button>
            <button onclick="showScreen('settings-screen')">Settings</button>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
