<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JuugTAPS</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --b: #000; --w: #fff; --g: #111; --sg: #222; --accent: rgba(255,255,255,0.8); }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--b); color: var(--w); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        
        /* ЭКРАН ЗАГРУЗКИ (ДОБАВЛЕНО) */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: opacity 0.5s ease;
        }
        .loading-logo {
            width: 180px; height: 180px; margin-bottom: 20px;
            animation: logoPulse 2s infinite ease-in-out;
        }
        .loading-logo img { width: 100%; height: 100%; object-fit: contain; }
        @keyframes logoPulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        .loader-bar { width: 100px; height: 2px; background: #222; border-radius: 2px; overflow: hidden; }
        .loader-progress { width: 40%; height: 100%; background: #fff; animation: slide 1.5s infinite ease-in-out; }
        @keyframes slide { 0% { transform: translateX(-150%); } 100% { transform: translateX(150%); } }

        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; position: relative; height: 100%; z-index: 1; overflow: hidden; }

        .screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; padding: 20px; 
            overflow-y: auto; padding-bottom: 140px;
            opacity: 0; pointer-events: none; transform: translateY(15px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .screen.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .hidden { display: none !important; }

        .header { width: 100%; display: flex; justify-content: space-between; font-weight: 700; font-size: 14px; margin-bottom: 20px; color: #555; }
        #score { font-size: 72px; font-weight: 900; margin-top: 5px; }
        
        .tap-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; min-height: 300px; }
        .main-circle { 
            width: 240px; height: 240px; border: 4px solid var(--w); border-radius: 50%; 
            transition: transform 0.05s ease-out; background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            box-shadow: 0 0 20px rgba(255,255,255,0.05); position: relative; z-index: 2; touch-action: manipulation;
        }
        .main-circle.is-active { transform: scale(0.92); background: rgba(255,255,255,0.15); }

        .tap-effect { position: absolute; pointer-events: none; color: #fff; font-weight: 900; font-size: 26px; animation: floatUp 0.6s ease-out forwards; z-index: 10; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }

        .energy-box { width: 100%; text-align: center; margin-bottom: 20px; position: relative; }
        .bar-bg { 
            height: 24px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; margin: 15px 0; overflow: hidden; position: relative; 
            backdrop-filter: blur(5px);
        }
        #e-fill { 
            height: 100%; width: 100%; 
            background: linear-gradient(90deg, #fff 0%, rgba(200,200,200,0.8) 100%); 
            transition: width 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); 
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
            position: relative;
        }
        #e-fill::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shine 2s infinite;
        }
        @keyframes shine { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        #e-text { 
            position: absolute; width: 100%; left: 0; top: 50%; transform: translateY(-50%);
            font-size: 10px; font-weight: 900; letter-spacing: 1px; color: var(--w); 
            text-shadow: 0 0 5px #000; z-index: 10; mix-blend-mode: difference;
        }

        .card { width: 100%; background: var(--g); border: 1px solid var(--sg); padding: 18px; border-radius: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .card:active { transform: scale(0.98); background: #151515; }
        .card.special { border: 1px solid rgba(255,255,255,0.3); background: linear-gradient(145deg, #111, #050505); }
        .buy-btn { background: var(--w); color: var(--b); border: none; padding: 10px 18px; border-radius: 8px; font-weight: 900; min-width: 80px; }
        .buy-btn:disabled { background: #333; color: #555; cursor: not-allowed; }

        nav { position: absolute; bottom: 0; width: 100%; display: flex; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); border-top: 1px solid var(--sg); padding: 15px 0 35px; z-index: 100; }
        .nav-item { flex: 1; text-align: center; color: #444; font-size: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--w); transform: translateY(-2px); }
        .nav-item span { display: block; font-size: 24px; margin-bottom: 4px; filter: grayscale(1) brightness(2); transition: 0.3s; }
        .nav-item.active span { filter: grayscale(0) brightness(1); color: #fff; }
        .settings-btn { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--sg); background: var(--g); color: #fff; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="loading-logo">
        <img src="photo_2026-04-13_17-59-56.jpg" alt="JUUG" onerror="this.parentElement.innerHTML='💎'">
    </div>
    <div class="loader-bar">
        <div class="loader-progress"></div>
    </div>
</div>

<canvas id="particleCanvas"></canvas>

<div id="app">
    <section id="s-game" class="screen active">
        <div class="header"><span id="p-name">@loading</span><span id="sync-text">SYNCING...</span></div>
        <p id="t-score-label" style="font-size:10px; font-weight:800; letter-spacing:3px; color: #444;">SCORE</p>
        <div id="score">0</div>
        <div id="passive-display" style="color:#666; font-size:11px; font-weight:800; margin-top: 5px;">Passive: 0/sec</div>
        
        <div class="tap-area"><div class="main-circle" id="tapBtn"></div></div>
        
        <div class="energy-box">
            <p id="t-tap-label" style="font-size:10px; font-weight:800; letter-spacing:1px; color: #444;">STAMINA</p>
            <div class="bar-bg">
                <div id="e-fill"></div>
                <span id="e-text">150 / 150</span>
            </div>
        </div>
    </section>

    <section id="s-top" class="screen"><h2 id="t-top-title" style="align-self:flex-start; margin-bottom:20px; font-weight:900;">TOP 5 JUUG'ERS</h2><div id="leaderboard-list" style="width:100%;"></div></section>
    <section id="s-shop" class="screen">
        <h2 id="t-shop-title" style="align-self:flex-start; margin-bottom:20px; font-weight:900;">SHOP</h2>
        <div id="shop-main" style="width:100%;">
            <div class="card special" id="case-card" onclick="openDailyCase()">
                <div style="display:flex; align-items:center;"><div style="font-size:24px; margin-right:15px;">📦</div><div><b id="t-case-name">DAILY CASE</b><br><span id="case-status" style="font-size:11px; color:rgba(255,255,255,0.5)">100 - 10,000 pts</span></div></div>
                <button class="buy-btn" id="case-btn">OPEN</button>
            </div>
            <div class="card" onclick="openUpgrade('click')"><div style="flex:1"><b id="t-click-up">CLICK UPGRADES</b><br><span id="t-click-desc" style="font-size:11px; color:#666">Increase tap income</span></div><span>➔</span></div>
            <div class="card" onclick="openUpgrade('passive')"><div style="flex:1"><b id="t-pass-up">PASSIVE INCOME</b><br><span id="t-pass-desc" style="font-size:11px; color:#666">Automatic income</span></div><span>➔</span></div>
        </div>
        <div id="shop-detail" class="hidden" style="width:100%;">
            <button id="t-back" onclick="backToShop()" style="background:none; border:none; color:#fff; font-weight:800; margin-bottom:15px;">← BACK</button>
            <div id="upgrade-items"></div>
        </div>
    </section>
    <section id="s-gear" class="screen"><h2 id="t-gear-title" style="align-self:flex-start; margin-bottom:20px; font-weight:900;">GEAR</h2><button class="settings-btn" onclick="toggleLang()"><span id="t-lang-label">Language</span><span id="cur-lang" style="color:#888">English</span></button><button class="settings-btn" onclick="toggleSound()"><span id="t-sound-label">Sound</span><span id="cur-sound" style="color:#888">ON</span></button><div id="admin-container"></div></section>

    <nav>
        <div class="nav-item" id="n-top" onclick="show('s-top')"><span>🏆</span><p id="t-nav-top">TOP</p></div>
        <div class="nav-item active" id="n-game" onclick="show('s-game')"><span>💎</span><p id="t-nav-game">GAME</p></div>
        <div class="nav-item" id="n-shop" onclick="show('s-shop')"><span>🛒</span><p id="t-nav-shop">SHOP</p></div>
        <div class="nav-item" id="n-gear" onclick="show('s-gear')"><span>⚙️</span><p id="t-nav-gear">GEAR</p></div>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDcUMfQAd9QnoPUVxfM9SWp_lHBc2CaRKY",
        authDomain: "juugtaaap.firebaseapp.com",
        databaseURL: "https://juugtaaap-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "juugtaaap",
        storageBucket: "juugtaaap.firebasestorage.app",
        messagingSenderId: "230755213175",
        appId: "1:230755213175:web:60d2bd14da628347284b72"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    tg.expand();

    const MY_ID = 5291965471;
    const user = tg.initDataUnsafe?.user || { id: 0, username: "Guest" };
    
    let isLoaded = false;
    let state = { score: 0, energy: 150, tapLvl: 1, passiveLvl: 0, lastUpdate: Date.now(), lastCaseTime: 0, username: "Guest", lang: 'en', sound: true };

    const langData = {
        en: { sync: "LIVE", scoreL: "SCORE", tapL: "TAP TO EARN", passL: "Passive", topT: "TOP 5 JUUG'ERS", shopT: "SHOP", clUp: "CLICK UPGRADES", clDe: "Increase tap income", psUp: "PASSIVE INCOME", psDe: "Automatic income", back: "BACK", gearT: "GEAR", langL: "Language", soundL: "Sound", navTop: "TOP", navGame: "GAME", navShop: "SHOP", navGear: "GEAR", ranks: ["Noob Juug'er", "Default Juug'er", "Pro Juug'er", "Hacker Juug'er", "God Juug'er"], caseName: "DAILY CASE", caseOpen: "OPEN", caseReady: "Ready to open!" },
        ru: { sync: "В СЕТИ", scoreL: "СЧЕТ", tapL: "ТАПАЙ ЧТОБЫ ЗАРАБОТАТЬ", passL: "Пассив", topT: "ТОП 5 ДЖУГЕРОВ", shopT: "МАГАЗИН", clUp: "ПРОКАЧКА КЛИКА", clDe: "Увеличить доход за тап", psUp: "ПАССИВНЫЙ ДОХОД", psDe: "Автоматический доход", back: "НАЗАД", gearT: "МЕНЮ", langL: "Язык", soundL: "Звук", navTop: "ТОП", navGame: "ИГРА", navShop: "МАГАЗИН", navGear: "МЕНЮ", ranks: ["Нуб Джугер", "Обычный Джугер", "Про Джугер", "Хакер Джугер", "Бог Джугер"], caseName: "ДНЕВНОЙ КЕЙС", caseOpen: "ОТКРЫТЬ", caseReady: "Можно открыть!" }
    };

    // Particles (без изменений)
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let bgParticles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    class BgP { constructor() { this.reset(); } reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 1.5 + 0.5; this.speedX = (Math.random() - 0.5) * 0.3; this.speedY = (Math.random() - 0.5) * 0.3; this.opacity = Math.random() * 0.4 + 0.1; } update() { this.x += this.speedX; this.y += this.speedY; if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset(); } draw() { ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); } }
    for (let i = 0; i < 40; i++) bgParticles.push(new BgP());
    function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); bgParticles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
    animate();

    const tapBtn = document.getElementById('tapBtn');
    tapBtn.addEventListener('pointerdown', (e) => {
        if (!isLoaded || state.energy <= 0) return;
        tapBtn.classList.add('is-active');
        state.score += state.tapLvl; state.energy--;
        updateUI(); 
        if(state.sound) tg.HapticFeedback.impactOccurred('light');
        const num = document.createElement('div');
        num.className = 'tap-effect'; num.innerText = `+${state.tapLvl}`;
        num.style.left = e.clientX + 'px'; num.style.top = e.clientY + 'px';
        document.body.appendChild(num); setTimeout(() => num.remove(), 600);
    });
    window.addEventListener('pointerup', () => tapBtn.classList.remove('is-active'));

    // Firebase Sync
    const currentId = user.id || 999999;
    db.ref(`users/${currentId}`).once('value', (snap) => {
        const data = snap.val();
        if (data) {
            const now = Date.now(); const offTime = Math.floor((now - (data.lastUpdate || now)) / 1000);
            state = { ...state, ...data, score: (data.score || 0) + (offTime * (data.passiveLvl || 0)), energy: Math.min(150, (data.energy || 150) + offTime) };
        }
        state.username = user.username || data?.username || "Guest";
        isLoaded = true;
        document.getElementById('p-name').innerText = "@" + state.username;
        
        // СКРЫТИЕ ЗАГРУЗКИ (ДОБАВЛЕНО)
        const ls = document.getElementById('loading-screen');
        ls.style.opacity = '0';
        setTimeout(() => ls.remove(), 500);

        updateLangUI(); updateUI(); updateCaseUI();
    });

    // Все остальные твои функции (save, updateUI, buy, и т.д.) остаются абсолютно такими же
    function save() { if (isLoaded && currentId !== 0) { state.lastUpdate = Date.now(); db.ref(`users/${currentId}`).update(state); } }
    function updateUI() {
        document.getElementById('score').innerText = format(state.score);
        document.getElementById('passive-display').innerText = `${langData[state.lang].passL}: ${state.passiveLvl}/sec`;
        document.getElementById('e-text').innerText = `${state.energy} / 150`;
        document.getElementById('e-fill').style.width = (state.energy / 1.5) + '%';
        document.getElementById('e-fill').style.background = state.energy < 20 ? 'linear-gradient(90deg, #ff4444, #880000)' : 'linear-gradient(90deg, #fff 0%, rgba(200,200,200,0.8) 100%)';
    }
    function format(n) { return n >= 1e6 ? (n/1e6).toFixed(1) + 'M' : n >= 1e3 ? (n/1e3).toFixed(1) + 'K' : Math.floor(n); }
    window.show = (id) => { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); document.getElementById(id).classList.add('active'); document.getElementById('n-' + id.split('-')[1]).classList.add('active'); };
    window.openDailyCase = () => { /* твоя логика кейса */ };
    function updateCaseUI() { /* твоя логика кейса */ }
    function updateLangUI() { /* твоя логика языка */ }
    function toggleLang() { state.lang = state.lang === 'en' ? 'ru' : 'en'; updateLangUI(); updateUI(); save(); }
    function toggleSound() { state.sound = !state.sound; document.getElementById('cur-sound').innerText = state.sound ? "ON" : "OFF"; save(); }
    setInterval(() => { if (!isLoaded) return; state.score += (state.passiveLvl || 0); if (state.energy < 150) state.energy++; updateUI(); }, 1000);
    setInterval(() => { if(isLoaded) save(); }, 10000);
</script>
</body>
</html>
