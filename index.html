<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JuugTAPS</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="tg-safe-area"></div>

    <div id="app">
        <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

        <section id="game-screen" class="screen active main-menu-bg">
            <div class="header">
                <div class="score-container">
                    <span id="score-label" class="cry-text">SCORE</span>
                    <div id="balance" class="cry-text">0</div>
                </div>
            </div>

            <div class="main-click-area">
                <div id="character" class="tap-target">
                    <img id="char-img" src="image_2.png" alt="Juug Character">
                </div>
                <div class="tap-hint cry-text">TAP TO EARN</div>
            </div>

            <div class="energy-container footer-content">
                <div class="energy-bar"><div id="energy-fill"></div></div>
                <div class="energy-text"><span id="energy-current">150</span> / 150</div>
            </div>
        </section>

        <section id="leaderboard-screen" class="screen generic-bg">
            <h2 class="cry-text sub-header">TOP JUUGERS</h2>
            <div id="timer-container" class="cry-text">Airdrop in: <span id="airdrop-timer">--</span></div>
            <div id="leader-list" class="scroll-area cry-frame-v"></div>
        </section>

        <section id="shop-screen" class="screen generic-bg">
            <h2 class="cry-text sub-header">BLACK MARKET</h2>
            <div class="shop-tabs">
                <button class="menu-btn shop-tab active-tab" onclick="switchShopTab('tap')">Tap Power</button>
                <button class="menu-btn shop-tab" onclick="switchShopTab('passive')">Passive</button>
            </div>
            <div id="shop-list" class="scroll-area cry-frame-v"></div>
        </section>

        <section id="settings-screen" class="screen generic-bg">
            <h2 class="cry-text sub-header">GEAR</h2>
            <div class="cry-frame-v settings-content">
                <button class="menu-btn" onclick="toggleMusic()">🎵 Music On/Off</button>
                
                <div id="admin-panel" style="display:none; margin-top:30px; border:1px solid red; padding:10px;">
                    <p style="color:red; font-weight:bold;">ADMIN ACCESS</p>
                    <button class="menu-btn" onclick="startGlobalTimer()">START 3-MONTH TIMER</button>
                </div>
            </div>
        </section>

        <nav class="bottom-nav">
            <button class="nav-btn" onclick="showScreen('leaderboard-screen')">
                <div class="icon crown-icon"></div>LEADERS
            </button>
            <button class="nav-btn nav-active" onclick="showScreen('game-screen')">
                <div class="icon gear-icon"></div>GAME
            </button>
            <button class="nav-btn" onclick="showScreen('shop-screen')">
                <div class="icon gem-icon"></div>SHOP
            </button>
            <button class="nav-btn" onclick="showScreen('settings-screen')">
                <div class="icon gear-icon"></div>GEAR
            </button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // === ВСТАВЬ СВОИ ДАННЫЕ ИЗ FIREBASE КОНСОЛИ СЮДА ===
        const firebaseConfig = {
            apiKey: "ТВОЙ_API_KEY",
            authDomain: "ТВОЙ_ПРОЕКТ.firebaseapp.com",
            databaseURL: "https://ТВОЙ_ПРОЕКТ.europe-west1.firebasedatabase.app",
            projectId: "ТВОЙ_ПРОЕКТ",
            storageBucket: "ТВОЙ_ПРОЕКТ.appspot.com",
            messagingSenderId: "ID",
            appId: "ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const username = window.Telegram.WebApp.initDataUnsafe?.user?.username || "Guest_" + Math.floor(Math.random()*999);

        // Функция отправки счета (публичная для script.js)
        window.sendScoreToCloud = function(score) {
            set(ref(db, 'players/' + username), { username, score: Math.floor(score) });
        };

        // Слушатель таблицы лидеров
        const topRef = query(ref(db, 'players'), orderByChild('score'), limitToLast(10));
        onValue(topRef, (snap) => {
            const players = [];
            snap.forEach(child => { players.push(child.val()); });
            players.reverse();
            const list = document.getElementById('leader-list');
            if(list) {
                list.innerHTML = players.map((p, i) => `
                    <div class="shop-item cry-frame-h"><span>#${i+1} ${p.username}</span><b>${p.score.toLocaleString()} PTS</b></div>
                `).join('');
            }
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
