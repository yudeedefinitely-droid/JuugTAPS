<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JuugTAPS</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <div class="header">
            <span id="username">@loading...</span>
            <span id="event-timer">EVENT: 03m 00d</span>
        </div>
        
        <div class="score-container">
            <div class="score-label">SCORE</div>
            <div id="score">0</div>
        </div>

        <div class="tap-area">
            <div id="tapBtn" class="main-circle"></div>
        </div>

        <div class="energy-section">
            <div class="tap-hint">TAP TO EARN</div>
            <div class="progress-bar">
                <div id="energy-fill"></div>
            </div>
            <div id="energy-text">150 / 150</div>
        </div>

        <div class="nav-bar">
            <div class="nav-item">🏆<br>TOP</div>
            <div class="nav-item active">💎<br>GAME</div>
            <div class="nav-item">🎁<br>DAILY</div>
            <div class="nav-item">⚙️<br>GEAR</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
