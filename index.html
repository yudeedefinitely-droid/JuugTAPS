<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JuugTAPS</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --b: #000; --w: #fff; --g: #111; --sg: #222; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--b); color: var(--w); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; position: relative; height: 100%; z-index: 1; }
        .screen { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; padding-bottom: 120px; }
        .hidden { display: none !important; }

        .header { width: 100%; display: flex; justify-content: space-between; font-weight: 700; font-size: 14px; margin-bottom: 20px; color: #555; }
        #score { font-size: 72px; font-weight: 900; margin-top: 5px; }
        
        .tap-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .main-circle { 
            width: 240px; height: 240px; 
            border: 4px solid var(--w); 
            border-radius: 50%; 
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            box-shadow: 0 0 20px rgba(255,255,255,0.05);
            position: relative; z-index: 2;
        }
        .main-circle:active { transform: scale(0.92); background: rgba(255,255,255,0.15); box-shadow: 0 0 40px rgba(255,255,255,0.1); }

        .tap-effect { position: absolute; pointer-events: none; color: #fff; font-weight: 900; font-size: 26px; animation: floatUp 0.6s ease-out forwards; z-index: 10; }
        .tap-particle { position: absolute; pointer-events: none; background: #fff; border-radius: 50%; animation: flyOut 0.5s ease-out forwards; z-index: 9; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
        @keyframes flyOut { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; } }

        .energy-box { width: 100%; text-align: center; margin-bottom: 20px; }
        .bar-bg { height: 10px; background: #1a1a1a; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #e-fill { height: 100%; width: 100%; background: #fff; transition: width 0.2s; }

        .card { width: 100%; background: var(--g); border: 1px solid var(--sg); padding: 18px; border-radius: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .buy-btn { background: var(--w); color: var(--b); border: none; padding: 10px 18px; border-radius: 8px; font-weight: 900; min-width: 80px; }
        .buy-btn:disabled { background: #333; color: #555; }

        nav { position: absolute; bottom: 0; width: 100%; display: flex; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border-top: 1px solid var(--sg); padding: 15px 0 35px; }
        .nav-item { flex: 1; text-align: center; color: #444; font-size: 11px; font-weight: 800; cursor: pointer; }
        .nav-item.active { color: var(--w); }
        .nav-item span { display: block; font-size: 22px; margin-bottom: 4px; }
        
        .settings-btn { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--sg); background: var(--g); color: #fff; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<div id="app">
    <section id="s-game" class="screen">
        <div class="header"><span id="p-name">@loading</span><span id="sync-text">SYNCING...</span></div>
        <p id="t-score-label" style="font-size:12px; font-weight:800; letter-spacing:2px;">SCORE</p>
        <div id="score">0</div>
        <div id="passive-display" style="color:#888; font-size:12px; font-weight:800;">Passive: 0/sec</div>
        <div class="tap-area"><div class="main-circle" id="tapBtn"></div></div>
        <div class="energy-box">
            <p id="t-tap-label" style="font-size:12px; font-weight:800;">TAP TO EARN</p>
            <div class="bar-bg"><div id="e-fill"></div></div>
            <b id="e-text">150 / 150</b>
        </div>
    </section>

    <section id="s-top" class="screen hidden">
        <h2 id="t-top-title" style="align-self:flex-start; margin-bottom:20px; font-weight:900;">TOP 5 JUUG'ERS</h2>
        <div id="leaderboard-list" style="width:100%;"></div>
    </section>

    <section id="s-shop" class="screen hidden">
        <h2 id="t-shop-title" style="align-self:flex-start; margin-bottom:20px; font-weight:900;">SHOP</h2>
        <div id="shop-main" style="width:100%;">
            <div class="card" onclick="openUpgrade('click')">
                <div style="flex:1"><b id="t-click-up">CLICK UPGRADES</b><br><span id="t-click-desc" style="font-size:11px; color:#666">Increase tap income</span></div>
                <span>➔</span>
            </div>
            <div class="card" onclick="openUpgrade('passive')">
                <div style="flex:1"><b id="t-pass-up">PASSIVE INCOME</b><br><span id="t-pass-desc" style="font-size:11px; color:#666">Automatic income</span></div>
                <span>➔</span>
            </div>
        </div>
        <div id="shop-detail" class="hidden" style="width:100%;">
            <button id="t-back" onclick="backToShop()" style="background:none; border:none; color:#555; font-weight:800; margin-bottom:15px; cursor:pointer;">← BACK</button>
            <div id="upgrade-items"></div>
        </div>
    </section>

    <section id="s-gear" class="screen hidden">
        <h2 id="t-gear-title" style="align-self:flex-start; margin-bottom:20px; font-weight:900;">GEAR</h2>
        <button class="settings-btn" onclick="toggleLang()">
            <span id="t-lang-label">Language</span><span id="cur-lang" style="color:#888">English</span>
        </button>
        <button class="settings-btn" onclick="toggleSound()">
            <span id="t-sound-label">Sound</span><span id="cur-sound" style="color:#888">ON</span>
        </button>
        <div id="admin-panel" class="hidden" style="width:100%; border:1px solid #ff4444; padding:15px; border-radius:12px; margin-top:20px;">
            <button style="width:100%; padding:15px; font-weight:900; background:#fff; border:none; border-radius:8px;">EVENT CONTROL</button>
        </div>
    </section>

    <nav>
        <div class="nav-item" id="n-top" onclick="show('s-top')"><span>🏆</span><p id="t-nav-top">TOP</p></div>
        <div class="nav-item active" id="n-game" onclick="show('s-game')"><span>💎</span><p id="t-nav-game">GAME</p></div>
        <div class="nav-item" id="n-shop" onclick="show('s-shop')"><span>🎁</span><p id="t-nav-shop">SHOP</p></div>
        <div class="nav-item" id="n-gear" onclick="show('s-gear')"><span>⚙️</span><p id="t-nav-gear">GEAR</p></div>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDcUMfQAd9QnoPUVxfM9SWp_lHBc2CaRKY",
        authDomain: "juugtaaap.firebaseapp.com",
        databaseURL: "https://juugtaaap-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "juugtaaap",
        storageBucket: "juugtaaap.firebasestorage.app",
        messagingSenderId: "230755213175",
        appId: "1:230755213175:web:60d2bd14da628347284b72"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    tg.expand();

    const MY_ID = 5291965471;
    const user = tg.initDataUnsafe?.user || { id: 5291965471, username: "admin_danik" };
    const myName = user.username || `User_${user.id}`;
    
    let isLoaded = false;
    let state = { score: 0, energy: 150, tapLvl: 1, passiveLvl: 0, lastUpdate: Date.now(), username: myName, lang: 'en', sound: true };

    const langData = {
        en: { sync: "LIVE", scoreL: "SCORE", tapL: "TAP TO EARN", passL: "Passive", topT: "TOP 5 JUUG'ERS", shopT: "SHOP", clUp: "CLICK UPGRADES", clDe: "Increase tap income", psUp: "PASSIVE INCOME", psDe: "Automatic income", back: "← BACK", gearT: "GEAR", langL: "Language", soundL: "Sound", navTop: "TOP", navGame: "GAME", navShop: "SHOP", navGear: "GEAR", ranks: ["Noob Juug'er", "Default Juug'er", "Pro Juug'er", "Hacker Juug'er", "God Juug'er"] },
        ru: { sync: "В СЕТИ", scoreL: "СЧЕТ", tapL: "ТАПАЙ ЧТОБЫ ЗАРАБОТАТЬ", passL: "Пассив", topT: "ТОП 5 ДЖУГЕРОВ", shopT: "МАГАЗИН", clUp: "ПРОКАЧКА КЛИКА", clDe: "Увеличить доход за тап", psUp: "ПАССИВНЫЙ ДОХОД", psDe: "Автоматический доход", back: "← НАЗАД", gearT: "МЕНЮ", langL: "Язык", soundL: "Звук", navTop: "ТОП", navGame: "ИГРА", navShop: "МАГАЗИН", navGear: "МЕНЮ", ranks: ["Нуб Джугер", "Обычный Джугер", "Про Джугер", "Хакер Джугер", "Бог Джугер"] }
    };

    // --- BACKGROUND ---
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let bgParticles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    class BgP {
        constructor() { this.reset(); }
        reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 1.5 + 0.5; this.speedX = (Math.random() - 0.5) * 0.3; this.speedY = (Math.random() - 0.5) * 0.3; this.opacity = Math.random() * 0.4 + 0.1; }
        update() { this.x += this.speedX; this.y += this.speedY; if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset(); }
        draw() { ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
    }
    for (let i = 0; i < 40; i++) bgParticles.push(new BgP());
    function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); bgParticles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
    animate();

    // --- LOGIC ---
    function format(n) { return n >= 1e6 ? (n/1e6).toFixed(1) + 'M' : n >= 1e3 ? (n/1e3).toFixed(1) + 'K' : Math.floor(n); }
    function getRank(lvl) { return langData[state.lang].ranks[Math.min(Math.floor((lvl || 1) / 10), 4)]; }

    // Загрузка с защитой от перезаписи
    db.ref(`users/${user.id}`).once('value', (snap) => {
        const data = snap.val();
        if (data && data.username) {
            // Рассчитываем оффлайн доход
            const now = Date.now();
            const offTime = Math.floor((now - (data.lastUpdate || now)) / 1000);
            const earned = Math.max(0, offTime * (data.passiveLvl || 0));
            
            state = { 
                ...state, 
                ...data,
                score: (data.score || 0) + earned,
                energy: Math.min(150, (data.energy || 150) + offTime)
            };
        }
        state.username = myName;
        isLoaded = true;
        document.getElementById('p-name').innerText = "@" + state.username;
        if (user.id === MY_ID) document.getElementById('admin-panel').classList.remove('hidden');
        updateLangUI(); updateUI();
    });

    function save() { 
        if (isLoaded) { 
            state.lastUpdate = Date.now(); 
            // Используем update вместо set для безопасности
            db.ref(`users/${user.id}`).update(state); 
        } 
    }

    function updateUI() {
        document.getElementById('score').innerText = format(state.score);
        document.getElementById('passive-display').innerText = `${langData[state.lang].passL}: ${state.passiveLvl || 0}/sec`;
        document.getElementById('e-text').innerText = `${state.energy || 0} / 150`;
        document.getElementById('e-fill').style.width = ((state.energy || 0) / 1.5) + '%';
    }

    document.getElementById('tapBtn').onclick = (e) => {
        if (isLoaded && state.energy > 0) {
            state.score += (state.tapLvl || 1); 
            state.energy--;
            updateUI(); 
            if(state.sound) tg.HapticFeedback.impactOccurred('light');

            const num = document.createElement('div');
            num.className = 'tap-effect'; num.innerText = `+${state.tapLvl || 1}`;
            num.style.left = e.clientX + 'px'; num.style.top = e.clientY + 'px';
            document.body.appendChild(num); setTimeout(() => num.remove(), 600);

            for (let i = 0; i < 5; i++) {
                const p = document.createElement('div');
                p.className = 'tap-particle'; p.style.width = p.style.height = (Math.random() * 4 + 2) + 'px';
                p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
                p.style.setProperty('--dx', (Math.random() - 0.5) * 150 + 'px');
                p.style.setProperty('--dy', (Math.random() - 0.5) * 150 + 'px');
                document.body.appendChild(p); setTimeout(() => p.remove(), 500);
            }
        }
    };

    function loadLeaderboard() {
        const list = document.getElementById('leaderboard-list');
        list.innerHTML = "<p style='text-align:center; color:#555;'>Syncing...</p>";
        db.ref('users').once('value', (snap) => {
            const data = snap.val(); if (!data) return;
            let players = Object.values(data)
                .filter(p => p && p.username)
                .sort((a, b) => (b.score || 0) - (a.score || 0))
                .slice(0, 5);
            list.innerHTML = "";
            players.forEach((p, i) => {
                const medals = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣'];
                const pLvl = p.tapLvl || 1;
                const pRank = langData[state.lang].ranks[Math.min(Math.floor(pLvl / 10), 4)];
                list.innerHTML += `<div class="card" style="${p.username === myName ? 'border-color: #777;' : ''}">
                    <div style="font-size:20px; min-width:40px;">${medals[i]}</div>
                    <div style="flex:1"><div style="font-weight:900;">@${p.username}</div><div style="font-size:10px; color:#555">${pRank} (Lvl ${pLvl})</div></div>
                    <div style="font-weight:900;">${format(p.score || 0)}</div>
                </div>`;
            });
        });
    }

    window.openUpgrade = (type) => { document.getElementById('shop-main').classList.add('hidden'); document.getElementById('shop-detail').classList.remove('hidden'); renderUpgradeItems(type); };
    window.backToShop = () => { document.getElementById('shop-main').classList.remove('hidden'); document.getElementById('shop-detail').classList.add('hidden'); };
    
    function renderUpgradeItems(type) {
        const cont = document.getElementById('upgrade-items');
        const lvl = type === 'click' ? (state.tapLvl || 1) : (state.passiveLvl || 0);
        const price = Math.floor(100 * Math.pow(1.4, lvl + (type==='click'?0:1))); 
        const rank = getRank(lvl);
        cont.innerHTML = `<div class="card">
            <div style="flex:1"><b>${rank}</b><br><span style="font-size:11px; color:#666">Level ${lvl} → ${lvl+1}</span></div>
            <button class="buy-btn" ${state.score < price ? 'disabled' : ''} onclick="buy('${type}', ${price})">${format(price)}</button>
        </div>`;
    }

    window.buy = (type, p) => { 
        if (state.score >= p) { 
            state.score -= p; 
            if (type === 'click') state.tapLvl = (state.tapLvl || 1) + 1; 
            else state.passiveLvl = (state.passiveLvl || 0) + 1; 
            updateUI(); renderUpgradeItems(type); save(); // Мгновенный сейв
            if(state.sound) tg.HapticFeedback.notificationOccurred('success'); 
        } 
    };
    
    function updateLangUI() {
        const l = langData[state.lang];
        const map = { 'sync-text':'sync', 't-score-label':'scoreL', 't-tap-label':'tapL', 't-top-title':'topT', 't-shop-title':'shopT', 't-click-up':'clUp', 't-click-desc':'clDe', 't-pass-up':'psUp', 't-pass-desc':'psDe', 't-back':'back', 't-gear-title':'gearT', 't-lang-label':'langL', 't-sound-label':'soundL', 't-nav-top':'navTop', 't-nav-game':'navGame', 't-nav-shop':'navShop', 't-nav-gear':'navGear' };
        for(let id in map) if(document.getElementById(id)) document.getElementById(id).innerText = l[map[id]];
        document.getElementById('cur-lang').innerText = state.lang === 'en' ? "English" : "Русский";
        document.getElementById('cur-sound').innerText = state.sound ? "ON" : "OFF";
    }

    function toggleLang() { state.lang = state.lang === 'en' ? 'ru' : 'en'; updateLangUI(); updateUI(); save(); }
    function toggleSound() { state.sound = !state.sound; document.getElementById('cur-sound').innerText = state.sound ? "ON" : "OFF"; save(); }
    
    window.show = (id) => { 
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden')); 
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); 
        document.getElementById(id).classList.remove('hidden'); 
        document.getElementById('n-' + id.split('-')[1]).classList.add('active'); 
        if (id === 's-top') loadLeaderboard(); 
    };

    // Основной цикл
    setInterval(() => { 
        if (!isLoaded) return; 
        state.score += (state.passiveLvl || 0); 
        if (state.energy < 150) state.energy++; 
        updateUI(); 
    }, 1000);

    // Сейв цикл (раз в 10 секунд для снижения нагрузки)
    setInterval(() => { if(isLoaded) save(); }, 10000);
</script>
</body>
</html>
