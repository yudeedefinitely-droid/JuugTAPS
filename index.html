<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JuugTAPS</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --b: #000; --w: #fff; --g: #111; --sg: #222; --accent: rgba(255,255,255,0.8); --red: #ff4444; --green: #00ff88; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--b); color: var(--w); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.5s ease; }
        .loader-logo { width: 150px; height: 150px; margin-bottom: 30px; object-fit: contain; }
        .loader-bar { width: 180px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; position: relative; }
        .loader-progress { width: 60%; height: 100%; background: #fff; box-shadow: 0 0 15px #fff; position: absolute; animation: loadAnim 1.5s infinite ease-in-out; }
        @keyframes loadAnim { 0% { left: -100%; } 100% { left: 100%; } }

        #maint-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        #maint-screen h1 { font-size: 40px; margin-bottom: 20px; font-weight: 900; letter-spacing: -1px; }
        #maint-msg { color: #888; font-size: 14px; font-weight: 700; max-width: 80%; line-height: 1.4; }

        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; position: relative; height: 100%; z-index: 1; overflow: hidden; }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; padding-bottom: 140px; opacity: 0; pointer-events: none; transform: translateY(15px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .screen.active { opacity: 1; pointer-events: auto; transform: translateY(0); }

        .header { width: 100%; display: flex; justify-content: space-between; font-weight: 700; font-size: 14px; margin-bottom: 20px; color: #555; }
        #score { font-size: 72px; font-weight: 900; margin-top: 5px; letter-spacing: -2px; }
        
        .tap-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; min-height: 300px; }
        .main-circle { width: 240px; height: 240px; border: 4px solid var(--w); border-radius: 50%; transition: transform 0.05s ease-out; background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 70%); box-shadow: 0 0 20px rgba(255,255,255,0.05); position: relative; z-index: 2; touch-action: manipulation; }
        .main-circle.is-active { transform: scale(0.92); background: rgba(255,255,255,0.15); }

        .tap-effect { position: absolute; pointer-events: none; color: #fff; font-weight: 900; font-size: 26px; animation: floatUp 0.6s ease-out forwards; z-index: 10; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }

        .energy-box { width: 100%; text-align: center; margin-bottom: 20px; position: relative; }
        .bar-bg { height: 24px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; margin: 15px 0; overflow: hidden; position: relative; backdrop-filter: blur(5px); }
        #e-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #fff 0%, rgba(200,200,200,0.8) 100%); transition: width 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 0 0 15px rgba(255,255,255,0.2); position: relative; }
        #e-text { position: absolute; width: 100%; left: 0; top: 50%; transform: translateY(-50%); font-size: 10px; font-weight: 900; letter-spacing: 1px; color: var(--w); text-shadow: 0 0 5px #000; z-index: 10; mix-blend-mode: difference; }

        /* ВИЗУАЛ МАГАЗИНА ИЗ ИДЕАЛЬНОГО КОДА */
        .card { width: 100%; background: var(--g); border: 1px solid var(--sg); padding: 18px; border-radius: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .card:active { transform: scale(0.98); background: #151515; }
        .card.special { border: 1px solid rgba(255,255,255,0.3); background: linear-gradient(145deg, #111, #050505); }
        
        .buy-btn { background: var(--w); color: var(--b); border: none; padding: 10px 18px; border-radius: 8px; font-weight: 900; font-size: 14px; min-width: 80px; transition: 0.2s; }
        .buy-btn:disabled { background: #333; color: #555; }

        nav { position: absolute; bottom: 0; width: 100%; display: flex; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); border-top: 1px solid var(--sg); padding: 15px 0 35px; z-index: 100; }
        .nav-item { flex: 1; text-align: center; color: #444; font-size: 10px; font-weight: 800; cursor: pointer; }
        .nav-item.active { color: var(--w); }
        .nav-item span { display: block; font-size: 24px; margin-bottom: 4px; filter: grayscale(1) brightness(2); }

        .top-user { width: 100%; background: var(--g); border: 1px solid var(--sg); padding: 15px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; }
        .top-rank { font-weight: 900; width: 30px; color: #555; font-size: 18px; }
        .top-info { flex: 1; text-align: left; padding-left: 10px; }
        .top-name { font-weight: 800; font-size: 15px; }
        .top-score { font-size: 14px; font-weight: 900; color: #fff; }

        #winners-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 15000; display: none; flex-direction: column; align-items: center; padding: 40px 20px; text-align: center; overflow-y: auto; }
        #admin-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .admin-content { background: #111; width: 100%; max-width: 400px; border-radius: 20px; padding: 20px; border: 1px solid #333; }
        .admin-btn { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: none; font-weight: 800; color: #fff; cursor: pointer; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div style="width:80px; height:80px; background:#fff; border-radius:50%; box-shadow: 0 0 30px #fff;"></div>
    <div class="loader-bar" style="margin-top:20px;"><div class="loader-progress"></div></div>
</div>

<div id="maint-screen">
    <h1 style="font-size:40px; margin-bottom:20px;">ТЕХПЕРЕРЫВ</h1>
    <p id="maint-msg" style="color:#888; font-weight:700;"></p>
</div>

<div id="app">
    <canvas id="particleCanvas"></canvas>

    <div id="s-game" class="screen active">
        <div class="header"><div id="t-score-label">SCORE</div><div id="t-tap-label">TAP POWER</div></div>
        <div style="display: flex; justify-content: space-between; width: 100%; align-items: baseline;">
            <div id="score">0</div>
            <div id="tap-val" style="font-size: 24px; font-weight: 900;">1</div>
        </div>
        <div class="tap-area"><div class="main-circle" id="circle"></div></div>
        <div class="energy-box">
            <div class="bar-bg"><div id="e-fill"></div><div id="e-text">1000 / 1000</div></div>
        </div>
    </div>

    <div id="s-top" class="screen">
        <h2 id="t-top-title" style="font-size: 32px; font-weight: 900; margin-bottom: 25px; width: 100%;">LEADERS</h2>
        <button id="show-winners-btn" class="buy-btn" style="width:100%; margin-bottom:15px; display:none;" onclick="showWinners()">SHOW WINNERS</button>
        <div id="top-list" style="width: 100%;"></div>
    </div>

    <div id="s-shop" class="screen">
        <h2 id="t-shop-title" style="font-size: 32px; font-weight: 900; margin-bottom: 25px; width: 100%;">SHOP</h2>
        
        <div class="card special" id="case-card" onclick="openCase()">
            <div style="display: flex; align-items: center;">
                <span style="font-size: 28px; margin-right: 15px;">📦</span>
                <div>
                    <div id="t-case-name" style="font-weight: 900; font-size: 16px;">DAILY CASE</div>
                    <div id="case-timer" style="font-size: 11px; color: var(--green); font-weight: 800; margin-top: 2px;">READY</div>
                </div>
            </div>
            <button class="buy-btn" id="case-btn">OPEN</button>
        </div>

        <div style="width: 100%; margin: 20px 0 10px; font-size: 12px; font-weight: 900; color: #444; letter-spacing: 1px;">UPGRADES</div>
        <div id="up-click-cont" style="width: 100%;"></div>
        <div id="up-pass-cont" style="width: 100%;"></div>
    </div>

    <div id="s-gear" class="screen">
        <h2 id="t-gear-title" style="font-size: 32px; font-weight: 900; margin-bottom: 25px; width: 100%;">SETTINGS</h2>
        <div class="card" onclick="toggleLang()"><span id="t-lang-label">LANGUAGE</span><b id="cur-lang">EN</b></div>
        <div class="card" onclick="toggleSound()"><span id="t-sound-label">HAPTIC</span><b id="cur-sound">ON</b></div>
    </div>

    <nav>
        <div class="nav-item" onclick="show('top')" id="nav-top"><span>🏆</span><p id="t-nav-top">TOP</p></div>
        <div class="nav-item active" onclick="show('game')" id="nav-game"><span>⚡</span><p id="t-nav-game">GAME</p></div>
        <div class="nav-item" onclick="show('shop')" id="nav-shop"><span>💎</span><p id="t-nav-shop">SHOP</p></div>
        <div class="nav-item" onclick="show('gear')" id="nav-gear"><span>⚙️</span><p id="t-nav-gear">GEAR</p></div>
    </nav>
</div>

<div id="winners-popup">
    <h2 id="t-winners-title" style="font-size: 32px; font-weight: 900; margin-bottom: 25px;">WINNERS</h2>
    <div id="winners-list" style="width: 100%; margin-bottom: 20px;"></div>
    <button class="buy-btn" onclick="document.getElementById('winners-popup').style.display='none'" style="width: 100%; padding: 18px;">CLOSE</button>
</div>

<div id="admin-modal">
    <div class="admin-content">
        <h2 style="margin-bottom: 20px; font-weight: 900;">ADMIN PANEL</h2>
        <button class="admin-btn" style="background:var(--green); color:#000;" onclick="adminStartEvent()">START EVENT</button>
        <button class="admin-btn" style="background:var(--red);" onclick="adminStopEvent()">STOP & RESET</button>
        <button class="admin-btn" style="background:#222;" onclick="adminToggleMaint()">TOGGLE MAINT</button>
        <input type="text" id="admin-maint-msg" placeholder="Msg..." style="width: 100%; padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid #333; color: #fff;">
        <button class="admin-btn" style="background:#333;" onclick="document.getElementById('admin-modal').style.display='none'">CLOSE</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://juugtaaap-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    const userId = tg.initDataUnsafe?.user?.id || "local_user";
    const userName = tg.initDataUnsafe?.user?.first_name || "Guest";

    let state = { score: 0, tapLvl: 1, passiveLvl: 0, energy: 1000, maxE: 1000, lastCase: 0, lang: 'en', sound: true };

    const langData = {
        en: { scoreL: 'SCORE', tapL: 'TAP POWER', topT: 'LEADERS', shopT: 'SHOP', clUp: 'Click Power', clDe: 'Increase tap', psUp: 'Passive', psDe: 'Earn while away', gearT: 'SETTINGS', langL: 'LANGUAGE', soundL: 'HAPTIC', navTop: 'TOP', navGame: 'GAME', navShop: 'SHOP', navGear: 'GEAR', caseName: 'DAILY CASE', caseOpen: 'OPEN', winTitle: 'WINNERS' },
        ru: { scoreL: 'СЧЕТ', tapL: 'СИЛА КЛИКА', topT: 'ЛИДЕРЫ', shopT: 'МАГАЗИН', clUp: 'Сила клика', clDe: 'Улучшить клик', psUp: 'Пассив', psDe: 'Доход в сек', gearT: 'ОПЦИИ', langL: 'ЯЗЫК', soundL: 'ВИБРО', navTop: 'ТОП', navGame: 'ИГРА', navShop: 'МАГАЗИН', navGear: 'МЕНЮ', caseName: 'КЕЙС', caseOpen: 'ОТКРЫТЬ', winTitle: 'ПОБЕДИТЕЛИ' }
    };

    function getRankName(level) {
        if(level < 5) return "Noob Juug'er";
        if(level < 15) return "Street Juug'er";
        if(level < 30) return "Hustle Juug'er";
        if(level < 50) return "Trap Lord";
        return "Juug Master";
    }

    // --- ADMIN ---
    function adminStartEvent() { db.ref('settings/event').set({ active: true, startTime: Date.now() }); }
    function adminStopEvent() {
        db.ref('users').once('value', s => {
            let arr = []; s.forEach(c => arr.push(c.val()));
            arr.sort((a,b) => b.score - a.score);
            db.ref('winners').push({ date: Date.now(), list: arr.slice(0, 3) });
            s.forEach(c => db.ref('users/'+c.key).update({ score: 0, tapLvl: 1, passiveLvl: 0 }));
            db.ref('settings/event').set({ active: false });
        });
    }
    function adminToggleMaint() {
        db.ref('settings/maint').once('value', s => {
            const cur = s.val()?.active || false;
            db.ref('settings/maint').set({ active: !cur, msg: document.getElementById('admin-maint-msg').value || "Maint" });
        });
    }

    // --- ENGINE ---
    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('s-' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('nav-' + id).classList.add('active');
        if(id === 'top') updateTop();
        if(id === 'shop') { renderUp('click'); renderUp('pass'); updateCaseUI(); }
    }

    function renderUp(t) {
        const cont = document.getElementById(t === 'click' ? 'up-click-cont' : 'up-pass-cont');
        const lvl = t === 'click' ? state.tapLvl : state.passiveLvl;
        const price = t === 'click' ? Math.floor(10 * Math.pow(1.5, lvl-1)) : Math.floor(50 * Math.pow(1.6, lvl));
        const desc = t === 'click' ? langData[state.lang].clDe : langData[state.lang].psDe;
        
        cont.innerHTML = `
            <div class="card" onclick="buy('${t}', ${price})">
                <div style="display: flex; align-items: center;">
                    <span style="font-size: 24px; margin-right: 15px;">${t==='click'?'⚡':'💰'}</span>
                    <div>
                        <div style="font-weight: 900; font-size: 15px;">${getRankName(lvl)}</div>
                        <div style="font-size: 11px; color: #555; font-weight: 800; margin-top: 2px;">LVL ${lvl} • ${desc}</div>
                    </div>
                </div>
                <button class="buy-btn" ${state.score < price ? 'disabled' : ''}>${price}</button>
            </div>`;
    }

    function buy(t, p) {
        if(state.score >= p) {
            state.score -= p;
            if(t === 'click') state.tapLvl++; else state.passiveLvl++;
            updateUI(); renderUp(t); save();
        }
    }

    function updateUI() {
        document.getElementById('score').innerText = Math.floor(state.score).toLocaleString();
        document.getElementById('tap-val').innerText = state.tapLvl;
        document.getElementById('e-fill').style.width = (state.energy / state.maxE * 100) + '%';
        document.getElementById('e-text').innerText = `${Math.floor(state.energy)} / ${state.maxE}`;
    }

    function updateTop() {
        db.ref('users').orderByChild('score').limitToLast(10).once('value', s => {
            const list = document.getElementById('top-list'); list.innerHTML = '';
            let arr = []; s.forEach(c => arr.push(c.val())); arr.reverse();
            arr.forEach((u, i) => {
                list.innerHTML += `<div class="top-user"><div class="top-rank">${i+1}</div><div class="top-info"><div class="top-name">${u.name}</div></div><div class="top-score">${Math.floor(u.score)}</div></div>`;
            });
        });
    }

    function updateCaseUI() {
        const wait = 24 * 60 * 60 * 1000;
        const diff = Date.now() - state.lastCase;
        if(diff < wait) {
            const left = wait - diff;
            const h = Math.floor(left / 3600000);
            document.getElementById('case-timer').innerText = h + "H LEFT";
            document.getElementById('case-btn').disabled = true;
        } else {
            document.getElementById('case-timer').innerText = "READY";
            document.getElementById('case-btn').disabled = false;
        }
    }

    function openCase() {
        if(Date.now() - state.lastCase >= 24 * 60 * 60 * 1000) {
            const win = Math.floor(Math.random() * 9900) + 100;
            state.score += win; state.lastCase = Date.now();
            updateUI(); updateCaseUI(); save();
            alert("WIN: " + win);
        }
    }

    function save() { db.ref('users/' + userId).set({ id: userId, name: userName, score: state.score, tapLvl: state.tapLvl, passiveLvl: state.passiveLvl, lastCase: state.lastCase }); }
    
    db.ref('users/' + userId).once('value', s => {
        if(s.exists()) Object.assign(state, s.val());
        document.getElementById('loading-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
        updateUI(); updateLangUI();
    });

    setInterval(() => {
        state.score += state.passiveLvl / 10;
        if(state.energy < state.maxE) state.energy = Math.min(state.maxE, state.energy + 1.5);
        updateUI();
    }, 100);

    document.getElementById('circle').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(state.energy >= 1) {
            state.score += state.tapLvl; state.energy -= 1; updateUI();
            if(state.sound) tg.HapticFeedback.impactOccurred('medium');
            const touch = e.touches[0];
            const ef = document.createElement('div');
            ef.className = 'tap-effect'; ef.innerText = '+' + state.tapLvl;
            ef.style.left = touch.pageX + 'px'; ef.style.top = touch.pageY + 'px';
            document.body.appendChild(ef); setTimeout(() => ef.remove(), 600);
        }
    });

    function toggleLang() { state.lang = state.lang === 'en' ? 'ru' : 'en'; updateLangUI(); if(document.getElementById('s-shop').classList.contains('active')) { renderUp('click'); renderUp('pass'); } }
    function toggleSound() { state.sound = !state.sound; document.getElementById('cur-sound').innerText = state.sound ? "ON" : "OFF"; }

    function updateLangUI() {
        const l = langData[state.lang];
        const ids = { 't-score-label':'scoreL', 't-tap-label':'tapL', 't-top-title':'topT', 't-shop-title':'shopT', 't-gear-title':'gearT', 't-lang-label':'langL', 't-sound-label':'soundL', 't-nav-top':'navTop', 't-nav-game':'navGame', 't-nav-shop':'navShop', 't-nav-gear':'navGear', 't-case-name':'caseName', 'case-btn':'caseOpen', 't-winners-title':'winTitle' };
        for(let id in ids) { const e = document.getElementById(id); if(e) e.innerText = l[ids[id]]; }
        document.getElementById('cur-lang').innerText = state.lang.toUpperCase();
        document.getElementById('cur-sound').innerText = state.sound ? "ON" : "OFF";
    }

    let gearTimer;
    document.getElementById('nav-gear').addEventListener('touchstart', () => { gearTimer = setTimeout(() => document.getElementById('admin-modal').style.display='flex', 3000); });
    document.getElementById('nav-gear').addEventListener('touchend', () => clearTimeout(gearTimer));

    db.ref('settings/maint').on('value', s => {
        const m = s.val();
        if(m?.active) { document.getElementById('maint-screen').style.display = 'flex'; document.getElementById('maint-msg').innerText = m.msg; }
        else document.getElementById('maint-screen').style.display = 'none';
    });

    function showWinners() {
        db.ref('winners').limitToLast(5).once('value', s => {
            const list = document.getElementById('winners-list'); list.innerHTML = '';
            s.forEach(snap => {
                const data = snap.val();
                let inner = `<div style="margin-bottom:15px; background:#111; padding:10px; border-radius:10px;"><small>${new Date(data.date).toLocaleDateString()}</small>`;
                data.list.forEach((w, i) => inner += `<div style="display:flex; justify-content:space-between;"><span>#${i+1} ${w.name}</span><b>${Math.floor(w.score)}</b></div>`);
                list.innerHTML = inner + "</div>" + list.innerHTML;
            });
            document.getElementById('winners-popup').style.display = 'flex';
        });
    }

    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let particles = [];
    class Particle {
        constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.size = Math.random()*1.5; this.sx = Math.random()*0.4-0.2; this.sy = Math.random()*0.4-0.2; }
        update() { this.x += this.sx; this.y += this.sy; if(this.x>canvas.width)this.x=0; if(this.y>canvas.height)this.y=0; }
        draw() { ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); }
    }
    for(let i=0; i<50; i++) particles.push(new Particle());
    function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
    animate();
</script>
</body>
</html>
