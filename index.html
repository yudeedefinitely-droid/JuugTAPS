<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JuugTAPS</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --b: #000; --w: #fff; --g: #111; --sg: #222; --accent: #fff; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--b); color: var(--w); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; justify-content: center; }

        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; position: relative; height: 100%; z-index: 1; }
        .screen { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; padding-bottom: 120px; }
        .hidden { display: none !important; }

        .header { width: 100%; display: flex; justify-content: space-between; font-weight: 700; font-size: 14px; margin-bottom: 20px; color: #555; }
        #score { font-size: 72px; font-weight: 900; margin-top: 5px; text-shadow: 0 0 20px rgba(255,255,255,0.3); }
        
        /* КРАСИВАЯ КНОПКА ТАПА */
        .tap-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; width: 100%; }
        .main-circle { 
            width: 260px; height: 260px; 
            border: 6px solid var(--w); 
            border-radius: 50%; 
            position: relative;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0) 70%);
            box-shadow: 0 0 30px rgba(255,255,255,0.05), inset 0 0 20px rgba(255,255,255,0.05);
            transition: transform 0.05s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            z-index: 2;
        }
        .main-circle:active { transform: scale(0.92); box-shadow: 0 0 50px rgba(255,255,255,0.2); }

        /* Эффект вылетающих цифр */
        .float-text {
            position: absolute; color: white; font-weight: 900; font-size: 28px;
            pointer-events: none; animation: floatUp 0.6s ease-out forwards; z-index: 10;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.5); opacity: 0; }
        }

        .energy-box { width: 100%; text-align: center; margin-bottom: 20px; }
        .bar-bg { height: 10px; background: #1a1a1a; border-radius: 10px; margin: 15px 0; overflow: hidden; border: 1px solid #222; }
        #e-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #555, #fff); transition: width 0.2s; }

        .card { width: 100%; background: var(--g); border: 1px solid var(--sg); padding: 18px; border-radius: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .buy-btn { background: var(--w); color: var(--b); border: none; padding: 10px 18px; border-radius: 8px; font-weight: 900; }
        .buy-btn:disabled { background: #333; color: #555; }

        nav { position: absolute; bottom: 0; width: 100%; display: flex; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); border-top: 1px solid var(--sg); padding: 15px 0 35px; }
        .nav-item { flex: 1; text-align: center; color: #444; font-size: 11px; font-weight: 800; }
        .nav-item.active { color: var(--w); }
        .nav-item span { display: block; font-size: 22px; margin-bottom: 4px; }
        
        .settings-btn { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--sg); background: var(--g); color: #fff; font-weight: 800; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<div id="app">
    <section id="s-game" class="screen">
        <div class="header"><span id="p-name">@loading</span><span id="sync-text">SYNCING...</span></div>
        <p id="t-score-label" style="font-size:12px; font-weight:800; letter-spacing:2px; color:#666;">SCORE</p>
        <div id="score">0</div>
        <div id="passive-display" style="color:#888; font-size:12px; font-weight:800;">Passive: 0/sec</div>
        
        <div class="tap-area" id="trigger">
            <div class="main-circle" id="tapBtn"></div>
        </div>

        <div class="energy-box">
            <p id="t-tap-label" style="font-size:12px; font-weight:800;">TAP TO EARN</p>
            <div class="bar-bg"><div id="e-fill"></div></div>
            <b id="e-text">150 / 150</b>
        </div>
    </section>

    <section id="s-top" class="screen hidden">
        <h2 id="t-top-title" style="align-self:flex-start; margin-bottom:20px; font-weight:900;">TOP 5 JUUG'ERS</h2>
        <div id="leaderboard-list" style="width:100%;"></div>
    </section>

    <section id="s-shop" class="screen hidden">
        <h2 id="t-shop-title" style="align-self:flex-start; margin-bottom:20px; font-weight:900;">SHOP</h2>
        <div id="shop-main" style="width:100%;">
            <div class="card" onclick="openUpgrade('click')">
                <div style="flex:1"><b id="t-click-up">CLICK UPGRADES</b><br><span id="t-click-desc" style="font-size:11px; color:#666">Increase tap income</span></div>
                <span>➔</span>
            </div>
            <div class="card" onclick="openUpgrade('passive')">
                <div style="flex:1"><b id="t-pass-up">PASSIVE INCOME</b><br><span id="t-pass-desc" style="font-size:11px; color:#666">Automatic income</span></div>
                <span>➔</span>
            </div>
        </div>
        <div id="shop-detail" class="hidden" style="width:100%;">
            <button id="t-back" onclick="backToShop()" style="background:none; border:none; color:#555; font-weight:800; margin-bottom:15px;">← BACK</button>
            <div id="upgrade-items"></div>
        </div>
    </section>

    <section id="s-gear" class="screen hidden">
        <h2 id="t-gear-title" style="align-self:flex-start; margin-bottom:20px; font-weight:900;">GEAR</h2>
        <button class="settings-btn" onclick="toggleLang()">
            <span id="t-lang-label">Language</span><span id="cur-lang" style="color:#888">English</span>
        </button>
        <button class="settings-btn" onclick="toggleSound()">
            <span id="t-sound-label">Sound</span><span id="cur-sound" style="color:#888">ON</span>
        </button>
        <div id="admin-panel" class="hidden" style="width:100%; border:1px solid #ff4444; padding:15px; border-radius:12px; margin-top:20px;">
            <button style="width:100%; padding:15px; font-weight:900; background:#fff; border:none; border-radius:8px;">EVENT CONTROL</button>
        </div>
    </section>

    <nav>
        <div class="nav-item" id="n-top" onclick="show('s-top')"><span>🏆</span><p id="t-nav-top">TOP</p></div>
        <div class="nav-item active" id="n-game" onclick="show('s-game')"><span>💎</span><p id="t-nav-game">GAME</p></div>
        <div class="nav-item" id="n-shop" onclick="show('s-shop')"><span>🎁</span><p id="t-nav-shop">SHOP</p></div>
        <div class="nav-item" id="n-gear" onclick="show('s-gear')"><span>⚙️</span><p id="t-nav-gear">GEAR</p></div>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDcUMfQAd9QnoPUVxfM9SWp_lHBc2CaRKY",
        authDomain: "juugtaaap.firebaseapp.com",
        databaseURL: "https://juugtaaap-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "juugtaaap",
        storageBucket: "juugtaaap.firebasestorage.app",
        messagingSenderId: "230755213175",
        appId: "1:230755213175:web:60d2bd14da628347284b72"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    tg.expand();

    const MY_ID = 5291965471;
    const user = tg.initDataUnsafe?.user || { id: 5291965471, username: "admin_danik" };
    const myName = user.username || `User_${user.id}`;
    
    let isLoaded = false;
    let state = { score: 0, energy: 150, tapLvl: 1, passiveLvl: 0, lastUpdate: Date.now(), username: myName, lang: 'en', sound: true };

    const langData = {
        en: { sync: "LIVE", scoreL: "SCORE", tapL: "TAP TO EARN", passL: "Passive", topT: "TOP 5 JUUG'ERS", shopT: "SHOP", clUp: "CLICK UPGRADES", clDe: "Increase tap income", psUp: "PASSIVE INCOME", psDe: "Automatic income", back: "← BACK", gearT: "GEAR", langL: "Language", soundL: "Sound", navTop: "TOP", navGame: "GAME", navShop: "SHOP", navGear: "GEAR", ranks: ["Noob", "Default", "Pro", "Hacker", "God"] },
        ru: { sync: "В СЕТИ", scoreL: "СЧЕТ", tapL: "ТАПАЙ ЧТОБЫ ЗАРАБОТАТЬ", passL: "Пассив", topT: "ТОП 5 ДЖУГЕРОВ", shopT: "МАГАЗИН", clUp: "ПРОКАЧКА КЛИКА", clDe: "Увеличить доход за тап", psUp: "ПАССИВНЫЙ ДОХОД", psDe: "Автоматический доход", back: "← НАЗАД", gearT: "МЕНЮ", langL: "Язык", soundL: "Звук", navTop: "ТОП", navGame: "ИГРА", navShop: "МАГАЗИН", navGear: "МЕНЮ", ranks: ["Нуб", "Обычный", "Про", "Хакер", "Бог"] }
    };

    // --- ФОНОВЫЕ ЧАСТИЦЫ ---
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    class Particle {
        constructor() { this.reset(); }
        reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 1.2 + 0.5; this.speedX = (Math.random() - 0.5) * 0.4; this.speedY = (Math.random() - 0.5) * 0.4; this.opacity = Math.random() * 0.3 + 0.1; }
        update() { this.x += this.speedX; this.y += this.speedY; if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset(); }
        draw() { ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
    }
    for (let i = 0; i < 40; i++) particles.push(new Particle());
    function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
    animate();

    // --- ЛОГИКА ТАПА С ЭФФЕКТОМ ---
    document.getElementById('tapBtn').onclick = (e) => {
        if (isLoaded && state.energy > 0) {
            state.score += state.tapLvl; state.energy--;
            
            // Создание вылетающей цифры
            const float = document.createElement('div');
            float.className = 'float-text';
            float.innerText = `+${state.tapLvl}`;
            float.style.left = `${e.clientX - 20}px`;
            float.style.top = `${e.clientY - 40}px`;
            document.body.appendChild(float);
            setTimeout(() => float.remove(), 600);

            updateUI(); 
            if(state.sound) tg.HapticFeedback.impactOccurred('medium');
        }
    };

    // --- ВСЕ ОСТАЛЬНЫЕ ФУНКЦИИ (БЕЗ ПОТЕРЬ) ---
    function format(n) { return n >= 1e6 ? (n/1e6).toFixed(1) + 'M' : n >= 1e3 ? (n/1e3).toFixed(1) + 'K' : Math.floor(n); }
    function save() { if (!isLoaded) return; state.lastUpdate = Date.now(); db.ref(`users/${user.id}`).set(state); }

    db.ref(`users/${user.id}`).once('value', (snap) => {
        const data = snap.val();
        if (data) {
            state = { ...state, ...data };
            const offlineSec = Math.floor((Date.now() - (state.lastUpdate || Date.now())) / 1000);
            state.score += Math.max(0, offlineSec * (state.passiveLvl || 0));
            state.energy = Math.min(150, state.energy + (offlineSec || 0));
        }
        isLoaded = true; document.getElementById('p-name').innerText = "@" + state.username;
        if (user.id === MY_ID) document.getElementById('admin-panel').classList.remove('hidden');
        updateLangUI(); save();
    });

    function updateUI() {
        document.getElementById('score').innerText = format(state.score);
        document.getElementById('passive-display').innerText = `${langData[state.lang].passL}: ${state.passiveLvl}/sec`;
        document.getElementById('e-text').innerText = `${state.energy} / 150`;
        document.getElementById('e-fill').style.width = (state.energy / 1.5) + '%';
    }

    function updateLangUI() {
        const l = langData[state.lang];
        ['sync-text','t-score-label','t-tap-label','t-top-title','t-shop-title','t-click-up','t-click-desc','t-pass-up','t-pass-desc','t-back','t-gear-title','t-lang-label','t-sound-label','t-nav-top','t-nav-game','t-nav-shop','t-nav-gear'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).innerText = l[id.replace('t-','').replace('-label','').replace('-up','Up').replace('-desc','De').replace('nav-','nav').replace('sync-text','sync')]; });
        document.getElementById('cur-lang').innerText = state.lang === 'en' ? "English" : "Русский";
        document.getElementById('cur-sound').innerText = state.sound ? "ON" : "OFF";
        updateUI();
    }

    setInterval(() => {
        if (!isLoaded) return;
        state.score += (state.passiveLvl || 0);
        if (state.energy < 150) state.energy++;
        updateUI();
        if (Math.floor(Date.now() / 1000) % 5 === 0) save(); 
    }, 1000);

    window.show = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('n-' + id.split('-')[1]).classList.add('active');
        if (id === 's-top') loadLeaderboard();
    };

    window.openUpgrade = (type) => { document.getElementById('shop-main').classList.add('hidden'); document.getElementById('shop-detail').classList.remove('hidden'); renderUpgradeItems(type); };
    window.backToShop = () => { document.getElementById('shop-main').classList.remove('hidden'); document.getElementById('shop-detail').classList.add('hidden'); };

    function renderUpgradeItems(type) {
        const cont = document.getElementById('upgrade-items');
        const lvl = type === 'click' ? state.tapLvl : state.passiveLvl;
        const price = Math.floor(100 * Math.pow(1.4, lvl));
        cont.innerHTML = `<div class="card"><div style="flex:1"><b>Lvl ${lvl}</b><br><small>Next: ${format(price)}</small></div><button class="buy-btn" ${state.score < price ? 'disabled' : ''} onclick="buy('${type}', ${price})">BUY</button></div>`;
    }

    window.buy = (type, p) => { if (state.score >= p) { state.score -= p; if (type === 'click') state.tapLvl++; else state.passiveLvl++; save(); updateUI(); renderUpgradeItems(type); if(state.sound) tg.HapticFeedback.notificationOccurred('success'); } };

    function loadLeaderboard() {
        const list = document.getElementById('leaderboard-list');
        db.ref('users').orderByChild('score').limitToLast(5).once('value', (snap) => {
            let players = []; snap.forEach(c => players.push(c.val()));
            list.innerHTML = ""; players.reverse().forEach((p, i) => {
                list.innerHTML += `<div class="card"><span>#${i+1} @${p.username}</span><b>${format(p.score)}</b></div>`;
            });
        });
    }

    function toggleLang() { state.lang = state.lang === 'en' ? 'ru' : 'en'; updateLangUI(); save(); }
    function toggleSound() { state.sound = !state.sound; updateLangUI(); save(); }
</script>
</body>
</html>
