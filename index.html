<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JuugTAPS</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --b: #000; --w: #fff; --g: #111; --sg: #222; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--b); color: var(--w); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        
        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; position: relative; height: 100%; }
        .screen { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; padding-bottom: 120px; }
        .hidden { display: none !important; }

        /* Header */
        .header { width: 100%; display: flex; justify-content: space-between; font-weight: 700; font-size: 13px; margin-bottom: 20px; color: #aaa; }
        #event-timer.active { color: #fff; }

        /* Game UI (Matching your mockup) */
        .score-container { text-align: center; margin-top: 10px; }
        .score-label { font-size: 12px; letter-spacing: 2px; color: #fff; font-weight: 800; margin-bottom: 5px; }
        #score { font-size: 64px; font-weight: 900; }
        
        .tap-area { flex: 1; display: flex; align-items: center; justify-content: center; }
        .main-circle { 
            width: 280px; height: 280px; border: 4px solid var(--w); border-radius: 50%; 
            transition: transform 0.05s; 
        }
        .main-circle:active { transform: scale(0.96); background: rgba(255,255,255,0.05); }

        .energy-box { width: 100%; text-align: center; margin-bottom: 20px; }
        .bar-bg { height: 10px; background: #1a1a1a; border-radius: 20px; margin: 15px 0; overflow: hidden; width: 100%; }
        #e-fill { height: 100%; width: 100%; background: #fff; transition: width 0.2s; border-radius: 20px; }

        /* Cards & Shop */
        .card { width: 100%; background: var(--g); border: 1px solid var(--sg); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .leader-name { font-weight: 900; font-size: 15px; }
        .leader-rank { font-size: 20px; min-width: 35px; }

        /* Navigation */
        nav { position: absolute; bottom: 0; width: 100%; display: flex; background: var(--b); border-top: 1px solid var(--sg); padding: 10px 0 30px; }
        .nav-item { flex: 1; text-align: center; color: #444; font-size: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .nav-item.active { color: var(--w); }
        .nav-item span { display: block; font-size: 18px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="app">
    <section id="s-game" class="screen">
        <div class="header"><span id="p-name">@loading</span><span id="event-timer">EVENT: 00h 00m</span></div>
        <div class="score-container">
            <div class="score-label">SCORE</div>
            <div id="score">0</div>
        </div>
        <div class="tap-area"><div class="main-circle" id="tapBtn"></div></div>
        <div class="energy-box">
            <p style="font-size: 12px; font-weight: 800;">TAP TO EARN</p>
            <div class="bar-bg"><div id="e-fill"></div></div>
            <b id="e-text" style="font-size: 16px;">150 / 150</b>
        </div>
    </section>

    <section id="s-top" class="screen hidden">
        <h2 style="align-self:flex-start; margin-bottom:20px; font-weight: 900;">TOP 5 JUUG'ERS</h2>
        <div id="leaderboard-list" style="width:100%;"></div>
    </section>

    <section id="s-shop" class="screen hidden">
        <h2 style="align-self:flex-start; margin-bottom:20px;">SHOP</h2>
        <div id="shop-items" style="width:100%;">
            <div class="card" onclick="toggleShop('click')"><b>CLICK UPGRADES</b> <span>➔</span></div>
            <div class="card" onclick="toggleShop('passive')"><b>PASSIVE INCOME</b> <span>➔</span></div>
        </div>
        <div id="shop-detail" class="hidden" style="width:100%;">
            <button onclick="backToShop()" style="background:none; border:none; color:#555; font-weight:800; margin-bottom:15px;">← НАЗАД</button>
            <div id="upgrade-container"></div>
        </div>
    </section>

    <section id="s-gear" class="screen hidden">
        <h2 style="align-self:flex-start; margin-bottom:20px;">GEAR</h2>
        <div id="admin-panel" class="hidden" style="width:100%; border:1px solid #ff4444; padding:15px; border-radius:10px;">
            <p style="color:#ff4444; font-size:10px; font-weight:900; margin-bottom:10px;">ADMIN PANEL</p>
            <button id="eventControl" style="width:100%; padding:12px; font-weight:900; background:#fff; border:none; border-radius:5px;">ЗАПУСТИТЬ ИВЕНТ</button>
        </div>
    </section>

    <nav>
        <div class="nav-item" id="n-top" onclick="show('s-top')"><span>🏆</span>TOP</div>
        <div class="nav-item active" id="n-game" onclick="show('s-game')"><span>💎</span>GAME</div>
        <div class="nav-item" id="n-shop" onclick="show('s-shop')"><span>🎁</span>SHOP</div>
        <div class="nav-item" id="n-gear" onclick="show('s-gear')"><span>⚙️</span>GEAR</div>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDcUMfQAd9QnoPUVxfM9SWp_lHBc2CaRKY",
        authDomain: "juugtaaap.firebaseapp.com",
        databaseURL: "https://juugtaaap-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "juugtaaap",
        storageBucket: "juugtaaap.firebasestorage.app",
        messagingSenderId: "230755213175",
        appId: "1:230755213175:web:60d2bd14da628347284b72"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    tg.expand();

    const MY_ID = 5291965471;
    const userData = tg.initDataUnsafe?.user || { id: 5291965471, username: "admin_danik" };
    
    // Исправление username
    const validUsername = userData.username || `user_${userData.id}`;
    
    let state = { score: 0, energy: 150, tapLvl: 1, passiveLvl: 0, lastUpdate: Date.now(), username: validUsername };
    const names = ["Noob Juug'er", "Default Juug'er", "Pro Juug'er", "Hacker Juug'er", "God Juug'er"];

    // Загрузка
    db.ref(`users/${userData.id}`).once('value', (snap) => {
        if (snap.val()) {
            state = { ...state, ...snap.val(), username: validUsername };
            const offline = Math.floor((Date.now() - state.lastUpdate) / 1000);
            state.score += Math.max(0, offline * state.passiveLvl);
        }
        document.getElementById('p-name').innerText = "@" + state.username;
        save(); // Сразу обновляем имя в базе
        updateUI();
    });

    // Лидерборд
    function loadLeaderboard() {
        const list = document.getElementById('leaderboard-list');
        list.innerHTML = "<p style='color:#333'>Loading...</p>";
        db.ref('users').orderByChild('score').limitToLast(5).once('value', (snap) => {
            list.innerHTML = "";
            let players = [];
            snap.forEach(s => players.push(s.val()));
            players.reverse().forEach((p, i) => {
                const medals = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣'];
                const rank = names[Math.min(Math.floor((p.tapLvl + p.passiveLvl) / 20), 4)];
                list.innerHTML += `
                    <div class="card">
                        <div class="leader-rank">${medals[i]}</div>
                        <div style="flex:1">
                            <div class="leader-name">@${p.username || 'unknown'}</div>
                            <div style="font-size:10px; color:#555">${rank} (Lvl ${p.tapLvl + (p.passiveLvl || 0)})</div>
                        </div>
                        <div style="font-weight:900">${format(p.score)}</div>
                    </div>`;
            });
        });
    }

    // Вспомогательные функции
    function format(n) {
        if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
        if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
        if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
        return Math.floor(n);
    }

    function save() {
        state.lastUpdate = Date.now();
        db.ref(`users/${userData.id}`).set(state);
    }

    function updateUI() {
        document.getElementById('score').innerText = format(state.score);
        document.getElementById('e-text').innerText = `${state.energy} / 150`;
        document.getElementById('e-fill').style.width = (state.energy / 1.5) + '%';
    }

    // Навигация
    window.show = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('n-' + id.split('-')[1]).classList.add('active');
        if (id === 's-top') loadLeaderboard();
    };

    // Тап
    document.getElementById('tapBtn').onclick = () => {
        if (state.energy > 0) {
            state.score += state.tapLvl; state.energy--;
            updateUI(); tg.HapticFeedback.impactOccurred('light');
        }
    };

    // Пассив и реген
    setInterval(() => {
        state.score += (state.passiveLvl / 1);
        if (state.energy < 150) state.energy++;
        updateUI();
        if (Math.random() > 0.9) save();
    }, 1000);

    // Админка
    if (userData.id === MY_ID) document.getElementById('admin-panel').classList.remove('hidden');

</script>
</body>
</html>
