<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JuugTAPS</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --b: #000;
--w: #fff; --g: #111; --sg: #222; --accent: rgba(255,255,255,0.8); --red: #ff4444; --green: #00ff88;
}
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent;
}
        body { background: var(--b); color: var(--w); font-family: 'Inter', sans-serif; height: 100vh;
overflow: hidden; display: flex; justify-content: center; }
        
        #loading-screen { position: fixed;
top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000;
transition: opacity 0.5s ease; }
        .loader-logo { width: 150px; height: 150px; margin-bottom: 30px;
object-fit: contain; }
        .loader-bar { width: 180px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 4px;
overflow: hidden; position: relative; }
        .loader-progress { width: 60%; height: 100%; background: #fff;
box-shadow: 0 0 15px #fff; position: absolute; animation: loadAnim 1.5s infinite ease-in-out;
}
        @keyframes loadAnim { 0% { left: -100%; } 100% { left: 100%;
} }

        /* Техперерыв */
        #maint-screen { position: fixed;
top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px;
}

        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%;
z-index: 0; pointer-events: none; }
        #app { width: 100%; max-width: 500px; display: flex;
flex-direction: column; position: relative; height: 100%; z-index: 1; overflow: hidden;
}

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%;
display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; padding-bottom: 140px; opacity: 0; pointer-events: none; transform: translateY(15px);
transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .screen.active { opacity: 1;
pointer-events: auto; transform: translateY(0); }
        .hidden { display: none !important;
}

        .header { width: 100%; display: flex; justify-content: space-between; font-weight: 700; font-size: 14px;
margin-bottom: 20px; color: #555; }
        #score { font-size: 72px; font-weight: 900; margin-top: 5px;
}
        
        .tap-area { flex: 1;
display: flex; align-items: center; justify-content: center; position: relative; min-height: 300px;
}
        .main-circle { width: 240px; height: 240px; border: 4px solid var(--w); border-radius: 50%;
transition: transform 0.05s ease-out; background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%); box-shadow: 0 0 20px rgba(255,255,255,0.05); position: relative; z-index: 2;
touch-action: manipulation; }
        .main-circle.is-active { transform: scale(0.92); background: rgba(255,255,255,0.15);
}

        .tap-effect { position: absolute; pointer-events: none; color: #fff; font-weight: 900; font-size: 26px;
animation: floatUp 0.6s ease-out forwards; z-index: 10; }
        @keyframes floatUp { 0% { transform: translateY(0);
opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }

        .energy-box { width: 100%;
text-align: center; margin-bottom: 20px; position: relative; }
        .bar-bg { height: 24px; background: rgba(255,255,255,0.03);
border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; margin: 15px 0; overflow: hidden; position: relative; backdrop-filter: blur(5px);
}
        #e-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #fff 0%, rgba(200,200,200,0.8) 100%);
transition: width 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 0 0 15px rgba(255,255,255,0.2); position: relative;
}
        #e-text { position: absolute; width: 100%; left: 0; top: 50%; transform: translateY(-50%);
font-size: 10px; font-weight: 900; letter-spacing: 1px; color: var(--w); text-shadow: 0 0 5px #000; z-index: 10; mix-blend-mode: difference;
}

        .card { width: 100%; background: var(--g); border: 1px solid var(--sg); padding: 18px;
border-radius: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s;
}
        .card:active { transform: scale(0.98); background: #151515;
}
        .card.special { border: 1px solid rgba(255,255,255,0.3); background: linear-gradient(145deg, #111, #050505);
}
        .case-icon { font-size: 24px; margin-right: 15px;
}
        .buy-btn { background: var(--w); color: var(--b); border: none; padding: 10px 18px;
border-radius: 8px; font-weight: 900; min-width: 80px; cursor: pointer; }
        .buy-btn:disabled { background: #333; color: #555;
cursor: not-allowed; }

        nav { position: absolute; bottom: 0; width: 100%; display: flex;
background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); border-top: 1px solid var(--sg); padding: 15px 0 35px; z-index: 100;
}
        .nav-item { flex: 1; text-align: center; color: #444; font-size: 10px; font-weight: 800;
cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--w); transform: translateY(-2px);
}
        .nav-item span { display: block; font-size: 24px; margin-bottom: 4px; filter: grayscale(1) brightness(2);
transition: 0.3s; }
        .nav-item.active span { filter: grayscale(0) brightness(1); color: #fff;
}
        
        .settings-btn { width: 100%;
padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--sg); background: var(--g); color: #fff; font-weight: 800; display: flex; justify-content: space-between;
align-items: center; }

        /* Admin Modal */
        #admin-modal { position: fixed;
top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px;
}
        .admin-content { background: #111; width: 100%; max-width: 400px; border-radius: 20px; padding: 20px;
border: 1px solid #333; max-height: 80vh; overflow-y: auto; }
        .admin-btn { width: 100%;
padding: 15px; margin-bottom: 10px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; color: #fff;
}
        .btn-start { background: var(--green); color: #000; box-shadow: 0 0 15px var(--green);
}
        .btn-danger { background: var(--red);
}
        .btn-neutral { background: #222;
}

        /* Победители */
        #winners-popup { position: fixed;
top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; color: #000; padding: 25px; border-radius: 20px; z-index: 15000; width: 85%;
display: none; text-align: center; box-shadow: 0 0 30px rgba(255,255,255,0.2); }
        .winner-row { display: flex;
justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 14px;
}
    </style>
</head>

                <div id="t-pass-desc" style="font-size:12px; color:#555;">+1 per sec</div>
            </div>
            <button class="buy-btn" onclick="buyUpgrade('pass')" id="btn-up-pass">0</button>
        </div>
    </div>

    <div id="screen-top" class="screen">
        <h2 id="t-top-title" style="margin-bottom:20px;">LEADERBOARD</h2>
        <div id="leaderboard-list" style="width:100%;"></div>
    </div>

    <div id="screen-gear" class="screen">
        <h2 id="t-gear-title" style="margin-bottom:20px;">SETTINGS</h2>
        <div class="settings-btn" onclick="toggleLang()">
            <span id="t-lang-label">LANGUAGE</span>
            <span id="cur-lang" style="color:var(--accent);">EN</span>
        </div>
        <div class="settings-btn" onclick="toggleSound()">
            <span id="t-sound-label">SOUND</span>
            <span id="cur-sound" style="color:var(--accent);">ON</span>
        </div>
        <div style="margin-top:20px; font-size:10px; color:#333; text-align:center;">USER ID: <span id="user-id-display">0</span></div>
    </div>

    <nav>
        <div class="nav-item" onclick="showScreen('top')"><span id="t-nav-top">🏆</span>TOP</div>
        <div class="nav-item active" onclick="showScreen('game')"><span id="t-nav-game">⚡</span>GAME</div>
        <div class="nav-item" onclick="showScreen('shop')"><span id="t-nav-shop">🛒</span>SHOP</div>
        <div class="nav-item" onclick="showScreen('gear')"><span id="t-nav-gear">⚙️</span>GEAR</div>
    </nav>
</div>

<div id="admin-modal">
    <div class="admin-content">
        <h2 style="margin-bottom:20px;">ADMIN PANEL</h2>
        <button class="admin-btn btn-start" onclick="adminAddScore()">ADD 1M SCORE</button>
        <button class="admin-btn btn-neutral" onclick="adminResetEnergy()">RESET ENERGY</button>
        <button class="admin-btn btn-danger" onclick="closeAdmin()">CLOSE</button>
    </div>
</div>

<script>
    // --- КОНФИГУРАЦИЯ МУЗЫКИ ---
    const bgTracks = [
        'track1.mp3', 'track2.mp3', 'track3.mp3', 'track4.mp3', 'track5.mp3',
        'track6.mp3', 'track7.mp3', 'track8.mp3', 'track9.mp3', 'track10.mp3'
    ];
    let currentTrackIndex = 0;
    const bgMusic = new Audio();
    bgMusic.volume = 0.1; // Громкость 10%
    bgMusic.loop = false;

    function playNextTrack() {
        currentTrackIndex = (currentTrackIndex + 1) % bgTracks.length;
        bgMusic.src = bgTracks[currentTrackIndex];
        if (state.sound) bgMusic.play().catch(e => console.log("Music blocked by browser"));
    }

    bgMusic.onended = playNextTrack;

    // Инициализация музыки при первом взаимодействии
    let musicStarted = false;
    document.addEventListener('click', () => {
        if (!musicStarted && state.sound) {
            bgMusic.src = bgTracks[currentTrackIndex];
            bgMusic.play().catch(e => console.log("Music blocked"));
            musicStarted = true;
        }
    }, { once: true });

    // --- ОСТАЛЬНОЙ КОД БЕЗ ИЗМЕНЕНИЙ ---
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.enableClosingConfirmation();

    const firebaseConfig = { databaseURL: "https://ВАШ-ПРОЕКТ.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let state = {
        score: 0, tap: 1, pass: 0, energy: 1000, maxE: 1000,
        lastTime: Date.now(), lang: 'en', sound: true, lastCase: 0,
        upgrades: { click: 0, pass: 0 }
    };

    const langData = {
        en: { scoreL:'SCORE', tapL:'TAP POWER', topT:'LEADERBOARD', shopT:'SHOP', clUp:'CLICK UPGRADE', clDe:'+1 per tap', psUp:'PASSIVE INCOME', psDe:'+1 per sec', back:'BACK', gearT:'SETTINGS', langL:'LANGUAGE', soundL:'SOUND', navTop:'TOP', navGame:'GAME', navShop:'SHOP', navGear:'GEAR', caseName:'DAILY CASE', caseOpen:'OPEN', caseWait:'WAIT' },
        ru: { scoreL:'СЧЕТ', tapL:'СИЛА КЛИКА', topT:'РЕЙТИНГ', shopT:'МАГАЗИН', clUp:'УЛУЧШИТЬ КЛИК', clDe:'+1 за тап', psUp:'ПАССИВНЫЙ ДОХОД', psDe:'+1 в сек', back:'НАЗАД', gearT:'НАСТРОЙКИ', langL:'ЯЗЫК', soundL:'ЗВУК', navTop:'ТОП', navGame:'ИГРА', navShop:'МАГАЗИН', navGear:'ОПЦИИ', caseName:'ЕЖЕДНЕВНЫЙ КЕЙС', caseOpen:'ОТКРЫТЬ', caseWait:'ЖДАТЬ' }
    };

    function save() {
        localStorage.setItem('jt_state', JSON.stringify(state));
        if(window.userId) db.ref('users/' + window.userId).set({
            n: tg.initDataUnsafe?.user?.first_name || 'User',
            s: Math.floor(state.score)
        });
    }

    function load() {
        const s = localStorage.getItem('jt_state');
        if(s) state = {...state, ...JSON.parse(s)};
        window.userId = tg.initDataUnsafe?.user?.id || 'local_user';
        document.getElementById('user-id-display').innerText = window.userId;
    }

    // ИСПРАВЛЕННАЯ ФУНКЦИЯ ЗВУКА
    function toggleSound() { 
        state.sound = !state.sound; 
        updateLangUI(); 
        updateUI(); 
        save(); 

        if (state.sound) {
            bgMusic.play().catch(e => console.log("Playback failed"));
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        } else {
            bgMusic.pause();
        }
    };

    function updateLangUI() {
        const l = langData[state.lang];
        const map = { 't-score-label':'scoreL', 't-tap-label':'tapL', 't-top-title':'topT', 't-shop-title':'shopT', 't-click-up':'clUp', 't-click-desc':'clDe', 't-pass-up':'psUp', 't-pass-desc':'psDe', 't-back':'back', 't-gear-title':'gearT', 't-lang-label':'langL', 't-sound-label':'soundL', 't-nav-top':'navTop', 't-nav-game':'navGame', 't-nav-shop':'navShop', 't-nav-gear':'navGear', 't-case-name':'caseName', 'case-btn':'caseOpen' };
        for(let id in map) { const el = document.getElementById(id); if(el) el.innerText = l[map[id]]; }
        document.getElementById('cur-lang').innerText = state.lang === 'en' ? "EN" : "RU";
        document.getElementById('cur-sound').innerText = state.sound ? "ON" : "OFF";
        updateCaseUI();
    }

    function toggleLang() { state.lang = state.lang === 'en' ? 'ru' : 'en'; updateLangUI(); updateUI(); save(); }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        // logic for nav-item highlight...
    }

    function updateUI() {
        document.getElementById('score').innerText = Math.floor(state.score).toLocaleString();
        document.getElementById('tap-power').innerText = state.tap;
        const perc = (state.energy / state.maxE) * 100;
        document.getElementById('e-fill').style.width = perc + '%';
        document.getElementById('e-text').innerText = `${Math.floor(state.energy)} / ${state.maxE}`;
        
        const cP = Math.floor(10 * Math.pow(1.5, state.upgrades.click));
        const pP = Math.floor(15 * Math.pow(1.5, state.upgrades.pass));
        document.getElementById('btn-up-click').innerText = cP;
        document.getElementById('btn-up-pass').innerText = pP;
        document.getElementById('btn-up-click').disabled = state.score < cP;
        document.getElementById('btn-up-pass').disabled = state.score < pP;
    }

    function buyUpgrade(type) {
        const cost = type === 'click' ? Math.floor(10 * Math.pow(1.5, state.upgrades.click)) : Math.floor(15 * Math.pow(1.5, state.upgrades.pass));
        if(state.score >= cost) {
            state.score -= cost;
            state.upgrades[type]++;
            if(type === 'click') state.tap += 1; else state.pass += 1;
            updateUI(); save();
        }
    }

    function openCase() {
        const now = Date.now();
        if(now - state.lastCase >= 86400000) {
            const win = Math.floor(Math.random() * 9901) + 100;
            state.score += win;
            state.lastCase = now;
            alert("WIN: " + win);
            updateUI(); updateCaseUI(); save();
        }
    }

    function updateCaseUI() {
        const now = Date.now();
        const diff = now - state.lastCase;
        const btn = document.getElementById('case-btn');
        if(diff < 86400000) {
            btn.disabled = true;
            document.getElementById('case-timer').innerText = "LOCKED";
        } else {
            btn.disabled = false;
            document.getElementById('case-timer').innerText = "READY";
        }
    }

    // Loop
    setInterval(() => {
        state.score += state.pass / 10;
        if(state.energy < state.maxE) state.energy = Math.min(state.maxE, state.energy + 0.5);
        updateUI();
    }, 100);

    window.onload = () => {
        load();
        updateLangUI();
        setTimeout(() => document.getElementById('loading-screen').style.opacity = '0', 1000);
        setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 1500);
    };

    document.getElementById('main-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(state.energy >= 1) {
            state.score += state.tap;
            state.energy -= 1;
            // particles logic here...
            updateUI();
        }
    });

</script>
</body>
</html>
