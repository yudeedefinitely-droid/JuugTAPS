<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JuugTAPS</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --b: #000; --w: #fff; --g: #111; --sg: #222; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--b); color: var(--w); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        
        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; position: relative; height: 100%; z-index: 1; overflow: hidden; }

        .screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; padding: 20px; 
            overflow-y: auto; padding-bottom: 140px;
            opacity: 0; pointer-events: none; transform: translateY(15px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .screen.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .hidden { display: none !important; }

        /* ИСПРАВЛЕННЫЕ СТИЛИ ДЛЯ ВЕРХА */
        .header-top {
            width: 100%;
            text-align: center; /* Центрирование ника */
            margin-bottom: 10px;
            margin-top: -10px; /* Чтобы ник был выше */
        }
        #p-name {
            font-weight: 700;
            font-size: 14px;
            color: #555;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: center; /* Центрирование всего блока LIVE/SCORE/Сундук */
            align-items: center;
            font-weight: 700;
            font-size: 14px;
            color: #555;
            margin-bottom: 20px;
        }

        /* КОНТЕЙНЕР ДЛЯ LIVE И СУНДУКА СЛЕВА */
        .sync-container {
            display: flex;
            align-items: center;
            gap: 5px; /* Отступ между текстом и иконкой */
            position: absolute; /* Чтобы не сдвигать SCORE */
            left: 20px; /* Фиксированная позиция слева */
        }

        #sync-text {
            color: #555;
        }

        .case-icon-new {
            width: 24px; /* Уменьшенный размер */
            height: 24px;
            background-image: url('image_1.png'); /* Использование черного изображения */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
            transition: transform 0.2s;
            filter: invert(1); /* ПРЕВРАЩЕНИЕ ЧЕРНОГО В БЕЛЫЙ */
        }

        .case-icon-new:active {
            transform: scale(0.9);
        }

        #score { font-size: 72px; font-weight: 900; margin-top: 5px; }
        
        /* МОДАЛЬНОЕ ОКНО */
        #modal-overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); 
            z-index: 1000; display: flex; align-items: center; justify-content: center; 
            opacity:0; pointer-events:none; transition: 0.3s; backdrop-filter: blur(5px);
        }
        #modal-overlay.open { opacity:1; pointer-events:auto; }
        .modal { 
            background: var(--g); border: 1px solid var(--sg); width: 85%; max-width: 320px; 
            padding: 30px; border-radius: 24px; text-align: center; transform: scale(0.8); transition: 0.3s;
        }
        #modal-overlay.open .modal { transform: scale(1); }
        .modal h3 { font-weight: 900; margin-bottom: 10px; }
        .modal p { color: #888; font-size: 13px; margin-bottom: 20px; line-height: 1.4; }
        .modal-btn { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 900; 
            background: var(--w); color: var(--b); cursor: pointer; 
        }
        .modal-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

        .tap-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; min-height: 300px; }
        .main-circle { 
            width: 240px; height: 240px; border: 4px solid var(--w); border-radius: 50%; 
            transition: transform 0.05s ease-out; background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            box-shadow: 0 0 20px rgba(255,255,255,0.05); position: relative; z-index: 2; touch-action: manipulation;
        }
        .main-circle.is-active { transform: scale(0.92); background: rgba(255,255,255,0.15); }

        .tap-effect { position: absolute; pointer-events: none; color: #fff; font-weight: 900; font-size: 26px; animation: floatUp 0.6s ease-out forwards; z-index: 10; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }

        .energy-box { width: 100%; text-align: center; margin-bottom: 20px; }
        .bar-bg { height: 10px; background: #1a1a1a; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #e-fill { height: 100%; width: 100%; background: #fff; transition: width 0.2s; }

        .card { width: 100%; background: var(--g); border: 1px solid var(--sg); padding: 18px; border-radius: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .card:active { transform: scale(0.98); background: #151515; }
        .buy-btn { background: var(--w); color: var(--b); border: none; padding: 10px 18px; border-radius: 8px; font-weight: 900; min-width: 80px; }
        .buy-btn:disabled { background: #333; color: #555; }

        /* НАВИГАЦИЯ */
        nav { position: absolute; bottom: 0; width: 100%; display: flex; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); border-top: 1px solid var(--sg); padding: 15px 0 35px; z-index: 100; }
        .nav-item { flex: 1; text-align: center; color: #444; font-size: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--w); transform: translateY(-2px); }
        .nav-item span { display: block; font-size: 24px; margin-bottom: 4px; filter: grayscale(1) brightness(2); transition: 0.3s; }
        .nav-item.active span { filter: grayscale(0) brightness(1); color: #fff; }
        
        .settings-btn { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--sg); background: var(--g); color: #fff; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
        #admin-container { width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<div id="modal-overlay" onclick="closeCase()">
    <div class="modal" onclick="event.stopPropagation()">
        <div style="width: 80px; height: 80px; background-image: url('image_1.png'); background-size: contain; background-repeat: no-repeat; background-position: center; margin: 0 auto; filter: invert(1);"></div>
        <h3 id="t-case-title">Daily Case</h3>
        <p id="t-case-desc">Get random points every 24 hours\n(100 - 10,000)</p>
        <button id="case-btn" class="modal-btn" onclick="openCase()">OPEN</button>
        <p id="case-timer" style="margin-top:15px; font-family:monospace; color:var(--w);"></p>
    </div>
</div>

<div id="app">
    <div class="header-top">
        <span id="p-name">@loading</span>
    </div>

    <section id="s-game" class="screen active">
        <div class="header">
            <div class="sync-container">
                <span id="sync-text">SYNCING...</span>
                <div class="case-icon-new" onclick="showCase()"></div> </div>
            
            <p id="t-score-label" style="font-size:12px; font-weight:800; letter-spacing:2px; margin: 0 auto;">SCORE</p>
        </div>
        
        <div id="score">0</div>
        <div id="passive-display" style="color:#888; font-size:12px; font-weight:800;">Passive: 0/sec</div>
        <div class="tap-area"><div class="main-circle" id="tapBtn"></div></div>
        <div class="energy-box">
            <p id="t-tap-label" style="font-size:12px; font-weight:800;">TAP TO EARN</p>
            <div class="bar-bg"><div id="e-fill"></div></div>
            <b id="e-text">150 / 150</b>
        </div>
    </section>

    <section id="s-top" class="screen">
        <h2 id="t-top-title" style="align-self:flex-start; margin-bottom:20px; font-weight:900;">TOP 5 JUUG'ERS</h2>
        <div id="leaderboard-list" style="width:100%;"></div>
    </section>

    <section id="s-shop" class="screen">
        <h2 id="t-shop-title" style="align-self:flex-start; margin-bottom:20px; font-weight:900;">SHOP</h2>
        <div id="shop-main" style="width:100%;">
            <div class="card" onclick="openUpgrade('click')">
                <div style="flex:1"><b id="t-click-up">CLICK UPGRADES</b><br><span id="t-click-desc" style="font-size:11px; color:#666">Increase tap income</span></div>
                <span style="color:#fff">➔</span>
            </div>
            <div class="card" onclick="openUpgrade('passive')">
                <div style="flex:1"><b id="t-pass-up">PASSIVE INCOME</b><br><span id="t-pass-desc" style="font-size:11px; color:#666">Automatic income</span></div>
                <span style="color:#fff">➔</span>
            </div>
        </div>
        <div id="shop-detail" class="hidden" style="width:100%;">
            <button id="t-back" onclick="backToShop()" style="background:none; border:none; color:#fff; font-weight:800; margin-bottom:15px; cursor:pointer; display:flex; align-items:center; gap:5px;">← BACK</button>
            <div id="upgrade-items"></div>
        </div>
    </section>

    <section id="s-gear" class="screen">
        <h2 id="t-gear-title" style="align-self:flex-start; margin-bottom:20px; font-weight:900;">GEAR</h2>
        <button class="settings-btn" onclick="toggleLang()">
            <span id="t-lang-label">Language</span><span id="cur-lang" style="color:#888">English</span>
        </button>
        <button class="settings-btn" onclick="toggleSound()">
            <span id="t-sound-label">Sound</span><span id="cur-sound" style="color:#888">ON</span>
        </button>
        <div id="admin-container"></div>
    </section>

    <nav>
        <div class="nav-item" id="n-top" onclick="show('s-top')"><span>🏆</span><p id="t-nav-top">TOP</p></div>
        <div class="nav-item active" id="n-game" onclick="show('s-game')"><span>💎</span><p id="t-nav-game">GAME</p></div>
        <div class="nav-item" id="n-shop" onclick="show('s-shop')"><span>🛒</span><p id="t-nav-shop">SHOP</p></div>
        <div class="nav-item" id="n-gear" onclick="show('s-gear')"><span>⚙️</span><p id="t-nav-gear">GEAR</p></div>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDcUMfQAd9QnoPUVxfM9SWp_lHBc2CaRKY",
        authDomain: "juugtaaap.firebaseapp.com",
        databaseURL: "https://juugtaaap-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "juugtaaap",
        storageBucket: "juugtaaap.firebasestorage.app",
        messagingSenderId: "230755213175",
        appId: "1:230755213175:web:60d2bd14da628347284b72"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    tg.expand();

    const MY_ID = 5291965471;
    const user = tg.initDataUnsafe?.user || { id: 0, username: "Guest" };
    
    let isLoaded = false;
    let state = { score: 0, energy: 150, tapLvl: 1, passiveLvl: 0, lastUpdate: Date.now(), lastCaseTime: 0, username: "Guest", lang: 'en', sound: true };

    const langData = {
        en: { sync: "LIVE", scoreL: "SCORE", tapL: "TAP TO EARN", passL: "Passive", topT: "TOP 5 JUUG'ERS", shopT: "SHOP", clUp: "CLICK UPGRADES", clDe: "Increase tap income", psUp: "PASSIVE INCOME", psDe: "Automatic income", back: "BACK", gearT: "GEAR", langL: "Language", soundL: "Sound", navTop: "TOP", navGame: "GAME", navShop: "SHOP", navGear: "GEAR", ranks: ["Noob Juug'er", "Default Juug'er", "Pro Juug'er", "Hacker Juug'er", "God Juug'er"], caseT: "Daily Case", caseD: "Get random points every 24 hours\n(100 - 10,000)", caseO: "OPEN", caseWait: "Next in: " },
        ru: { sync: "В СЕТИ", scoreL: "СЧЕТ", tapL: "ТАПАЙ ЧТОБЫ ЗАРАБОТАТЬ", passL: "Пассив", topT: "ТОП 5 ДЖУГЕРОВ", shopT: "МАГАЗИН", clUp: "ПРОКАЧКА КЛИКА", clDe: "Увеличить доход за тап", psUp: "ПАССИВНЫЙ ДОХОД", psDe: "Автоматический доход", back: "НАЗАД", gearT: "МЕНЮ", langL: "Язык", soundL: "Звук", navTop: "ТОП", navGame: "ИГРА", navShop: "МАГАЗИН", navGear: "МЕНЮ", ranks: ["Нуб Джугер", "Обычный Джугер", "Про Джугер", "Хакер Джугер", "Бог Джугер"], caseT: "Ежедневный Кейс", caseD: "Получай случайные очки каждые 24 часа\n(100 - 10,000)", caseO: "ОТКРЫТЬ", caseWait: "Через: " }
    };

    // --- ФОН (БЕЗ ИЗМЕНЕНИЙ) ---
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let bgParticles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    class BgP { constructor() { this.reset(); } reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 1.5 + 0.5; this.speedX = (Math.random() - 0.5) * 0.3; this.speedY = (Math.random() - 0.5) * 0.3; this.opacity = Math.random() * 0.4 + 0.1; } update() { this.x += this.speedX; this.y += this.speedY; if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset(); } draw() { ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); } }
    for (let i = 0; i < 40; i++) bgParticles.push(new BgP());
    function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); bgParticles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
    animate();

    // --- ТАПЫ (БЕЗ ИЗМЕНЕНИЙ) ---
    const tapBtn = document.getElementById('tapBtn');
    tapBtn.addEventListener('pointerdown', (e) => {
        if (!isLoaded || state.energy <= 0) return;
        tapBtn.classList.add('is-active');
        state.score += state.tapLvl; state.energy--; updateUI(); 
        if(state.sound) tg.HapticFeedback.impactOccurred('light');
        const num = document.createElement('div');
        num.className = 'tap-effect'; num.innerText = `+${state.tapLvl}`;
        num.style.left = e.clientX + 'px'; num.style.top = e.clientY + 'px';
        document.body.appendChild(num); setTimeout(() => num.remove(), 600);
    });
    window.addEventListener('pointerup', () => tapBtn.classList.remove('is-active'));

    // --- КЕЙС ЛОГИКА (БЕЗ ИЗМЕНЕНИЙ) ---
    function showCase() { document.getElementById('modal-overlay').classList.add('open'); updateCaseTimer(); }
    function closeCase() { document.getElementById('modal-overlay').classList.remove('open'); }
    function updateCaseTimer() {
        const btn = document.getElementById('case-btn');
        const timerText = document.getElementById('case-timer');
        const now = Date.now();
        const wait = 24 * 60 * 60 * 1000;
        const diff = (state.lastCaseTime + wait) - now;
        if (diff <= 0) { btn.disabled = false; timerText.innerText = ""; } else { btn.disabled = true; const h = Math.floor(diff / 3600000); const m = Math.floor((diff % 3600000) / 60000); const s = Math.floor((diff % 60000) / 1000); timerText.innerText = langData[state.lang].caseWait + `${h}h ${m}m ${s}s`; setTimeout(updateCaseTimer, 1000); }
    }
    function openCase() { const reward = Math.floor(Math.random() * (10000 - 100 + 1)) + 100; state.score += reward; state.lastCaseTime = Date.now(); updateUI(); save(); alert((state.lang === 'ru' ? "Вы получили: " : "You got: ") + reward); updateCaseTimer(); if(state.sound) tg.HapticFeedback.notificationOccurred('success'); }

    // --- ЗАГРУЗКА И ДАННЫЕ (БЕЗ ИЗМЕНЕНИЙ) ---
    const fallbackId = 999999;
    const currentId = (user && user.id) ? user.id : fallbackId;
    db.ref(`users/${currentId}`).once('value', (snap) => {
        const data = snap.val();
        if (data) { const now = Date.now(); const offTime = Math.floor((now - (data.lastUpdate || now)) / 1000); state = { ...state, ...data, score: (data.score || 0) + (offTime * (data.passiveLvl || 0)), energy: Math.min(150, (data.energy || 150) + offTime) }; }
        state.username = user.username || data?.username || (currentId !== fallbackId ? `User_${currentId}` : "PC_Guest");
        isLoaded = true;
        document.getElementById('p-name').innerText = "@" + state.username;
        if (Number(currentId) === MY_ID) { const adminBox = document.getElementById('admin-container'); adminBox.innerHTML = `<div style="width:100%; border:1px solid #ff4444; padding:15px; border-radius:12px;"><p style="color:#ff4444; font-size:10px; margin-bottom:10px; font-weight:900;">ADMIN PANEL</p><button style="width:100%; padding:15px; font-weight:900; background:#fff; border:none; border-radius:8px; color:#000;">EVENT CONTROL</button></div>`; }
        updateLangUI(); updateUI();
    }).catch(() => { isLoaded = true; document.getElementById('p-name').innerText = "@Local_Mode"; });
    function save() { if (isLoaded && currentId !==fallbackId) { state.lastUpdate = Date.now(); db.ref(`users/${currentId}`).update(state); } }
    function updateUI() { document.getElementById('score').innerText = format(state.score); document.getElementById('passive-display').innerText = `${langData[state.lang].passL}: ${state.passiveLvl}/sec`; document.getElementById('e-text').innerText = `${state.energy} / 150`; document.getElementById('e-fill').style.width = (state.energy / 1.5) + '%'; }
    function format(n) { return n >= 1e6 ? (n/1e6).toFixed(1) + 'M' : n >= 1e3 ? (n/1e3).toFixed(1) + 'K' : Math.floor(n); }
    function getRank(lvl) { return langData[state.lang].ranks[Math.min(Math.floor((lvl || 1) / 10), 4)]; }

    // --- ЛИДЕРБОРД (БЕЗ ИЗМЕНЕНИЙ) ---
    function loadLeaderboard() {
        const list = document.getElementById('leaderboard-list');
        list.innerHTML = "<p style='text-align:center; color:#555;'>Syncing...</p>";
        db.ref('users').once('value', (snap) => {
            const data = snap.val(); if (!data) return;
            const now = Date.now();
            let players = Object.values(data).filter(p => p && p.username && p.username !== "undefined" && p.username !== "Guest")
            .map(p => { const offTime = Math.floor((now - (p.lastUpdate || now)) / 1000); return { ...p, currentScore: (p.score || 0) + (offTime * (p.passiveLvl || 0)) }; }).sort((a, b) => b.currentScore - a.currentScore).slice(0, 5);
            list.innerHTML = "";
            players.forEach((p, i) => { const medals = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣']; list.innerHTML += `<div class="card" style="${p.username === state.username ? 'border-color: #777;' : ''}"><div style="font-size:20px; min-width:40px;">${medals[i]}</div><div style="flex:1"><div style="font-weight:900;">@${p.username}</div><div style="font-size:10px; color:#555">${getRank(p.tapLvl)}</div></div><div style="font-weight:900;">${format(p.currentScore)}</div></div>`; });
        });
    }

    // --- МАГАЗИН И НАСТРОЙКИ (БЕЗ ИЗМЕНЕНИЙ) ---
    window.show = (id) => { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); document.getElementById(id).classList.add('active'); document.getElementById('n-' + id.split('-')[1]).classList.add('active'); if (id === 's-top') loadLeaderboard(); };
    window.openUpgrade = (type) => { document.getElementById('shop-main').classList.add('hidden'); document.getElementById('shop-detail').classList.remove('hidden'); renderUpgradeItems(type); };
    window.backToShop = () => { document.getElementById('shop-main').classList.remove('hidden'); document.getElementById('shop-detail').classList.add('hidden'); };
    function renderUpgradeItems(type) { const cont = document.getElementById('upgrade-items'); const lvl = type === 'click' ? state.tapLvl : state.passiveLvl; const price = Math.floor(100 * Math.pow(1.4, lvl + (type==='click'?0:1))); cont.innerHTML = `<div class="card" style="cursor:default;"><div style="flex:1"><b style="font-size:18px;">${getRank(lvl)}</b><br><span style="color:#888; font-size:12px;">Level ${lvl} → ${lvl+1}</span></div><button class="buy-btn" ${state.score < price ? 'disabled' : ''} onclick="buy('${type}', ${price})">${format(price)}</button></div>`; }
    window.buy = (type, p) => { if (state.score >= p) { state.score -= p; if (type === 'click') state.tapLvl++; else state.passiveLvl++; updateUI(); renderUpgradeItems(type); save(); if(state.sound) tg.HapticFeedback.notificationOccurred('success'); } };
    function updateLangUI() { const l = langData[state.lang]; const map = { 'sync-text':'sync', 't-score-label':'scoreL', 't-tap-label':'tapL', 't-top-title':'topT', 't-shop-title':'shopT', 't-click-up':'clUp', 't-click-desc':'clDe', 't-pass-up':'psUp', 't-pass-desc':'psDe', 't-back':'back', 't-gear-title':'gearT', 't-lang-label':'langL', 't-sound-label':'soundL', 't-nav-top':'navTop', 't-nav-game':'navGame', 't-nav-shop':'navShop', 't-nav-gear':'navGear', 't-case-title':'caseT', 't-case-desc':'caseD', 'case-btn':'caseO' }; for(let id in map) { const el = document.getElementById(id); if(el) el.innerText = l[map[id]]; } document.getElementById('cur-lang').innerText = state.lang === 'en' ? "English" : "Русский"; document.getElementById('cur-sound').innerText = state.sound ? "ON" : "OFF"; }
    function toggleLang() { state.lang = state.lang === 'en' ? 'ru' : 'en'; updateLangUI(); updateUI(); save(); }
    function toggleSound() { state.sound = !state.sound; document.getElementById('cur-sound').innerText = state.sound ? "ON" : "OFF"; save(); }
    setInterval(() => { if (!isLoaded) return; state.score += state.passiveLvl; if (state.energy < 150) state.energy++; updateUI(); }, 1000);
    setInterval(() => { if(isLoaded) save(); }, 10000);
</script>
</body>
</html>
