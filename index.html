<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JuugTAPS</title>
    <style>
        /* CSS СТИЛИ ПРЯМО ТУТ */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        #app {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* Шапка */
        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* Счет */
        .score-section {
            margin-top: 50px;
            text-align: center;
        }
        .score-label {
            font-size: 12px;
            letter-spacing: 4px;
            color: #888;
            margin-bottom: 5px;
        }
        #score {
            font-size: 72px;
            font-weight: 800;
        }

        /* Центр - Круг */
        .tap-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .main-circle {
            width: 280px;
            height: 280px;
            border: 4px solid #fff;
            border-radius: 50%; /* Вот это делает круг кругом */
            background: transparent;
            transition: transform 0.05s ease;
            cursor: pointer;
        }
        .main-circle:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Прогресс бар */
        .status-section {
            width: 100%;
            text-align: center;
            margin-bottom: 120px;
        }
        .tap-hint {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .progress-container {
            width: 100%;
            height: 12px;
            background: #1a1a1a;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        #energy-fill {
            height: 100%;
            width: 100%;
            background: #fff;
            border-radius: 20px;
            transition: width 0.2s;
        }
        #energy-text {
            font-size: 18px;
            font-weight: 700;
        }

        /* Навигация */
        .nav-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            background: #000;
            border-top: 1px solid #222;
            padding: 15px 0 30px 0;
        }
        .nav-item {
            flex: 1;
            text-align: center;
            color: #555;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
        }
        .nav-item.active {
            color: #fff;
        }
        .nav-item span {
            font-size: 20px;
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
