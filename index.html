<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JuugTAPS</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <section id="game-screen" class="screen active">
            <div class="header">
                <div class="score-label">SCORE</div>
                <div id="balance">0</div>
            </div>

            <div class="tap-area">
                <div id="character" class="click-circle">
                    <img src="image_2.png" alt="Juug" id="char-img">
                </div>
            </div>

            <div class="footer">
                <div class="hint">TAP TO EARN</div>
                <div class="energy-box">
                    <div class="energy-bar"><div id="energy-fill"></div></div>
                    <div class="energy-info"><span id="energy-current">150</span> / 150</div>
                </div>
            </div>
        </section>

        <section id="leaderboard-screen" class="screen">
            <h2 class="title">TOP JUUGERS</h2>
            <div id="leader-list" class="list-container">
                </div>
        </section>

        <section id="daily-screen" class="screen">
            <h2 class="title">DAILY REWARD</h2>
            <div class="reward-card">
                <div class="gift-icon">🎁</div>
                <div class="gift-val">+100 PTS</div>
                <button class="btn-main" onclick="claimDailyReward()">COLLECT</button>
            </div>
        </section>

        <section id="settings-screen" class="screen">
            <h2 class="title">GEAR</h2>
            <div id="admin-panel" class="admin-box" style="display:none;">
                <p style="color:red">ADMIN ACCESS</p>
                <button class="btn-main" onclick="startGlobalTimer()">START 3-MONTH TIMER</button>
            </div>
        </section>

        <nav class="navbar">
            <button class="nav-item" onclick="showScreen('leaderboard-screen')">🏆<br>TOP</button>
            <button class="nav-item active" onclick="showScreen('game-screen')">💎<br>PLAY</button>
            <button class="nav-item" onclick="showScreen('daily-screen')">🎁<br>DAILY</button>
            <button class="nav-item" onclick="showScreen('settings-screen')">⚙️<br>GEAR</button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, query, orderByChild, limitToLast, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDcUMfQAd9QnoPUVxfM9SWp_lHBc2CaRKY",
            authDomain: "juugtaaap.firebaseapp.com",
            databaseURL: "https://juugtaaap-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "juugtaaap",
            storageBucket: "juugtaaap.firebasestorage.app",
            messagingSenderId: "230755213175",
            appId: "1:230755213175:web:60d2bd14da628347284b72"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.dbRef = db;
        window.saveToCloud = (user, score) => {
            set(ref(db, 'players/' + user), { username: user, score: score });
        };

        window.loadLeaders = () => {
            const q = query(ref(db, 'players'), orderByChild('score'), limitToLast(10));
            onValue(q, (snap) => {
                const list = [];
                snap.forEach(c => list.push(c.val()));
                list.reverse();
                const container = document.getElementById('leader-list');
                const medals = ["🥇", "🥈", "🥉", "🏅", "🏅"];
                container.innerHTML = list.map((p, i) => `
                    <div class="row">
                        <span>${medals[i] || (i+1)+'.'} ${p.username}</span>
                        <b>${p.score.toLocaleString()}</b>
                    </div>
                `).join('');
            });
        };
    </script>
    <script src="script.js"></script>
</body>
</html>
