<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JuugTAPS Admin Logic</title>
    <style>
        :root { --b: #000; --w: #fff; --g: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background: var(--b); color: var(--w); font-family: sans-serif; height: 100vh; display: flex; justify-content: center; }
        
        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; padding: 20px; }
        .screen { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .hidden { display: none !important; }

        /* Шапка с таймером */
        .header { width: 100%; display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 50px; }
        #event-timer { color: #ff4444; }
        #event-timer.active { color: #44ff44; }

        /* Секция настроек (GEAR) */
        .settings-list { width: 100%; margin-top: 20px; }
        .menu-item { 
            width: 100%; padding: 20px; background: var(--g); 
            border: 1px solid #333; color: #fff; margin-bottom: 10px; 
            text-align: left; font-weight: bold; cursor: pointer;
        }

        /* Админ-панель */
        .admin-panel { 
            width: 100%; border: 2px dashed #ff4444; padding: 15px; 
            margin-top: 20px; border-radius: 10px; 
        }
        .admin-title { color: #ff4444; font-size: 12px; margin-bottom: 10px; font-weight: bold; }
        .admin-btn { 
            width: 100%; padding: 15px; background: #ff4444; 
            color: #000; border: none; font-weight: 900; cursor: pointer; 
        }

        /* Навигация */
        nav { position: fixed; bottom: 0; width: 100%; display: flex; border-top: 1px solid #222; padding: 20px 0; background: #000; }
        .nav-item { flex: 1; text-align: center; color: #555; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: #fff; }
    </style>
</head>
<body>

<div id="app">
    <section id="game-screen" class="screen">
        <div class="header">
            <span>@malenkiydanik</span>
            <span id="event-timer">ИВЕНТ ОСТАНОВЛЕН</span>
        </div>
        <h1 style="font-size: 80px; margin-top: 100px;">0</h1>
        <p style="color: #444; margin-top: 20px;">(Экран игры)</p>
    </section>

    <section id="gear-screen" class="screen hidden">
        <h2 style="align-self: flex-start; margin-bottom: 20px;">GEAR</h2>
        
        <div class="settings-list">
            <div class="menu-item">MUSIC: ON</div>
            <div class="menu-item">LANGUAGE: RU</div>
            
            <div id="admin-section" class="hidden">
                <div class="admin-panel">
                    <div class="admin-title">ADMIN PANEL</div>
                    <button class="admin-btn" id="toggleEventBtn">ЗАПУСТИТЬ ИВЕНТ (3 МЕС.)</button>
                </div>
            </div>
        </div>
    </section>

    <nav>
        <div class="nav-item" onclick="show('game-screen')">GAME</div>
        <div class="nav-item" onclick="show('gear-screen')">GEAR</div>
    </nav>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // КОНФИГ
    const MY_ID = 5291965471; // <--- ТВОЙ ID ИЗ ПРОШЛОГО СКРИНШОТА
    let eventEndTime = null; 
    let eventActive = false;

    // 1. Проверка на админа
    const userId = tg.initDataUnsafe?.user?.id;
    if (userId === MY_ID) {
        document.getElementById('admin-section').classList.remove('hidden');
    }

    // 2. Логика таймера
    const timerEl = document.getElementById('event-timer');
    const adminBtn = document.getElementById('toggleEventBtn');

    adminBtn.onclick = () => {
        if (!eventActive) {
            // Устанавливаем дату завершения: сейчас + 3 месяца
            eventEndTime = Date.now() + (90 * 24 * 60 * 60 * 1000);
            eventActive = true;
            adminBtn.innerText = "ОСТАНОВИТЬ ИВЕНТ";
            timerEl.classList.add('active');
        } else {
            eventActive = false;
            eventEndTime = null;
            adminBtn.innerText = "ЗАПУСТИТЬ ИВЕНТ (3 МЕС.)";
            timerEl.classList.remove('active');
            timerEl.innerText = "ИВЕНТ ОСТАНОВЛЕН";
        }
    };

    // Обновление таймера каждую секунду
    setInterval(() => {
        if (!eventActive || !eventEndTime) return;

        const now = Date.now();
        const diff = eventEndTime - now;

        if (diff <= 0) {
            eventActive = false;
            timerEl.innerText = "ИВЕНТ ОКОНЧЕН";
            return;
        }

        // Считаем дни, часы, минуты
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const secs = Math.floor((diff % (1000 * 60)) / 1000);

        timerEl.innerText = `EVENT: ${days}d ${hours}h ${mins}m ${secs}s`;
    }, 1000);

    // Переключение экранов
    window.show = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    };
</script>

</body>
</html>
