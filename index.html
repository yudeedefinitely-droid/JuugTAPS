<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JuugTAPS</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --b: #000; --w: #fff; --g: #111; --sg: #222; --accent: rgba(255,255,255,0.8); --red: #ff4444; --green: #00ff88; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--b); color: var(--w); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.5s ease; }
        .loader-logo { width: 150px; height: 150px; margin-bottom: 30px; object-fit: contain; }
        .loader-bar { width: 180px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; position: relative; }
        .loader-progress { width: 60%; height: 100%; background: #fff; box-shadow: 0 0 15px #fff; position: absolute; animation: loadAnim 1.5s infinite ease-in-out; }
        @keyframes loadAnim { 0% { left: -100%; } 100% { left: 100%; } }

        #maint-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        
        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; position: relative; height: 100%; z-index: 1; overflow: hidden; }

        /* Всплывающее окно ТОПа (новое) */
        #winners-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0a0a0a; color: #fff; padding: 20px; border-radius: 24px; z-index: 15000; width: 85%; max-height: 60vh; display: none; flex-direction: column; text-align: center; border: 1px solid #333; box-shadow: 0 0 50px rgba(0,0,0,1); }
        .winners-list { overflow-y: auto; margin: 15px 0; }
        .winner-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 5px; border-bottom: 1px solid #111; }
        .winner-info { display: flex; flex-direction: column; text-align: left; }
        .rank-name { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px; padding-bottom: 140px; opacity: 0; pointer-events: none; transform: translateY(15px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .screen.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .hidden { display: none !important; }

        .header { width: 100%; display: flex; justify-content: space-between; font-weight: 700; font-size: 14px; margin-bottom: 20px; color: #555; }
        #score { font-size: 72px; font-weight: 900; margin-top: 5px; }
        
        /* Кнопка "Закончить" (исправленная) */
        #end-btn { width: 80%; background: var(--w); color: var(--b); border: none; padding: 18px; border-radius: 16px; font-weight: 900; margin-top: 20px; cursor: pointer; text-transform: uppercase; }
        #end-btn:disabled { background: #222; color: #444; cursor: not-allowed; }

        .tap-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; min-height: 300px; }
        .main-circle { width: 240px; height: 240px; border: 4px solid var(--w); border-radius: 50%; transition: transform 0.05s ease-out; background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 70%); box-shadow: 0 0 20px rgba(255,255,255,0.05); }
        .main-circle.is-active { transform: scale(0.92); background: rgba(255,255,255,0.15); }

        .energy-box { width: 100%; text-align: center; margin-bottom: 20px; }
        .bar-bg { height: 24px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; margin: 15px 0; overflow: hidden; position: relative; }
        #e-fill { height: 100%; width: 100%; background: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.2); transition: width 0.3s ease; }

        .card { width: 100%; background: var(--g); border: 1px solid var(--sg); padding: 18px; border-radius: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .buy-btn { background: var(--w); color: var(--b); border: none; padding: 10px 18px; border-radius: 8px; font-weight: 900; }
        .buy-btn:disabled { background: #333; color: #555; }

        nav { position: absolute; bottom: 0; width: 100%; display: flex; background: rgba(0,0,0,0.9); border-top: 1px solid var(--sg); padding: 15px 0 35px; }
        .nav-item { flex: 1; text-align: center; color: #444; font-size: 10px; font-weight: 800; }
        .nav-item.active { color: var(--w); }
        .nav-item span { display: block; font-size: 24px; margin-bottom: 4px; filter: grayscale(1) brightness(2); }

        #admin-modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:20000; display:none; align-items:center; justify-content:center; padding:20px; }
        .admin-content { background:#111; width:100%; max-width:400px; border-radius:20px; padding:20px; border:1px solid #333; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="loader-logo" style="background:#fff; border-radius:50%;"></div>
    <div class="loader-bar"><div class="loader-progress"></div></div>
</div>

<div id="winners-popup">
    <h2 style="letter-spacing: 2px; font-size: 18px;">TOP JUUG'ERS</h2>
    <div class="winners-list" id="leaderboard-content"></div>
    <button onclick="toggleTop(false)" style="background:none; border:none; color:#444; font-weight:700; cursor:pointer;">ЗАКРЫТЬ</button>
</div>

<div id="app">
    <section id="s-game" class="screen active">
        <div class="header"><span id="p-name">@loading</span><span id="sync-text" style="color:#555">LIVE</span></div>
        <div id="score">0</div>
        <div id="passive-display" style="color:#666; font-size:11px; font-weight:800; margin-bottom:10px;">Passive: 0/sec</div>
        
        <div class="tap-area"><div class="main-circle" id="tapBtn"></div></div>
        
        <button id="end-btn" onclick="startEndTimer()">Закончить</button>

        <div class="energy-box">
            <div class="bar-bg"><div id="e-fill"></div></div>
            <span id="e-text" style="font-size:12px; font-weight:800;">150 / 150</span>
        </div>
    </section>

    <section id="s-shop" class="screen">
        <h2 style="align-self:flex-start; margin-bottom:20px;">SHOP</h2>
        <div id="shop-main" style="width:100%;">
            <div class="card" onclick="openUpgrade('click')">
                <div><b>CLICK UPGRADES</b><br><small style="color:#555">Increase tap power</small></div>
                <span>➔</span>
            </div>
            <div class="card" onclick="openUpgrade('passive')">
                <div><b>PASSIVE INCOME</b><br><small style="color:#555">Auto-earn points</small></div>
                <span>➔</span>
            </div>
        </div>
        <div id="shop-detail" class="hidden" style="width:100%;">
            <button onclick="backToShop()" style="background:none; border:none; color:#fff; font-weight:800; margin-bottom:15px;">← BACK</button>
            <div id="upgrade-items"></div>
        </div>
    </section>

    <section id="s-gear" class="screen">
        <h2 style="align-self:flex-start; margin-bottom:20px;">GEAR</h2>
        <div class="card" onclick="toggleLang()"><span>Language</span><b id="cur-lang">EN</b></div>
        <div class="card" onclick="toggleSound()"><span>Sound</span><b id="cur-sound">ON</b></div>
        <div id="admin-container"></div>
    </section>

    <nav>
        <div class="nav-item" onclick="toggleTop(true)"><span>🏆</span>TOP</div>
        <div class="nav-item active" onclick="show('s-game')"><span>💎</span>GAME</div>
        <div class="nav-item" onclick="show('s-shop')"><span>🛒</span>SHOP</div>
        <div class="nav-item" onclick="show('s-gear')"><span>⚙️</span>GEAR</div>
    </nav>
</div>

<canvas id="particleCanvas"></canvas>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDcUMfQAd9QnoPUVxfM9SWp_lHBc2CaRKY", authDomain: "juugtaaap.firebaseapp.com", databaseURL: "https://juugtaaap-default-rtdb.europe-west1.firebasedatabase.app", projectId: "juugtaaap" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    const MY_ID = 5291965471;
    const user = tg.initDataUnsafe?.user || { id: 0, username: "Guest" };
    
    let isLoaded = false;
    let state = { score: 0, energy: 150, tapLvl: 1, passiveLvl: 0, lastUpdate: Date.now(), username: "Guest", lang: 'en', sound: true };
    const RANKS = ["Noob", "Juug'er", "Hustler", "Mover", "Tycoon"];

    // Исправленный таймер на 10 секунд
    function startEndTimer() {
        const btn = document.getElementById('end-btn');
        let timeLeft = 10;
        btn.disabled = true;

        const countdown = setInterval(() => {
            btn.innerText = `Ждите... ${timeLeft}с`;
            timeLeft--;

            if (timeLeft < 0) {
                clearInterval(countdown);
                btn.innerText = "Готово";
                btn.style.background = "#00ff88";
                btn.disabled = false;
                // Здесь можно добавить логику завершения/сохранения
            }
        }, 1000);
    }

    // Всплывающее окно ТОПа
    function toggleTop(show) {
        const popup = document.getElementById('winners-popup');
        popup.style.display = show ? 'flex' : 'none';
        if(show) loadLeaderboard();
    }

    function loadLeaderboard() {
        const container = document.getElementById('leaderboard-content');
        db.ref('users').limitToLast(10).once('value', snap => {
            const players = [];
            snap.forEach(s => players.push(s.val()));
            players.sort((a,b) => b.score - a.score);
            
            container.innerHTML = '';
            players.forEach((p, i) => {
                const rankName = RANKS[Math.min(i, RANKS.length-1)];
                container.innerHTML += `
                    <div class="winner-row">
                        <div class="winner-info">
                            <span style="font-weight:700">${i+1}. @${p.username || 'Anon'}</span>
                            <span class="rank-name">${rankName}</span>
                        </div>
                        <span style="font-weight:900">${format(p.score)}</span>
                    </div>`;
            });
        });
    }

    // Логика игры (Тапы)
    const tapBtn = document.getElementById('tapBtn');
    tapBtn.addEventListener('pointerdown', (e) => {
        if (!isLoaded || state.energy <= 0) return;
        state.score += state.tapLvl; state.energy--;
        updateUI();
        if(state.sound) tg.HapticFeedback.impactOccurred('light');
    });

    function updateUI() {
        document.getElementById('score').innerText = format(state.score);
        document.getElementById('e-text').innerText = `${state.energy} / 150`;
        document.getElementById('e-fill').style.width = (state.energy / 1.5) + '%';
        document.getElementById('passive-display').innerText = `Passive: ${state.passiveLvl}/sec`;
    }

    function format(n) { return n >= 1e6 ? (n/1e6).toFixed(1) + 'M' : n >= 1e3 ? (n/1e3).toFixed(1) + 'K' : Math.floor(n); }

    // Загрузка данных
    db.ref(`users/${user.id}`).once('value', snap => {
        if(snap.val()) state = { ...state, ...snap.val() };
        state.username = user.username || "Guest";
        isLoaded = true;
        document.getElementById('loading-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('loading-screen').style.display='none', 500);
        document.getElementById('p-name').innerText = "@" + state.username;
        updateUI();
    });

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function openUpgrade(type) {
        document.getElementById('shop-main').classList.add('hidden');
        document.getElementById('shop-detail').classList.remove('hidden');
        renderUpgrades(type);
    }

    function backToShop() {
        document.getElementById('shop-main').classList.remove('hidden');
        document.getElementById('shop-detail').classList.add('hidden');
    }

    function renderUpgrades(type) {
        const cont = document.getElementById('upgrade-items');
        const lvl = type === 'click' ? state.tapLvl : state.passiveLvl;
        const price = Math.floor(100 * Math.pow(1.5, lvl));
        cont.innerHTML = `
            <div class="card">
                <div><b>Level ${lvl} → ${lvl+1}</b><br><small>Cost: ${price}</small></div>
                <button class="buy-btn" onclick="buy('${type}', ${price})" ${state.score < price ? 'disabled' : ''}>BUY</button>
            </div>`;
    }

    function buy(type, price) {
        if(state.score >= price) {
            state.score -= price;
            if(type === 'click') state.tapLvl++; else state.passiveLvl++;
            updateUI(); renderUpgrades(type);
        }
    }

    // Система частиц (Canvas)
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let particles = [];
    class P {
        constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.s = Math.random()*2; this.vx = Math.random()-0.5; this.vy = Math.random()-0.5; }
        update() { this.x += this.vx; this.y += this.vy; if(this.x<0 || this.x>canvas.width) this.vx*=-1; if(this.y<0 || this.y>canvas.height) this.vy*=-1; }
        draw() { ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, Math.PI*2); ctx.fill(); }
    }
    for(let i=0; i<50; i++) particles.push(new P());
    function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(anim); }
    anim();

    setInterval(() => { if(isLoaded) { state.score += state.passiveLvl; if(state.energy < 150) state.energy++; updateUI(); } }, 1000);
</script>
</body>
</html>
