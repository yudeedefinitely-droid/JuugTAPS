<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JuugTAPS</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --b: #000; --w: #fff; --g: #111; --sg: #222; --accent: #fff; --red: #ff4444; --green: #00ff88; --gold: #ffd700; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--b); color: var(--w); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        
        /* Сохранено: Загрузка и Частицы */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.5s ease; }
        .loader-logo { width: 150px; height: 150px; margin-bottom: 30px; object-fit: contain; }
        .loader-bar { width: 180px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; position: relative; margin-top: 20px; }
        .loader-progress { width: 60%; height: 100%; background: #fff; position: absolute; animation: loadAnim 1.5s infinite ease-in-out; }
        @keyframes loadAnim { 0% { left: -100%; } 100% { left: 100%; } }

        /* НОВОЕ: Красивая таблица победителей */
        #winners-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 15000; display: none; align-items: center; justify-content: center; padding: 25px; }
        .winners-content { background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 100%); border: 1px solid rgba(255,255,255,0.2); border-radius: 35px; padding: 40px 20px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 0 40px rgba(255,215,0,0.15); position: relative; }
        .winners-content h1 { font-size: 32px; font-weight: 900; background: linear-gradient(to bottom, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .winners-subtitle { font-size: 10px; letter-spacing: 5px; color: var(--gold); font-weight: 800; margin-bottom: 30px; text-transform: uppercase; }
        .winner-entry { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.05); }
        .w-info { text-align: left; }
        .w-name { font-weight: 900; font-size: 16px; display: block; }
        .w-stats { font-size: 10px; color: #777; font-weight: 700; }
        .w-score { font-weight: 900; color: #fff; font-size: 18px; }

        /* Сохранено: Игровая логика и визуал */
        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; position: relative; height: 100%; z-index: 1; overflow: hidden; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; padding-bottom: 140px; opacity: 0; pointer-events: none; transform: translateY(15px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .screen.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .hidden { display: none !important; }

        .header { width: 100%; display: flex; justify-content: space-between; font-weight: 700; font-size: 11px; margin-bottom: 20px; color: #555; }
        #score { font-size: 64px; font-weight: 900; margin-top: 5px; }
        .main-circle { width: 240px; height: 240px; border: 4px solid var(--w); border-radius: 50%; transition: transform 0.05s ease-out; background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%); box-shadow: 0 0 20px rgba(255,255,255,0.05); position: relative; z-index: 2; touch-action: manipulation; }
        .main-circle.is-active { transform: scale(0.92); background: rgba(255,255,255,0.15); }
        .bar-bg { height: 20px; width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; margin: 10px 0; overflow: hidden; position: relative; }
        #e-fill { height: 100%; width: 100%; background: #fff; transition: width 0.3s; }
        .card { width: 100%; background: var(--g); border: 1px solid var(--sg); padding: 18px; border-radius: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .buy-btn { background: var(--w); color: var(--b); border: none; padding: 10px 18px; border-radius: 8px; font-weight: 900; }

        nav { position: absolute; bottom: 0; width: 100%; display: flex; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); border-top: 1px solid var(--sg); padding: 15px 0 35px; z-index: 100; }
        .nav-item { flex: 1; text-align: center; color: #444; font-size: 10px; font-weight: 800; }
        .nav-item.active { color: var(--w); }
        .nav-item span { display: block; font-size: 22px; margin-bottom: 4px; }

        /* Admin */
        #admin-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .admin-content { background: #111; width: 100%; max-width: 400px; border-radius: 20px; padding: 20px; border: 1px solid #333; max-height: 80vh; overflow-y: auto; }
        .admin-btn { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; color: #fff; }
        .btn-start { background: var(--green); color: #000; }
        .btn-danger { background: var(--red); }
        .btn-neutral { background: #222; }
    </style>
</head>

        <div id="passive-display" style="color:#666; font-size:11px; font-weight:800; margin-top: 5px;">Passive: 0/sec</div>
        <div style="flex: 1; display: flex; align-items: center;"><div class="main-circle" id="tapBtn"></div></div>
        <div style="width: 100%; text-align: center; margin-bottom: 20px;">
            <div class="bar-bg"><div id="e-fill"></div></div>
            <span id="e-text" style="font-size: 10px; font-weight: 900;">150 / 150</span>
        </div>
    </section>

    <section id="s-top" class="screen">
        <h2 style="align-self:flex-start; margin-bottom:10px; font-weight:900;">TOP 5 JUUG'ERS</h2>
        <button id="show-winners-btn" class="card hidden" style="border:1px solid var(--gold); background:rgba(255,215,0,0.05)" onclick="showWinnersPopup()">
            <b style="color:var(--gold)">🏆 ПОСЛЕДНИЕ ИТОГИ</b> <span>➔</span>
        </button>
        <div id="leaderboard-list" style="width:100%;"></div>
    </section>

    <section id="s-shop" class="screen">
        <h2 style="align-self:flex-start; margin-bottom:20px; font-weight:900;">SHOP</h2>
        <div id="shop-main" style="width:100%;">
            <div class="card" onclick="openUpgrade('click')"><div><b>CLICK UP</b><br><span id="tap-lvl-ui" style="font-size:11px; color:#555">Level 1</span></div><span>➔</span></div>
            <div class="card" onclick="openUpgrade('passive')"><div><b>PASSIVE</b><br><span id="pass-lvl-ui" style="font-size:11px; color:#555">Level 0</span></div><span>➔</span></div>
        </div>
        <div id="shop-detail" class="hidden" style="width:100%;">
            <button onclick="backToShop()" style="background:none; border:none; color:#fff; font-weight:800; margin-bottom:15px;">← BACK</button>
            <div id="upgrade-items"></div>
        </div>
    </section>

    <section id="s-gear" class="screen">
        <h2 style="align-self:flex-start; margin-bottom:20px; font-weight:900;">GEAR</h2>
        <button class="card" onclick="toggleSound()">
            <span>Sound Effects</span><b id="sound-status">ON</b>
        </button>
        <div id="admin-panel" class="hidden">
            <button class="admin-btn btn-neutral" style="border: 1px solid #fff; margin-top: 10px;" onclick="openAdmin()">ОТКРЫТЬ АДМИН</button>
        </div>
    </section>

    <nav>
        <div class="nav-item" id="n-top" onclick="show('s-top')"><span>🏆</span>TOP</div>
        <div class="nav-item active" id="n-game" onclick="show('s-game')"><span>💎</span>GAME</div>
        <div class="nav-item" id="n-shop" onclick="show('s-shop')"><span>🛒</span>SHOP</div>
        <div class="nav-item" id="n-gear" onclick="show('s-gear')"><span>⚙️</span>GEAR</div>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDcUMfQAd9QnoPUVxfM9SWp_lHBc2CaRKY",
        authDomain: "juugtaaap.firebaseapp.com",
        databaseURL: "https://juugtaaap-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "juugtaaap",
        storageBucket: "juugtaaap.firebasestorage.app",
        messagingSenderId: "230755213175",
        appId: "1:230755213175:web:60d2bd14da628347284b72"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    tg.expand();

    const MY_ID = 5291965471;
    const user = tg.initDataUnsafe?.user || { id: 0, username: "Guest" };
    const currentId = user.id || 999999;
    
    let isLoaded = false;
    let state = { score: 0, energy: 150, tapLvl: 1, passiveLvl: 0, lastUpdate: Date.now(), username: "Guest", sound: true };
    let globalData = { eventEnd: 0, isMaint: false, winners: null };

    // Исправленный звук
    function toggleSound() {
        state.sound = !state.sound;
        document.getElementById('sound-status').innerText = state.sound ? 'ON' : 'OFF';
        save();
    }

    // Winners
    function announceWinners() {
        db.ref('users').once('value', snap => {
            const users = Object.values(snap.val()).sort((a,b) => b.score - a.score).slice(0,3);
            const winData = users.map(u => ({ name: u.username, score: u.score, lvl: (u.tapLvl + u.passiveLvl) }));
            db.ref('global/winners').set(winData);
            alert("Победители зафиксированы!");
        });
    }

    function clearWinners() {
        db.ref('global/winners').remove();
        alert("Список очищен.");
    }

    function showWinnersPopup() {
        if (!globalData.winners) return;
        const list = document.getElementById('winners-list');
        list.innerHTML = "";
        globalData.winners.forEach((w, i) => {
            list.innerHTML += `<div class="winner-entry"><div class="w-info"><span class="w-name">@${w.name}</span><span class="w-stats">Rank #${i+1} • Lvl ${w.lvl}</span></div><div class="w-score">${format(w.score)}</div></div>`;
        });
        document.getElementById('winners-popup').style.display = 'flex';
    }

    // Admin
    function openAdmin() { document.getElementById('admin-modal').style.display = 'flex'; }
    function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }
    function toggleMaint() { db.ref('global').update({ isMaint: !globalData.isMaint }); }
    function toggleEvent() { db.ref('global').update({ eventEnd: globalData.eventEnd > Date.now() ? 0 : Date.now() + 86400000 }); }
    function resetAllPlayers() { if(confirm("RESET ALL?")) db.ref('users').once('value', s => { for(let id in s.val()) db.ref(`users/${id}`).update({score:0, tapLvl:1, passiveLvl:0}); }); }

    // Core Load
    db.ref('global').on('value', snap => {
        globalData = snap.val() || { eventEnd: 0, isMaint: false };
        document.getElementById('maint-status').innerText = globalData.isMaint ? 'ON' : 'OFF';
        const winBtn = document.getElementById('show-winners-btn');
        if (globalData.winners) {
            winBtn.classList.remove('hidden');
            if (!sessionStorage.getItem('wShown')) { showWinnersPopup(); sessionStorage.setItem('wShown', 'true'); }
        } else { winBtn.classList.add('hidden'); }
    });

    db.ref(`users/${currentId}`).once('value', snap => {
        const data = snap.val();
        if (data) {
            const now = Date.now();
            const off = Math.floor((now - (data.lastUpdate || now)) / 1000);
            state = { ...state, ...data, score: (data.score || 0) + (off * (data.passiveLvl || 0)), energy: Math.min(150, (data.energy || 150) + off) };
        }
        state.username = user.username || data?.username || "Guest";
        document.getElementById('p-name').innerText = "@" + state.username;
        document.getElementById('sound-status').innerText = state.sound ? 'ON' : 'OFF';
        if (Number(currentId) === MY_ID) document.getElementById('admin-panel').classList.remove('hidden');
        isLoaded = true;
        document.getElementById('loading-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('loading-screen').style.display='none', 500);
        updateUI();
    });

    // Tap
    document.getElementById('tapBtn').addEventListener('pointerdown', (e) => {
        if (!isLoaded || state.energy <= 0) return;
        state.score += state.tapLvl; state.energy--;
        if(state.sound) tg.HapticFeedback.impactOccurred('light');
        updateUI();
    });

    function updateUI() {
        document.getElementById('score').innerText = format(state.score);
        document.getElementById('passive-display').innerText = `Passive: ${state.passiveLvl}/sec`;
        document.getElementById('e-text').innerText = `${state.energy} / 150`;
        document.getElementById('e-fill').style.width = (state.energy / 1.5) + '%';
        document.getElementById('tap-lvl-ui').innerText = 'Level ' + state.tapLvl;
        document.getElementById('pass-lvl-ui').innerText = 'Level ' + state.passiveLvl;
    }

    function save() { if(isLoaded) { state.lastUpdate = Date.now(); db.ref(`users/${currentId}`).update(state); } }
    setInterval(() => { if(isLoaded) { state.score += state.passiveLvl; if(state.energy < 150) state.energy++; updateUI(); } }, 1000);
    setInterval(save, 5000);

    function format(n) { return n >= 1e6 ? (n/1e6).toFixed(1) + 'M' : n >= 1e3 ? (n/1e3).toFixed(1) + 'K' : Math.floor(n); }
    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('n-' + id.split('-')[1]).classList.add('active');
        if(id === 's-top') loadLeaderboard();
    }

    function loadLeaderboard() {
        db.ref('users').once('value', snap => {
            const players = Object.values(snap.val()).sort((a,b) => b.score - a.score).slice(0,5);
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = "";
            players.forEach((p, i) => { list.innerHTML += `<div class="card"><b>${i+1}. @${p.username}</b> <span>${format(p.score)}</span></div>`; });
        });
    }

    function openUpgrade(type) {
        document.getElementById('shop-main').classList.add('hidden');
        document.getElementById('shop-detail').classList.remove('hidden');
        const lvl = type === 'click' ? state.tapLvl : state.passiveLvl;
        const price = Math.floor(100 * Math.pow(1.6, lvl));
        document.getElementById('upgrade-items').innerHTML = `<div class="card"><b>LEVEL ${lvl}</b> <button class="buy-btn" onclick="buy('${type}', ${price})">${format(price)}</button></div>`;
    }
    function buy(t, p) { if(state.score >= p) { state.score -= p; if(t==='click') state.tapLvl++; else state.passiveLvl++; save(); updateUI(); backToShop(); } }
    function backToShop() { document.getElementById('shop-main').classList.remove('hidden'); document.getElementById('shop-detail').classList.add('hidden'); }

    // Particles
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let pts = [];
    function initParticles() {
        for(let i=0; i<30; i++) pts.push({x: Math.random()*innerWidth, y: Math.random()*innerHeight, s: Math.random()*2});
        function draw() {
            ctx.clearRect(0,0,innerWidth,innerHeight);
            ctx.fillStyle = "rgba(255,255,255,0.1)";
            pts.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill(); p.y -= 0.3; if(p.y<0) p.y=innerHeight; });
            requestAnimationFrame(draw);
        }
        draw();
    }
    window.onresize = () => { canvas.width = innerWidth; canvas.height = innerHeight; };
    canvas.width = innerWidth; canvas.height = innerHeight;
    initParticles();
</script>
</body>
</html>
