<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JuugTAPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <header>
        <div id="userInfo">@username</div>
        <div class="settings">
            <button id="musicToggle">🔊</button>
            <button id="adminBtn" class="hidden">Admin</button>
        </div>
    </header>

    <main>
        <div class="balance-container">
            <h1><span id="score">0</span></h1>
            <p>Пассивный доход: <span id="passiveIncome">0</span>/сек</p>
        </div>
        
        <div class="tap-area">
            <button id="tapBtn" class="tap-button">TAP</button>
        </div>
    </main>

    <nav>
        <button id="shopBtn">Магазин</button>
        <button id="leaderboardBtn">Топ 5</button>
        <button id="dailyBtn">Награда</button>
    </nav>

    <div id="leaderboardModal" class="modal hidden">
        <h2>Топ 5 игроков</h2>
        <ul id="leaderboardList"></ul>
        <button class="close-modal">Закрыть</button>
    </div>

    <div id="adminModal" class="modal hidden">
        <h2>Админ Панель</h2>
        <button id="startEventBtn">Запустить ивент (3 мес)</button>
        <div id="eventTimer">Таймер: Ожидание...</div>
        <button class="close-modal">Закрыть</button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
