<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JuugTAPS</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --b: #000; --w: #fff; --g: #111; --sg: #222; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--b); color: var(--w); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; position: relative; height: 100%; }
        .screen { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; padding-bottom: 120px; }
        .hidden { display: none !important; }

        .header { width: 100%; display: flex; justify-content: space-between; font-weight: 700; font-size: 14px; margin-bottom: 20px; color: #555; }
        #score { font-size: 72px; font-weight: 900; margin-top: 5px; }
        .tap-area { flex: 1; display: flex; align-items: center; justify-content: center; }
        .main-circle { width: 280px; height: 280px; border: 4px solid var(--w); border-radius: 50%; transition: transform 0.1s; }
        .main-circle:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }

        .energy-box { width: 100%; text-align: center; margin-bottom: 20px; }
        .bar-bg { height: 10px; background: #1a1a1a; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #e-fill { height: 100%; width: 100%; background: #fff; transition: width 0.2s; }

        .card { width: 100%; background: var(--g); border: 1px solid var(--sg); padding: 18px; border-radius: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .buy-btn { background: var(--w); color: var(--b); border: none; padding: 10px 18px; border-radius: 8px; font-weight: 900; min-width: 80px; }
        .buy-btn:disabled { background: #333; color: #555; }

        nav { position: absolute; bottom: 0; width: 100%; display: flex; background: var(--b); border-top: 1px solid var(--sg); padding: 15px 0 35px; }
        .nav-item { flex: 1; text-align: center; color: #444; font-size: 11px; font-weight: 800; cursor: pointer; }
        .nav-item.active { color: var(--w); }
        .nav-item span { display: block; font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="app">
    <section id="s-game" class="screen">
        <div class="header"><span id="p-name">@loading</span><span id="event-timer">SYNCING...</span></div>
        <p style="font-size:12px; font-weight:800; letter-spacing:2px;">SCORE</p>
        <div id="score">0</div>
        <div id="passive-display" style="color:#888; font-size:12px; font-weight:800;">Passive: 0/sec</div>
        <div class="tap-area"><div class="main-circle" id="tapBtn"></div></div>
        <div class="energy-box">
            <p style="font-size:12px; font-weight:800;">TAP TO EARN</p>
            <div class="bar-bg"><div id="e-fill"></div></div>
            <b id="e-text">150 / 150</b>
        </div>
    </section>

    <section id="s-top" class="screen hidden">
        <h2 style="align-self:flex-start; margin-bottom:20px; font-weight:900;">TOP 5 JUUG'ERS</h2>
        <div id="leaderboard-list" style="width:100%;"></div>
    </section>

    <section id="s-shop" class="screen hidden">
        <h2 style="align-self:flex-start; margin-bottom:20px; font-weight:900;">SHOP</h2>
        <div id="shop-main" style="width:100%;">
            <div class="card" onclick="openUpgrade('click')">
                <div style="flex:1"><b>CLICK UPGRADES</b><br><span style="font-size:11px; color:#666">Увеличить доход за тап</span></div>
                <span>➔</span>
            </div>
            <div class="card" onclick="openUpgrade('passive')">
                <div style="flex:1"><b>PASSIVE INCOME</b><br><span style="font-size:11px; color:#666">Автоматический доход</span></div>
                <span>➔</span>
            </div>
        </div>
        <div id="shop-detail" class="hidden" style="width:100%;">
            <button onclick="backToShop()" style="background:none; border:none; color:#555; font-weight:800; margin-bottom:15px; cursor:pointer;">← НАЗАД</button>
            <div id="upgrade-items"></div>
        </div>
    </section>

    <section id="s-gear" class="screen hidden">
        <h2 style="align-self:flex-start; margin-bottom:20px; font-weight:900;">GEAR</h2>
        <div id="admin-panel" class="hidden" style="width:100%; border:1px solid #ff4444; padding:15px; border-radius:12px;">
            <button style="width:100%; padding:15px; font-weight:900; background:#fff; border:none; border-radius:8px;">EVENT CONTROL</button>
        </div>
    </section>

    <nav>
        <div class="nav-item" id="n-top" onclick="show('s-top')"><span>🏆</span>TOP</div>
        <div class="nav-item active" id="n-game" onclick="show('s-game')"><span>💎</span>GAME</div>
        <div class="nav-item" id="n-shop" onclick="show('s-shop')"><span>🎁</span>SHOP</div>
        <div class="nav-item" id="n-gear" onclick="show('s-gear')"><span>⚙️</span>GEAR</div>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDcUMfQAd9QnoPUVxfM9SWp_lHBc2CaRKY",
        authDomain: "juugtaaap.firebaseapp.com",
        databaseURL: "https://juugtaaap-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "juugtaaap",
        storageBucket: "juugtaaap.firebasestorage.app",
        messagingSenderId: "230755213175",
        appId: "1:230755213175:web:60d2bd14da628347284b72"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    tg.expand();

    const MY_ID = 5291965471;
    const user = tg.initDataUnsafe?.user || { id: 5291965471, username: "admin_danik" };
    const myName = user.username || `User_${user.id}`;
    
    // ПЕРЕМЕННАЯ ЗАЩИТЫ
    let isLoaded = false;
    let state = { score: 0, energy: 150, tapLvl: 1, passiveLvl: 0, lastUpdate: Date.now(), username: myName };
    const rankNames = ["Noob Juug'er", "Default Juug'er", "Pro Juug'er", "Hacker Juug'er", "God Juug'er"];

    function getRankByLevel(level) {
        return rankNames[Math.min(Math.floor(level / 10), 4)];
    }

    function format(n) {
        if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
        if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
        if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
        return Math.floor(n);
    }

    // Загрузка с защитой
    db.ref(`users/${user.id}`).once('value', (snap) => {
        const data = snap.val();
        if (data) {
            state = { ...state, ...data };
            const offline = Math.floor((Date.now() - (state.lastUpdate || Date.now())) / 1000);
            state.score += Math.max(0, offline * (state.passiveLvl || 0));
        }
        state.username = myName;
        isLoaded = true; // РАЗРЕШАЕМ СОХРАНЕНИЯ
        document.getElementById('p-name').innerText = "@" + state.username;
        document.getElementById('event-timer').innerText = "LIVE";
        save();
        updateUI();
    });

    function save() {
        if (!isLoaded) return; // БЛОКИРОВКА, если данные еще не пришли
        state.lastUpdate = Date.now();
        db.ref(`users/${user.id}`).set(state);
    }

    function loadLeaderboard() {
        const list = document.getElementById('leaderboard-list');
        db.ref('users').on('value', (snap) => {
            const data = snap.val();
            if (!data) return;
            const now = Date.now();
            let players = Object.values(data)
                .filter(p => p.username && typeof p.score === 'number')
                .map(p => {
                    const offlineSec = Math.max(0, (now - (p.lastUpdate || now)) / 1000);
                    return { ...p, liveScore: p.score + (offlineSec * (p.passiveLvl || 0)) };
                })
                .sort((a, b) => b.liveScore - a.liveScore).slice(0, 5);

            list.innerHTML = "";
            players.forEach((p, i) => {
                const medals = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣'];
                const rank = getRankByLevel(p.tapLvl);
                list.innerHTML += `
                    <div class="card" style="${p.username === myName ? 'border: 1px solid #333' : ''}">
                        <div style="font-size:20px; min-width:40px;">${medals[i]}</div>
                        <div style="flex:1">
                            <div style="font-weight:900;">@${p.username}</div>
                            <div style="font-size:10px; color:#555">${rank} (Lvl ${p.tapLvl + p.passiveLvl})</div>
                        </div>
                        <div style="font-weight:900;">${format(p.liveScore)}</div>
                    </div>`;
            });
        });
    }

    window.openUpgrade = (type) => {
        document.getElementById('shop-main').classList.add('hidden');
        document.getElementById('shop-detail').classList.remove('hidden');
        renderUpgradeItems(type);
    };

    window.backToShop = () => {
        document.getElementById('shop-main').classList.remove('hidden');
        document.getElementById('shop-detail').classList.add('hidden');
    };

    function renderUpgradeItems(type) {
        const cont = document.getElementById('upgrade-items');
        const lvl = type === 'click' ? state.tapLvl : state.passiveLvl;
        const price = Math.floor(100 * Math.pow(1.4, lvl));
        const rank = getRankByLevel(lvl);

        cont.innerHTML = `
            <div class="card">
                <div style="flex:1"><b>${rank}</b><br><span style="font-size:11px; color:#666">Level ${lvl} → ${lvl+1}</span></div>
                <button class="buy-btn" ${state.score < price ? 'disabled' : ''} onclick="buy('${type}', ${price})">${format(price)}</button>
            </div>`;
    }

    window.buy = (type, p) => {
        if (!isLoaded) return;
        if (state.score >= p) {
            state.score -= p;
            if (type === 'click') state.tapLvl++; else state.passiveLvl++;
            save(); updateUI(); renderUpgradeItems(type);
            tg.HapticFeedback.notificationOccurred('success');
        }
    };

    function updateUI() {
        document.getElementById('score').innerText = format(state.score);
        document.getElementById('passive-display').innerText = `Passive: ${state.passiveLvl}/sec`;
        document.getElementById('e-text').innerText = `${state.energy} / 150`;
        document.getElementById('e-fill').style.width = (state.energy / 1.5) + '%';
    }

    window.show = (id) => {
        if (id !== 's-top') db.ref('users').off();
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('n-' + id.split('-')[1]).classList.add('active');
        if (id === 's-top') loadLeaderboard();
        if (id === 's-shop') backToShop();
    };

    document.getElementById('tapBtn').onclick = () => {
        if (isLoaded && state.energy > 0) {
            state.score += state.tapLvl; state.energy--;
            updateUI(); tg.HapticFeedback.impactOccurred('light');
        }
    };

    setInterval(() => {
        if (!isLoaded) return;
        state.score += (state.passiveLvl || 0);
        if (state.energy < 150) state.energy++;
        updateUI();
        if (Math.random() > 0.9) save();
    }, 1000);

    if (user.id === MY_ID) document.getElementById('admin-panel').classList.remove('hidden');
</script>
</body>
</html>
