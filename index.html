<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JuugTAPS</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --b: #000; --w: #fff; --g: #111; --sg: #222; --accent: rgba(255,255,255,0.8); --red: #ff4444; --green: #00ff88; --gold: linear-gradient(45deg, #ffd700, #ff8c00); }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--b); color: var(--w); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.5s ease; }
        .loader-bar { width: 180px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; position: relative; }
        .loader-progress { width: 60%; height: 100%; background: #fff; box-shadow: 0 0 15px #fff; position: absolute; animation: loadAnim 1.5s infinite ease-in-out; }
        @keyframes loadAnim { 0% { left: -100%; } 100% { left: 100%; } }

        #maint-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; position: relative; height: 100%; z-index: 1; overflow: hidden; }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; padding-bottom: 140px; opacity: 0; pointer-events: none; transform: translateY(15px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .screen.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .hidden { display: none !important; }

        /* НОВЫЙ СТИЛЬ ОКНА ПОБЕДИТЕЛЕЙ */
        #winners-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.4s ease; }
        .winners-content { background: linear-gradient(135deg, rgba(30,30,30,0.9), rgba(10,10,10,0.9)); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; width: 100%; max-width: 360px; padding: 30px; text-align: center; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        .winners-title { font-size: 28px; font-weight: 900; margin-bottom: 5px; background: #fff; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-image: linear-gradient(to bottom, #fff, #888); }
        .winner-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .winner-item.first { border: 1px solid #ffd700; background: rgba(255,215,0,0.05); box-shadow: 0 0 15px rgba(255,215,0,0.1); }
        .winner-info { text-align: left; }
        .winner-name { font-weight: 800; font-size: 14px; display: block; }
        .winner-stats { font-size: 10px; color: #777; }
        .winner-score { font-weight: 900; color: var(--green); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header { width: 100%; display: flex; justify-content: space-between; font-weight: 700; font-size: 14px; margin-bottom: 20px; color: #555; }
        #score { font-size: 72px; font-weight: 900; margin-top: 5px; }
        .tap-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; min-height: 300px; }
        .main-circle { width: 240px; height: 240px; border: 4px solid var(--w); border-radius: 50%; transition: transform 0.05s ease-out; background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%); box-shadow: 0 0 20px rgba(255,255,255,0.05); position: relative; z-index: 2; touch-action: manipulation; }
        .main-circle.is-active { transform: scale(0.92); background: rgba(255,255,255,0.15); }
        .tap-effect { position: absolute; pointer-events: none; color: #fff; font-weight: 900; font-size: 26px; animation: floatUp 0.6s ease-out forwards; z-index: 10; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }

        .energy-box { width: 100%; text-align: center; margin-bottom: 20px; position: relative; }
        .bar-bg { height: 24px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; margin: 15px 0; overflow: hidden; position: relative; backdrop-filter: blur(5px); }
        #e-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #fff 0%, rgba(200,200,200,0.8) 100%); transition: width 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 0 0 15px rgba(255,255,255,0.2); position: relative; }
        #e-text { position: absolute; width: 100%; left: 0; top: 50%; transform: translateY(-50%); font-size: 10px; font-weight: 900; letter-spacing: 1px; color: var(--w); text-shadow: 0 0 5px #000; z-index: 10; mix-blend-mode: difference; }

        .card { width: 100%; background: var(--g); border: 1px solid var(--sg); padding: 18px; border-radius: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .buy-btn { background: var(--w); color: var(--b); border: none; padding: 10px 18px; border-radius: 8px; font-weight: 900; min-width: 80px; }
        
        nav { position: absolute; bottom: 0; width: 100%; display: flex; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); border-top: 1px solid var(--sg); padding: 15px 0 35px; z-index: 100; }
        .nav-item { flex: 1; text-align: center; color: #444; font-size: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--w); }
        .nav-item span { display: block; font-size: 24px; margin-bottom: 4px; filter: grayscale(1) brightness(2); }
        .nav-item.active span { filter: grayscale(0) brightness(1); }

        #admin-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 30000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .admin-content { background: #111; width: 100%; max-width: 400px; border-radius: 20px; padding: 20px; border: 1px solid #333; }
        .admin-btn { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; color: #fff; }
        .btn-start { background: var(--green); color: #000; }
        .btn-danger { background: var(--red); }
        .btn-neutral { background: #222; }

        .settings-btn { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--sg); background: var(--g); color: #fff; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div id="loading-screen"><div class="loader-bar"><div class="loader-progress"></div></div></div>
<div id="maint-screen"><h1>🔧</h1><h2>ТЕХ ПЕРЕРЫВ</h2></div>

<div id="winners-popup">
    <div class="winners-content">
        <div style="font-size: 50px; margin-bottom: 10px;">🏆</div>
        <div class="winners-title">ПОЗДРАВЛЯЕМ!</div>
        <p style="color: #666; font-size: 12px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px;">Ивент завершен</p>
        <div id="winners-list-container"></div>
        <button class="admin-btn btn-neutral" style="margin-top: 20px; background: #fff; color: #000;" onclick="closeWinners()">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="admin-modal">
    <div class="admin-content">
        <h3 style="text-align:center; margin-bottom:20px;">ADMIN PANEL</h3>
        <button id="event-toggle-btn" class="admin-btn btn-start" onclick="toggleEvent()">НАЧАТЬ ИВЕНТ</button>
        <button id="event-rush-btn" class="admin-btn btn-neutral" onclick="rushEvent()">ЗАКОНЧИТЬ ДОСРОЧНО</button>
        <button class="admin-btn btn-danger" onclick="clearWinnersData()">ОЧИСТИТЬ ПОБЕДИТЕЛЕЙ</button>
        <button class="admin-btn btn-neutral" onclick="toggleMaint()">ТЕХ ПЕРЕРЫВ: <span id="maint-status">OFF</span></button>
        <button class="admin-btn btn-danger" onclick="resetAllPlayers()">ОБНУЛИТЬ ВСЕХ</button>
        <button class="admin-btn btn-neutral" onclick="closeAdmin()" style="margin-top:10px;">ЗАКРЫТЬ</button>
    </div>
</div>

<canvas id="particleCanvas"></canvas>

<div id="app">
    <section id="s-game" class="screen active">
        <div class="header"><span id="p-name">@loading</span><span id="sync-text">LIVE</span></div>
        <div id="score">0</div>
        <div id="passive-display" style="color:#666; font-size:11px; font-weight:800;">Passive: 0/sec</div>
        <div class="tap-area"><div class="main-circle" id="tapBtn"></div></div>
        <div class="energy-box">
            <div class="bar-bg"><div id="e-fill"></div><span id="e-text">150 / 150</span></div>
        </div>
    </section>

    <section id="s-top" class="screen">
        <h2 style="align-self: flex-start; margin-bottom: 20px; font-weight: 900;">TOP 5</h2>
        <button id="view-winners-btn" class="settings-btn hidden" onclick="openWinners()" style="border-color: var(--green); margin-bottom: 15px;">
            <span style="color: var(--green);">🏆 ПОБЕДИТЕЛИ ИВЕНТА</span> <span>➔</span>
        </button>
        <div id="leaderboard-list" style="width:100%;"></div>
    </section>

    <section id="s-shop" class="screen">
        <h2 style="align-self: flex-start; margin-bottom: 20px; font-weight: 900;">SHOP</h2>
        <div id="shop-main" style="width:100%;">
            <div class="card" onclick="openUpgrade('click')"><b>CLICK UPGRADES</b><span>➔</span></div>
            <div class="card" onclick="openUpgrade('passive')"><b>PASSIVE INCOME</b><span>➔</span></div>
        </div>
        <div id="shop-detail" class="hidden" style="width:100%;">
            <button onclick="backToShop()" style="background:none; border:none; color:#fff; font-weight:800; margin-bottom:15px;">← BACK</button>
            <div id="upgrade-items"></div>
        </div>
    </section>

    <section id="s-gear" class="screen">
        <h2 style="align-self: flex-start; margin-bottom: 20px; font-weight: 900;">GEAR</h2>
        <button class="settings-btn" onclick="toggleSound()">
            <span>Sound</span><span id="cur-sound">ON</span>
        </button>
        <div id="admin-container"></div>
    </section>

    <nav>
        <div class="nav-item" onclick="show('s-top')"><span>🏆</span><p>TOP</p></div>
        <div class="nav-item active" onclick="show('s-game')"><span>💎</span><p>GAME</p></div>
        <div class="nav-item" onclick="show('s-shop')"><span>🛒</span><p>SHOP</p></div>
        <div class="nav-item" onclick="show('s-gear')"><span>⚙️</span><p>GEAR</p></div>
    </nav>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDcUMfQAd9QnoPUVxfM9SWp_lHBc2CaRKY", authDomain: "juugtaaap.firebaseapp.com", databaseURL: "https://juugtaaap-default-rtdb.europe-west1.firebasedatabase.app", projectId: "juugtaaap" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    const MY_ID = 5291965471;
    const user = tg.initDataUnsafe?.user || { id: 0, username: "Guest" };
    
    let state = { score: 0, energy: 150, tapLvl: 1, passiveLvl: 0, lastUpdate: Date.now(), sound: true };
    let globalData = { eventEnd: 0, isMaint: false, winners: null };

    // --- ADMIN ---
    function openAdmin() { document.getElementById('admin-modal').style.display = 'flex'; }
    function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }
    function toggleMaint() { db.ref('global').update({ isMaint: !globalData.isMaint }); }
    function toggleEvent() {
        const end = globalData.eventEnd > Date.now() ? 0 : Date.now() + (90 * 24 * 60 * 60 * 1000);
        db.ref('global').update({ eventEnd: end });
    }
    function rushEvent() {
        // Определяем победителей по SCORE
        db.ref('users').orderByChild('score').limitToLast(5).once('value', s => {
            let winArr = [];
            s.forEach(c => {
                let d = c.val();
                winArr.unshift({ name: d.username, score: d.score, tap: d.tapLvl, pass: d.passiveLvl });
            });
            db.ref('global').update({ eventEnd: Date.now() - 1000, winners: winArr });
        });
    }
    function clearWinnersData() {
        db.ref('global').update({ winners: null });
        closeWinners();
    }
    function resetAllPlayers() { 
        if(confirm("RESET ALL?")) db.ref('users').once('value', s => {
            s.forEach(c => db.ref(`users/${c.key}`).update({score:0, tapLvl:1, passiveLvl:0}));
        });
    }

    // --- CORE ---
    db.ref('global').on('value', s => {
        globalData = s.val() || { eventEnd: 0, isMaint: false, winners: null };
        document.getElementById('maint-screen').style.display = (globalData.isMaint && user.id !== MY_ID) ? 'flex' : 'none';
        document.getElementById('maint-status').innerText = globalData.isMaint ? 'ON' : 'OFF';
        
        const isLive = globalData.eventEnd > Date.now();
        document.getElementById('sync-text').innerText = isLive ? "LIVE" : "FINISHED";
        document.getElementById('event-toggle-btn').innerText = isLive ? "СТОП ИВЕНТ" : "НАЧАТЬ ИВЕНТ";

        // Показ кнопки победителей в ТОП и самого окна при входе
        if(globalData.winners) {
            document.getElementById('view-winners-btn').classList.remove('hidden');
            renderWinnersList(globalData.winners);
            if(!sessionStorage.getItem('winnersSeen')) {
                openWinners();
                sessionStorage.setItem('winnersSeen', 'true');
            }
        } else {
            document.getElementById('view-winners-btn').classList.add('hidden');
            closeWinners();
        }
    });

    function renderWinnersList(list) {
        const cont = document.getElementById('winners-list-container');
        cont.innerHTML = list.map((w, i) => `
            <div class="winner-item ${i === 0 ? 'first' : ''}">
                <div class="winner-info">
                    <span class="winner-name">${i === 0 ? '👑 ' : ''}@${w.name}</span>
                    <span class="winner-stats">Tap Lvl: ${w.tap} | Pass: ${w.pass}</span>
                </div>
                <div class="winner-score">${Math.floor(w.score).toLocaleString()}</div>
            </div>
        `).join('');
    }

    function openWinners() { document.getElementById('winners-popup').style.display = 'flex'; }
    function closeWinners() { document.getElementById('winners-popup').style.display = 'none'; }

    function loadData() {
        db.ref(`users/${user.id}`).on('value', s => {
            if(s.exists()) { state = {...state, ...s.val()}; updateUI(); }
            else db.ref(`users/${user.id}`).set({username: user.username, score:0, energy:150, tapLvl:1, passiveLvl:0, sound: true});
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
        });
    }

    function updateUI() {
        document.getElementById('score').innerText = Math.floor(state.score).toLocaleString();
        document.getElementById('p-name').innerText = "@" + user.username;
        document.getElementById('e-fill').style.width = (state.energy/150*100) + "%";
        document.getElementById('e-text').innerText = Math.floor(state.energy) + " / 150";
        document.getElementById('passive-display').innerText = `Passive: ${state.passiveLvl}/sec`;
        document.getElementById('cur-sound').innerText = state.sound ? "ON" : "OFF";
        
        if(user.id === MY_ID && !document.getElementById('adm-btn')) {
            const b = document.createElement('button'); b.id='adm-btn'; b.className='admin-btn btn-neutral';
            b.innerText='ADMIN PANEL'; b.onclick=openAdmin; document.getElementById('admin-container').appendChild(b);
        }
    }

    function toggleSound() {
        state.sound = !state.sound;
        document.getElementById('cur-sound').innerText = state.sound ? "ON" : "OFF";
        save();
    }

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.getAttribute('onclick').includes(id)));
    }

    document.getElementById('tapBtn').onclick = (e) => {
        if(state.energy >= 1) {
            state.score += state.tapLvl; state.energy -= 1;
            createEffect(e); updateUI(); save();
            if(state.sound) tg.HapticFeedback.impactOccurred('light');
        }
    };

    function createEffect(e) {
        const el = document.createElement('div'); el.className = 'tap-effect';
        el.innerText = "+" + state.tapLvl; el.style.left = e.pageX + "px"; el.style.top = e.pageY + "px";
        document.body.appendChild(el); setTimeout(() => el.remove(), 600);
    }

    function save() { db.ref(`users/${user.id}`).update(state); }

    setInterval(() => {
        if(state.energy < 150) { state.energy = Math.min(150, state.energy + 1); updateUI(); }
        if(state.passiveLvl > 0) { state.score += state.passiveLvl/10; updateUI(); }
    }, 1000);

    // Leaderboard logic
    setInterval(() => {
        db.ref('users').orderByChild('score').limitToLast(5).once('value', s => {
            let html = ""; let arr = [];
            s.forEach(c => arr.unshift(c.val()));
            arr.forEach((u, i) => {
                html += `<div class="card"><span>#${i+1} @${u.username}</span><b>${Math.floor(u.score).toLocaleString()}</b></div>`;
            });
            document.getElementById('leaderboard-list').innerHTML = html;
        });
    }, 5000);

    function openUpgrade(type) {
        document.getElementById('shop-main').classList.add('hidden');
        document.getElementById('shop-detail').classList.remove('hidden');
        renderUpgradeItems(type);
    }
    function backToShop() {
        document.getElementById('shop-main').classList.remove('hidden');
        document.getElementById('shop-detail').classList.add('hidden');
    }
    function renderUpgradeItems(type) {
        const cont = document.getElementById('upgrade-items');
        let lvl = type === 'click' ? state.tapLvl : state.passiveLvl;
        let price = Math.floor(100 * Math.pow(1.5, lvl));
        cont.innerHTML = `
            <div class="card">
                <div style="text-align:left">
                    <b style="display:block">LEVEL ${lvl}</b>
                    <span style="font-size:12px; color:#666">${type==='click'?'Next: +1 per tap':'Next: +1 per sec'}</span>
                </div>
                <button class="buy-btn" onclick="buyUpgrade('${type}', ${price})">${price}</button>
            </div>
        `;
    }
    function buyUpgrade(type, p) {
        if(state.score >= p) {
            state.score -= p;
            if(type === 'click') state.tapLvl++; else state.passiveLvl++;
            updateUI(); save(); renderUpgradeItems(type);
            if(state.sound) tg.HapticFeedback.notificationOccurred('success');
        }
    }

    loadData();
</script>
</body>
</html>
